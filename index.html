      }
    }

    mesh.visible = !!visible;

    // ── Gather ALL materials (handles multi-material meshes) ────────────
    const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];

    // ── Skip if nothing changed (visibility + xray + selection + status) ─
    const clinicalEntry = getMeshClinicalEntry(mesh.name, cat, od2);
    const timelineMeta = clinicalEntry?._timeline || null;
    const stNow = clinicalEntry
      ? (timelineMeta?.displayStatus || clinicalEntry._nlpUpgrade || clinicalEntry.status || "")
      : "";
    const outlineOnly = !!timelineMeta?.outlineOnly && (stNow === "sick" || stNow === "warning");
    const outlineSignal = String(timelineMeta?.outlineSignal || "");
    const signalStatusMap = { red: "sick", orange: "warning", yellow: "warning", blue: "none", gray: "none" };
    const outlineHex = STATUS_HEX[signalStatusMap[outlineSignal] || stNow] ?? STATUS_HEX.none;
    const mappedOrganId = clinicalEntry?.organ_id || organId || "";
    const headRegion = isHeadRegionMesh(mesh.name, cat, mappedOrganId);
    const _sig = `${mesh.visible?1:0}|${xr?1:0}|${sel2===mesh.name?1:0}|${hov2===mesh.name?1:0}|${stNow}|${outlineOnly?1:0}|${outlineSignal}`;
    const isSel = sel2 === mesh.name;
    const isHover = hov2 === mesh.name;
    const isFocus = isSel || isHover;

    const setMat = (mat, hex, opacity, depthWrite, depthTest = true, wireframe = false) => {
      if (!mat) return;
      if (mat.color) mat.color.setHex(hex);
      const op = Math.max(0, Math.min(1, opacity));
      mat.opacity = op;
      mat.transparent = op < 1;
      mat.depthWrite = (depthWrite !== undefined) ? depthWrite : (op >= 1);
      mat.depthTest = !!depthTest;
      mat.wireframe = !!wireframe;
      if (mat.emissive) mat.emissive.setHex(isSel ? 0x0a2040 : isHover ? 0x06345a : 0x000000);
      mat.needsUpdate = true;
    };

    // ── X-ray mode ─────────────────────────────────────────────────────
if (xr) {
  const xrayPalette = {
    skeletal:       { op: isFocus ? 0.31 : 0.19, factor: 1.00 },
    joints:         { op: isFocus ? 0.26 : 0.14, factor: 1.00 },
    muscular:       { op: isFocus ? 0.05 : 0.015,factor: 1.00 },
    cardiovascular: { op: isFocus ? 0.29 : 0.16, factor: 0.50 },
    lymphoid:       { op: isFocus ? 0.25 : 0.12, factor: 0.50 },
    nervous:        { op: isFocus ? 0.23 : 0.11, factor: 0.50 },
    skin:           { op: isFocus ? 0.10 : 0.03, factor: 1.00 },
    visceral:       { op: isFocus ? 0.40 : 0.24, factor: 0.35 },
  };
  const xp = xrayPalette[cat] || xrayPalette.visceral;
  const isCriticalStatus = stNow === "sick" || stNow === "warning";
  const criticalRankXray = headRegion ? 0 : (stNow === "sick" ? 2 : stNow === "warning" ? 1 : 0);
  mesh.renderOrder = isSel ? 220 : isHover ? 210 : criticalRankXray === 2 ? 200 : criticalRankXray === 1 ? 180 : 0;
  if (stNow && stNow !== "none") {
    const xrayStatusOpacity = outlineOnly
      ? (isFocus ? 0.42 : 0.28)
      : isCriticalStatus
        ? (isFocus ? 0.74 : 0.58)
        : (isFocus ? 0.48 : 0.34);
    const forceOnTop = isCriticalStatus && !headRegion;
    mats.forEach(mat => {
      setMat(
        mat,
        outlineOnly ? outlineHex : (STATUS_HEX[stNow] ?? STATUS_HEX.none),
        xrayStatusOpacity,
        false,
        !forceOnTop,
        outlineOnly
      );
      if (mat) {
        mat.polygonOffset = forceOnTop;
        mat.polygonOffsetFactor = forceOnTop ? -2 : 0;
        mat.polygonOffsetUnits = forceOnTop ? -2 : 0;
      }
      if (mat && mat.emissive) {
        if (outlineOnly) {
          mat.emissive.setHex(stNow === "sick" ? 0x19070b : 0x1d1406);
        } else {
          mat.emissive.setHex(
            stNow === "sick" ? 0x2b0a10 :
            stNow === "warning" ? 0x332009 :
            stNow === "healthy" ? 0x0a2b18 : 0x000000
          );
        }
      }
    });
  } else {
    mats.forEach(mat => {
      if (!mat) return;
      if (mat.color) mat.color.setHex(STATUS_HEX.none);
      mat.opacity = critOnly ? 0 : Math.max(0.02, xp.op * xp.factor);
      mat.transparent = true;
      mat.depthWrite = false;
      mat.depthTest = true;
      mat.wireframe = false;
      mat.polygonOffset = false;
      mat.polygonOffsetFactor = 0;
      mat.polygonOffsetUnits = 0;
      if (mat.emissive) mat.emissive.setHex(critOnly ? 0x000000 : (isSel ? 0x004466 : isHover ? 0x036280 : 0x001a33));
      mat.needsUpdate = true;
    });
  }
  if (critOnly && !isCriticalStatus) {
    mats.forEach(mat => {
      if (!mat) return;
      mat.opacity = 0;
      mat.transparent = true;
      mat.depthWrite = false;
      mat.depthTest = false;
      mat.wireframe = false;
      mat.polygonOffset = false;
      mat.polygonOffsetFactor = 0;
      mat.polygonOffsetUnits = 0;
      if (mat.emissive) mat.emissive.setHex(0x000000);
      mat.needsUpdate = true;
    });
  }
  return;
}

// ── Normal mode ────────────────────────────────────────────────────
const od3  = clinicalEntry;
const st   = od3?.status || "none";
// Use the same effective status as hover cards/xray to avoid label-color mismatch.
const disp = od3?._timeline?.displayStatus || od3?._nlpUpgrade || st;
const outlineOnlyNormal = !!od3?._timeline?.outlineOnly && (disp === "sick" || disp === "warning");
const outlineSignalNormal = String(od3?._timeline?.outlineSignal || "");
const signalStatusMapNormal = { red: "sick", orange: "warning", yellow: "warning", blue: "none", gray: "none" };
const normalOutlineHex = STATUS_HEX[signalStatusMapNormal[outlineSignalNormal] || disp] ?? STATUS_HEX.none;

const normalOpacity = {
  skeletal:       { active: isFocus ? 0.48 : 0.34, none: isFocus ? 0.22 : 0.12, depthWrite: true  },
  joints:         { active: isFocus ? 0.44 : 0.28, none: isFocus ? 0.20 : 0.11, depthWrite: false },
  muscular:       { active: isFocus ? 0.11 : 0.045,none: isFocus ? 0.07 : 0.03, depthWrite: false },
  cardiovascular: { active: isFocus ? 0.43 : 0.27, none: isFocus ? 0.18 : 0.10, depthWrite: false },
  lymphoid:       { active: isFocus ? 0.41 : 0.24, none: isFocus ? 0.18 : 0.10, depthWrite: false },
  nervous:        { active: isFocus ? 0.44 : 0.30, none: isFocus ? 0.19 : 0.11, depthWrite: false },
  skin:           { active: isFocus ? 0.22 : 0.09, none: isFocus ? 0.14 : 0.06, depthWrite: false },
  visceral:       { active: isFocus ? 0.44 : 0.34, none: isFocus ? 0.20 : 0.13, depthWrite: false },
};
const np = normalOpacity[cat] || normalOpacity.visceral;
const hex = outlineOnlyNormal ? normalOutlineHex : (STATUS_HEX[disp] ?? STATUS_HEX.none);
const isCriticalStatus = disp === "sick" || disp === "warning";
const opacity = critOnly
  ? (isCriticalStatus ? (outlineOnlyNormal ? (isFocus ? 0.34 : 0.24) : np.active) : 0)
  : (disp === "none" ? np.none : (outlineOnlyNormal ? (isFocus ? 0.30 : 0.22) : np.active));
const criticalRankNormal = headRegion ? 0 : (disp === "sick" ? 2 : disp === "warning" ? 1 : 0);
mesh.renderOrder = isSel ? 220 : isHover ? 210 : criticalRankNormal === 2 ? 200 : criticalRankNormal === 1 ? 180 : 0;
const forceOnTop = isCriticalStatus && opacity > 0 && !headRegion;
mats.forEach(mat => {
  if (!mat) return;
  setMat(
    mat,
    hex,
    opacity,
    outlineOnlyNormal ? false : (forceOnTop ? false : np.depthWrite),
    !forceOnTop,
    outlineOnlyNormal
  );
  mat.polygonOffset = forceOnTop;
  mat.polygonOffsetFactor = forceOnTop ? -2 : 0;
  mat.polygonOffsetUnits = forceOnTop ? -2 : 0;
});
  });
  visibleMeshesRef.current = Object.values(meshesRef.current)
    .filter(entry => entry?.mesh?.visible)
    .map(entry => entry.mesh);
  invalidateRenderRef.current();
};


  // Main scene setup — runs once on mount
  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;

    const fail = (title, reason, fix, code='') => {
      console.error('[BodyModel3D]', title, reason);
      setErrorInfo({ title, reason, fix, code });
      setLoadState('error');
    };

    // ── Step 1: THREE core ──
    addLog('Проверка THREE.js…');
    if (typeof THREE === 'undefined') {
      return fail(
        'THREE.js не загружен',
        'Глобальный объект THREE отсутствует. CDN-скрипт не был получен.',
        'Проверьте интернет-соединение и откройте DevTools → Network.',
        'typeof THREE === "undefined"'
      );
    }
    addLog(' THREE r' + THREE.REVISION, 'ok');

    // ── Step 2: WebGL support ──
    addLog('Проверка WebGL…');
    const testCanvas = document.createElement('canvas');
    const gl = testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl');
    if (!gl) {
      return fail(
        'WebGL не поддерживается',
        'Браузер не предоставил WebGL-контекст. Возможно, видеодрайвер или настройки браузера блокируют WebGL.',
        'Включите WebGL: chrome://flags/#enable-webgl  или обновите браузер/драйвер.',
        'canvas.getContext("webgl") === null'
      );
    }
    addLog(' WebGL доступен', 'ok');

    // ── Step 3: GLTFLoader ──
    addLog('Проверка GLTFLoader…');
    if (!THREE.GLTFLoader) {
      return fail(
        'THREE.GLTFLoader не загружен',
        'CDN-скрипт GLTFLoader.js не был получен или выполнен.',
        'Откройте DevTools → Network и убедитесь, что GLTFLoader.js загружен без ошибок.',
        'THREE.GLTFLoader === undefined'
      );
    }
    addLog(' GLTFLoader', 'ok');

    // ── Step 4: OrbitControls ──
    addLog('Проверка OrbitControls…');
    if (!THREE.OrbitControls) {
      return fail(
        'THREE.OrbitControls не загружен',
        'CDN-скрипт OrbitControls.js не был получен или выполнен.',
        'Откройте DevTools → Network и убедитесь, что OrbitControls.js загружен без ошибок.',
        'THREE.OrbitControls === undefined'
      );
    }
    addLog(' OrbitControls', 'ok');

    // ── Step 5: Protocol check ──
    const isFileProto = location.protocol === 'file:';
    if (isFileProto) {
      addLog(' file:// протокол', 'warn');
    } else {
      addLog(' Протокол: ' + location.protocol, 'ok');
    }

    const W = mount.clientWidth  || 400;
    const H = mount.clientHeight || 600;

    // ── Step 6: Renderer ──
    addLog('Инициализация рендерера…');
    let renderer;
    const initialQuality = clampQualitySettings(propsRef.current.qualitySettings || QUALITY_DEFAULTS);
    try {
      renderer = new THREE.WebGLRenderer({
        antialias: false,
        alpha: false,
        powerPreference: "high-performance",
        precision: "mediump",
      });
      renderer.setPixelRatio(initialQuality.resolutionScale);
      renderer.setSize(W, H);
      perfStateRef.current.dpr = initialQuality.resolutionScale;
      perfStateRef.current.raycastIntervalMs = initialQuality.raycastIntervalMs;
      mount.appendChild(renderer.domElement);
      addLog(' WebGLRenderer создан', 'ok');
    } catch(e) {
      return fail('Ошибка создания WebGLRenderer', String(e), 'Возможно, браузер ограничивает число WebGL-контекстов. Перезагрузите страницу.', String(e));
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x04070f);
    const camera = new THREE.PerspectiveCamera(45, W / H, 0.001, 2000);
    camera.position.set(0, 0.5, 0.015);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dl1 = new THREE.DirectionalLight(0xffffff, 1.0); dl1.position.set(3, 8, 5);  scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0x93c5fd, 0.5); dl2.position.set(-5, 3,-4); scene.add(dl2);
    const dl3 = new THREE.DirectionalLight(0xfde68a, 0.25);dl3.position.set(0, -6, 3); scene.add(dl3);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = false;
    controls.dampingFactor  = 0;
    controls.rotateSpeed    = 0.7;
    controls.zoomSpeed      = 1.2;
    controls.panSpeed       = 0.8;
    controls.minDistance    = 0.1;
    controls.maxDistance    = 30;
    controls.enablePan      = true;
    controls.screenSpacePanning = true;
    // Blender-style navigation:
    // Middle mouse = orbit, Shift+Middle = pan, Scroll = zoom, Left = nothing
    controls.mouseButtons = {
      LEFT:   THREE.MOUSE.ROTATE,
      MIDDLE: THREE.MOUSE.DOLLY,
      RIGHT:  THREE.MOUSE.PAN,
    };
    controls.touches = {
      ONE: THREE.TOUCH.ROTATE,
      TWO: THREE.TOUCH.DOLLY_PAN,
    };
    let renderRafId = 0;
    let renderQueued = false;
    let continuousRafId = 0;
    let isContinuousMode = false;
    let hudLastUpdateTs = 0;
    const applyRendererQuality = (nextQuality) => {
      const q = clampQualitySettings(nextQuality || QUALITY_DEFAULTS);
      const w = mount.clientWidth || 1;
      const h = mount.clientHeight || 1;
      renderer.setPixelRatio(q.resolutionScale);
      renderer.setSize(w, h, false);
      perfStateRef.current.dpr = q.resolutionScale;
      perfStateRef.current.raycastIntervalMs = q.raycastIntervalMs;
      return q;
    };
    const updatePerfStats = (ts) => {
      const perf = perfStateRef.current;
      if (!perf.lastTs) perf.lastTs = ts;
      const dt = Math.max(1, ts - perf.lastTs);
      perf.lastTs = ts;
      const fpsNow = 1000 / dt;
      perf.fpsEma = perf.fpsEma * 0.9 + fpsNow * 0.1;
      if (showPerfHud && ts - hudLastUpdateTs > 450) {
        const info = renderer.info || {};
        const render = info.render || {};
        perf.drawCalls = render.calls || 0;
        perf.triangles = render.triangles || 0;
        perf.points = render.points || 0;
        perf.lines = render.lines || 0;
        setPerfHud({
          fps: perf.fpsEma,
          dpr: perf.dpr,
          calls: perf.drawCalls,
          triangles: perf.triangles,
          points: perf.points,
          lines: perf.lines,
        });
        hudLastUpdateTs = ts;
      }
    };
    const renderOnce = (ts) => {
      renderer.render(scene, camera);
      updatePerfStats(ts || performance.now());
    };
    const runDemandRender = (ts) => {
      renderQueued = false;
      renderOnce(ts);
    };
    const runContinuousRender = (ts) => {
      renderOnce(ts);
      continuousRafId = requestAnimationFrame(runContinuousRender);
    };
    const stopContinuousRender = () => {
      if (continuousRafId) cancelAnimationFrame(continuousRafId);
      continuousRafId = 0;
      isContinuousMode = false;
    };
    const startContinuousRender = () => {
      if (isContinuousMode) return;
      isContinuousMode = true;
      continuousRafId = requestAnimationFrame(runContinuousRender);
    };
    const applyRenderMode = (mode) => {
      const nextMode = mode === "continuous" ? "continuous" : "onDemand";
      if (nextMode === "continuous") {
        startContinuousRender();
      } else {
        stopContinuousRender();
        renderQueued = false;
        if (renderRafId) cancelAnimationFrame(renderRafId);
        renderRafId = requestAnimationFrame(runDemandRender);
      }
    };
    const requestRender = () => {
      if (isContinuousMode || renderQueued) return;
      renderQueued = true;
      renderRafId = requestAnimationFrame(runDemandRender);
    };
    invalidateRenderRef.current = requestRender;
    const onControlsPointerDown = (e) => {
      if (e.button === 1) { // MMB
        controls.mouseButtons.MIDDLE = e.shiftKey ? THREE.MOUSE.PAN : THREE.MOUSE.DOLLY;
      }
      requestRender();
    };
    const onControlsPointerUp = () => requestRender();
    // Shift+MMB = pan, MMB alone = dolly (zoom)
    renderer.domElement.addEventListener('pointerdown', onControlsPointerDown);
    renderer.domElement.addEventListener('pointerup', onControlsPointerUp);
    controls.addEventListener('change', requestRender);
    controls.update();
    applyRendererQuality(initialQuality);
    applyRenderMode(initialQuality.renderMode);
    requestRender();

    sceneRef.current = {
      renderer,
      camera,
      controls,
      scene,
      invalidate: requestRender,
      applyQuality: (nextQuality) => {
        const q = applyRendererQuality(nextQuality);
        applyRenderMode(q.renderMode);
        requestRender();
      },
      getPerfState: () => ({ ...perfStateRef.current }),
    };

    // ── Step 7: Load all .glb layers from /3d ──
    addLog('Проверка и загрузка файлов слоёв…');

    const loadLayer = (layer) => new Promise((resolve, reject) => {
      getOrLoadModel(
        layer.path,
        gltf => resolve({ layer, gltf }),
        null,
        err => reject({ layer, err })
      );
    });

    Promise.all(TARGET_GROUPS.map(loadLayer))
      .then(items => {
        try {
          const overallBox = new THREE.Box3();
          let hasBounds = false;
          let meshCount = 0;
          const meshToGroup = new Map();
          const groups = [];
          const groupNodes = new Map();

          const cloneMat = (m) => {
            const c = (m && m.clone) ? m.clone() : new THREE.MeshStandardMaterial({ color: 0xffffff });
            c.transparent = false;
            c.opacity = 1.0;
            c.depthWrite = true;
            c.needsUpdate = true;
            return c;
          };

          items.forEach(({ layer, gltf }) => {
            const model = gltf.scene.clone(true);
            model.name = layer.name;
            scene.add(model);
            groupNodes.set(layer.name, model);

            const box = new THREE.Box3().setFromObject(model);
            if (!box.isEmpty()) {
              if (!hasBounds) { overallBox.copy(box); hasBounds = true; }
              else overallBox.union(box);
            }

            const meshObjs = [];
            model.traverse(child => {
              if (!child.isMesh) return;
              const cat = layer.category || getCat(child.name);
              const organId = canonicalizeOrganId(
                inferMajorOrganIdFromMeshName(child.name, cat) ||
                normalizeMeshName(child.name) ||
                child.name
              );
              child.userData = {
                ...(child.userData || {}),
                hmCat: cat,
                hmGroup: layer.name,
                hmOrganId: organId,
              };
              child.material = Array.isArray(child.material)
                ? child.material.map(cloneMat)
                : cloneMat(child.material);
              meshObjs.push(child);
              meshToGroup.set(child, layer.name);
              meshesRef.current[`${layer.name}::${child.uuid}`] = {
                mesh: child,
                cat,
                groupName: layer.name,
                organId,
                _lastSig: '',
              };
              meshCount++;
            });

            groups.push({ name: layer.name, displayName: layer.ru, meshes: meshObjs, path: layer.path });
          });

          if (hasBounds) {
            const center = new THREE.Vector3();
            const size = new THREE.Vector3();
            overallBox.getCenter(center);
            overallBox.getSize(size);
            scene.position.sub(center);

            const maxDim = Math.max(size.x, size.y, size.z) || 2;
            const targetDist = maxDim * 1.2;
            const isZUp = size.z > size.x * 1.3 && size.z > size.y * 1.3;

            if (isZUp) camera.position.set(0, -targetDist, 0);
            else camera.position.set(0, 0, targetDist);

            camera.near = targetDist * 0.001;
            camera.far = targetDist * 100;
            camera.updateProjectionMatrix();
            controls.target.set(0, 0, 0);
            controls.minDistance = targetDist * 0.1;
            controls.maxDistance = targetDist * 10;
            controls.update();
            sceneRef.current.initCamPos = camera.position.clone();
            sceneRef.current.initTarget = new THREE.Vector3(0, 0, 0);
            sceneRef.current.isZUp = isZUp;
          }

          sceneRef.current.controls = controls;
          sceneRef.current.camera = camera;
          groupNodesRef.current = groupNodes;
          meshToGroupRef.current = meshToGroup;
          groupsRef.current = groups;
          const { onGroupList: ogl } = propsRef.current;
          if (ogl) ogl(groups);

          addLog(` Слоёв: ${items.length}`, 'ok');
          addLog(` Мешей: ${meshCount}`, 'ok');
          loadedRef.current = true;
          applyRef.current();
          sceneRef.current.invalidate && sceneRef.current.invalidate();
          if (propsRef.current.onSceneReady) {
            sceneRef.current.getMeshes = () => meshesRef.current;
            sceneRef.current.getMeshMeta = (meshName) => {
              const found = Object.values(meshesRef.current).find(entry => entry?.mesh?.name === meshName);
              if (!found) return null;
              return {
                meshName: found.mesh.name,
                category: found.cat,
                groupName: found.groupName || meshToGroup.get(found.mesh) || null,
                organId: found.organId || canonicalizeOrganId(found.mesh.name),
              };
            };
            propsRef.current.onSceneReady(sceneRef.current);
          }
          setLoadPct(100);
          setLoadState('ok');
        } catch(e) {
          fail('Ошибка обработки слоёв GLB', String(e), 'Проверьте содержимое файлов в папке 3d.', String(e));
        }
      })
      .catch(({ layer, err }) => {
        console.error('GLB load error:', layer?.path, err);
        const msg = String(err?.message || err || '');
        const badPath = layer?.path || '3d/*.glb';
        let title, reason, fix, code;

        if (isFileProto) {
          title  = 'Блокировка file:// протокола';
          reason = 'Браузер запрещает XMLHttpRequest через file://. Это политика безопасности браузера, а не проблема кода.';
          fix    = 'Запустите локальный сервер:\n  python -m http.server 8080\nЗатем: http://localhost:8080';
          code   = 'location.protocol === "file:"';
        } else if (msg.includes('404') || msg.includes('Not Found')) {
          title  = 'Файл слоя не найден (404)';
          reason = `Файл "${badPath}" не найден по пути: ${location.href.replace(/[^/]*$/, '')}${badPath}`;
          fix    = 'Проверьте, что все .glb файлы лежат в папке 3d рядом с index.html.';
          code   = msg;
        } else if (msg.includes('CORS') || msg.includes('cross-origin') || msg.includes('access')) {
          title  = 'CORS-ошибка';
          reason = 'Сервер не разрешает кросс-доменный доступ к файлам слоёв.';
          fix    = 'Запускайте проект локально через сервер, а не прямым открытием файла.';
          code   = msg;
        } else if (msg.includes('NetworkError') || msg.includes('Failed to fetch')) {
          title  = 'Сетевая ошибка';
          reason = 'Запрос к одному из файлов слоёв был прерван или отклонён.';
          fix    = 'Проверьте, запущен ли сервер и существуют ли все файлы в папке 3d.';
          code   = msg;
        } else {
          title  = 'Ошибка загрузки слоя GLB';
          reason = msg || 'Неизвестная ошибка загрузчика';
          fix    = 'Проверьте DevTools → Console и корректность файлов в папке 3d.';
          code   = msg;
        }
        fail(title, reason, fix, code);
      });

    /* ── Raycaster / hover / click ── */
    const raycaster = new THREE.Raycaster();
    const mouseVec  = new THREE.Vector2();
    let downXY = { x: 0, y: 0 };
    let lastHoverName = null;
    let lastRaycastTs = 0;

    const clearHover = () => {
      lastHoverName = null;
      const { onHoverChange: hoverCb } = propsRef.current;
      hoverCb && hoverCb(null);
    };

    const pickHit = (clientX, clientY) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouseVec.x =  ((clientX - rect.left) / rect.width)  * 2 - 1;
      mouseVec.y = -((clientY - rect.top)  / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouseVec, camera);
      const visMeshes = visibleMeshesRef.current;
      if (!visMeshes.length) return { rect, hit: null, allHits: [] };
      const hits = raycaster.intersectObjects(visMeshes, false);
      return { rect, hit: hits[0] || null, allHits: hits };
    };

    const onMouseDown = e => { downXY = { x: e.clientX, y: e.clientY }; };

    let hoverIdleTimer = null;

    const onMouseMove = e => {
      if (propsRef.current.cardsFrozen) return;
      const now = performance.now();
      const raycastInterval = perfStateRef.current.raycastIntervalMs || 35;
      if (now - lastRaycastTs < raycastInterval) return;
      lastRaycastTs = now;
      // Clear pending idle timer on every move
      if (hoverIdleTimer) { clearTimeout(hoverIdleTimer); hoverIdleTimer = null; }
      // Immediately clear overlay on movement
      if (lastHoverName) clearHover();

      const { rect, hit } = pickHit(e.clientX, e.clientY);
      if (!hit) {
        renderer.domElement.style.cursor = 'grab';
        return;
      }
      renderer.domElement.style.cursor = 'pointer';

      // Show xray label overlay only after 220ms idle
      const cx = e.clientX, cy = e.clientY;
      hoverIdleTimer = setTimeout(() => {
        const { onHoverChange: hoverCb2, od: od3, cardsFrozen: frozen, maxCards: maxCardsFromProps } = propsRef.current;
        if (!hoverCb2 || frozen) return;
        const { rect: rect2, hit: hit2, allHits: allHits2 } = pickHit(cx, cy);
        if (!hit2) return;

        // Collect all hits, deduplicate by mesh label key
        const seenKeys = new Set();
        const critOnly = !!propsRef.current?.criticalOnlyMode;
        const xrayHits = [];
        const statusPriority = { sick: 3, warning: 2, healthy: 1, none: 0 };
        for (const h of allHits2) {
          const name = h.object?.name;
          if (!name) continue;
          const cat = h.object?.userData?.hmCat || getCat(name);
          const entry = getMeshClinicalEntry(name, cat, od3);
          const hitStatus = entry?._nlpUpgrade || entry?.status || "none";
          if (critOnly && hitStatus !== "sick" && hitStatus !== "warning") continue;

          const organId = canonicalizeOrganId(entry?.organ_id || inferMajorOrganIdFromMeshName(name, cat) || normalizeMeshName(name) || name);
          if (!organId) continue;

          const labelFromMesh = translateMeshLabel(name);
          const dedupeKey = String(name).toLowerCase();
          if (seenKeys.has(dedupeKey)) continue;
          seenKeys.add(dedupeKey);

          const ruName = labelFromMesh || prettyMeshLabel(name);
          xrayHits.push({
            meshName: name,
            organId,
            organName: ruName,
            status: hitStatus,
            category: cat,
            groupName: meshToGroupRef.current.get(h.object) || null,
            priority: statusPriority[hitStatus] ?? 0,
          });
        }
        xrayHits.sort((a, b) => (b.priority ?? 0) - (a.priority ?? 0));
        const hoveredName = hit2.object?.name;
        if (hoveredName) {
          const idx = xrayHits.findIndex(h => h.meshName === hoveredName);
          if (idx > 0) {
            const [focused] = xrayHits.splice(idx, 1);
            xrayHits.unshift(focused);
          }
        }
        const MAX_INFO_CARDS = Math.max(1, Math.min(12, Number(maxCardsFromProps) || 8));
        const criticalHits = xrayHits.filter(h => h.status === "sick" || h.status === "warning");
        const otherHits = xrayHits.filter(h => h.status !== "sick" && h.status !== "warning");
        const limitedHits = [...criticalHits, ...otherHits].slice(0, MAX_INFO_CARDS);
        if (!limitedHits.length) return;

        const projected = hit2.point.clone().project(camera);
        const anchor = {
          x: ((projected.x + 1) / 2) * rect2.width,
          y: ((-projected.y + 1) / 2) * rect2.height,
        };
        lastHoverName = hit2.object?.name;
        hoverCb2({
          meshName: hit2.object?.name,
          organId: limitedHits[0].organId,
          organName: limitedHits[0].organName,
          status: limitedHits[0].status,
          entry: { organ_id: limitedHits[0].organId, status: limitedHits[0].status },
          category: limitedHits[0].category,
          groupName: limitedHits[0].groupName,
          anchor,
          rect: { left: rect2.left, top: rect2.top, right: rect2.right, bottom: rect2.bottom, width: rect2.width, height: rect2.height },
          xrayHits: limitedHits,
        });
      }, 220);
    };

    const onMouseUp   = e => {
      if (Math.abs(e.clientX - downXY.x) > 6 || Math.abs(e.clientY - downXY.y) > 6) return;
      const { hit } = pickHit(e.clientX, e.clientY);
      const { oc: oc2, sel: sel2 } = propsRef.current;
      if (!hit) { oc2 && oc2(null); return; }
      const name = hit.object?.name;
      const hasMesh = !!Object.values(meshesRef.current).find(entry => entry?.mesh?.name === name);
      if (name && hasMesh) oc2 && oc2(name === sel2 ? null : name);
      invalidateRenderRef.current();
    };
    const onMouseLeave = () => {
      if (hoverIdleTimer) { clearTimeout(hoverIdleTimer); hoverIdleTimer = null; }
      if (!propsRef.current.cardsFrozen) clearHover();
      renderer.domElement.style.cursor = 'grab';
    };

    renderer.domElement.addEventListener('mousedown', onMouseDown);
    renderer.domElement.addEventListener('mousemove', onMouseMove);
    renderer.domElement.addEventListener('mouseleave', onMouseLeave);
    renderer.domElement.addEventListener('mouseup',   onMouseUp);

    const ro = new ResizeObserver(() => {
      const nw = mount.clientWidth || 1; const nh = mount.clientHeight || 1;
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
      renderer.setSize(nw, nh, false);
      invalidateRenderRef.current();
    });
    ro.observe(mount);

    return () => {
      cancelAnimationFrame(renderRafId);
      if (continuousRafId) cancelAnimationFrame(continuousRafId);
      if (hoverIdleTimer) { clearTimeout(hoverIdleTimer); hoverIdleTimer = null; }
      ro.disconnect();
      controls.removeEventListener('change', requestRender);
      renderer.domElement.removeEventListener('pointerdown', onControlsPointerDown);
      renderer.domElement.removeEventListener('pointerup', onControlsPointerUp);
      renderer.domElement.removeEventListener('mousedown', onMouseDown);
      renderer.domElement.removeEventListener('mousemove', onMouseMove);
      renderer.domElement.removeEventListener('mouseleave', onMouseLeave);
      renderer.domElement.removeEventListener('mouseup',   onMouseUp);
      // Dispose cloned geometries and materials (original cache not touched)
      Object.values(meshesRef.current).forEach(({ mesh }) => {
        try {
          mesh.geometry.dispose();
          const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
          mats.forEach(m => m && m.dispose());
        } catch(_) {}
      });
      renderer.domElement.style.cursor = '';
      invalidateRenderRef.current = () => {};
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      meshesRef.current = {};
      visibleMeshesRef.current = [];
      loadedRef.current = false;
      sceneRef.current = null;
    };
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  useEffect(() => {
    const q = clampQualitySettings(qualitySettings || QUALITY_DEFAULTS);
    propsRef.current.qualitySettings = q;
    const sc = sceneRef.current;
    if (!sc?.applyQuality) return;
    sc.applyQuality(q);
  }, [
    qualitySettings?.resolutionScale,
    qualitySettings?.raycastIntervalMs,
    qualitySettings?.renderMode,
  ]);

  // Apply material/visibility updates whenever any prop changes
  useEffect(() => {
    if (loadedRef.current) applyRef.current();
  });

  return (
    <div style={{width:"100%",height:"100%",position:"relative",background:C.bg,overflow:"hidden"}}>
      <div ref={mountRef} style={{width:"100%",height:"100%"}}/>

      {/* ── Loading overlay ── */}
      {loadState === 'loading' && (
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",gap:16,
          background:"rgba(4,7,15,0.82)",backdropFilter:"blur(3px)",pointerEvents:"none"}}>
          <div style={{position:"relative",width:48,height:48}}>
            <div style={{position:"absolute",inset:0,border:"2px solid rgba(59,130,246,0.15)",borderRadius:"50%"}}/>
            <div style={{position:"absolute",inset:0,border:"2px solid transparent",borderTopColor:C.blue,borderRadius:"50%",animation:"spin 1.1s linear infinite"}}/>
            <div style={{position:"absolute",inset:10,border:"1.5px solid transparent",borderTopColor:"rgba(34,211,238,0.4)",borderRadius:"50%",animation:"spin 0.7s linear infinite reverse"}}/>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,color:C.blue2,fontWeight:600,letterSpacing:"0.04em",marginBottom:8}}>Загрузка 3D-модели</div>
            {loadPct > 0 && (
              <div style={{marginBottom:8}}>
                <div style={{fontSize:11,color:C.text,fontFamily:C.mono,marginBottom:4}}>{loadPct}%</div>
                <div style={{width:140,height:3,background:"rgba(59,130,246,0.12)",borderRadius:2,margin:"0 auto"}}>
                  <div style={{height:"100%",width:`${loadPct}%`,background:C.blue,borderRadius:2,transition:"width 0.4s"}}/>
                </div>
              </div>
            )}

          </div>
        </div>
      )}

      {/* ── Error overlay ── */}
      {loadState === 'error' && errorInfo && (
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",padding:20,
          background:"rgba(4,7,15,0.93)",backdropFilter:"blur(4px)",overflowY:"auto"}}>
          <div style={{width:"100%",maxWidth:340}}>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{fontSize:22,flexShrink:0}}></div>
              <div>
                <div style={{fontSize:13,color:C.red2,fontWeight:700,lineHeight:1.3}}>{errorInfo.title}</div>
                <div style={{fontSize:9,color:C.muted,marginTop:2,fontFamily:C.mono}}>3D Model Error</div>
              </div>
            </div>

            {/* Reason */}
            <div style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",
              borderRadius:8,padding:"10px 12px",marginBottom:10}}>
              <div style={{fontSize:9,color:"rgba(239,68,68,0.7)",fontWeight:700,letterSpacing:"0.06em",
                textTransform:"uppercase",marginBottom:5}}>Причина</div>
              <div style={{fontSize:10,color:"rgba(220,200,200,0.85)",lineHeight:1.6}}>{errorInfo.reason}</div>
            </div>

            {/* Fix */}
            <div style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.18)",
              borderRadius:8,padding:"10px 12px",marginBottom:10}}>
              <div style={{fontSize:9,color:"rgba(16,185,129,0.7)",fontWeight:700,letterSpacing:"0.06em",
                textTransform:"uppercase",marginBottom:5}}>Решение</div>
              <div style={{fontSize:10,color:"rgba(190,230,210,0.85)",lineHeight:1.7,whiteSpace:"pre-line"}}>{errorInfo.fix}</div>
            </div>

            {/* Error code */}
            {errorInfo.code && (
              <div style={{background:"rgba(0,0,0,0.4)",borderRadius:6,padding:"7px 10px",marginBottom:10}}>
                <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.06em",
                  textTransform:"uppercase",marginBottom:3}}>Код / Сообщение</div>
                <div style={{fontSize:9,fontFamily:C.mono,color:"rgba(249,115,22,0.8)",
                  wordBreak:"break-all",lineHeight:1.6}}>{errorInfo.code}</div>
              </div>
            )}

            {/* Diagnostics log */}
            {diagLog.length > 0 && (
              <div style={{background:"rgba(0,0,0,0.35)",borderRadius:6,padding:"7px 10px"}}>
                <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.06em",
                  textTransform:"uppercase",marginBottom:5}}>Лог диагностики</div>
                {diagLog.map((l,i) => (
                  <div key={i} style={{fontSize:9,fontFamily:C.mono,lineHeight:1.7,
                    color: l.type==='ok'?C.green2 : l.type==='warn'?C.orange2 : C.muted}}>
                    {l.msg}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {showPerfHud && perfHud && loadState === 'ok' && (
        <div style={{
          position: "absolute",
          right: 12,
          bottom: 12,
          zIndex: 92,
          pointerEvents: "none",
          minWidth: 180,
          padding: "7px 9px",
          borderRadius: 10,
          background: "rgba(2, 8, 18, 0.78)",
          border: "1px solid rgba(3,194,252,0.2)",
          backdropFilter: "blur(10px)",
          color: "rgba(190,225,255,0.9)",
          fontFamily: C.mono,
          fontSize: 10,
          lineHeight: 1.5,
        }}>
          <div>FPS: {perfHud.fps.toFixed(1)} / {perfStateRef.current.targetFps}</div>
          <div>DPR: {perfHud.dpr.toFixed(2)}</div>
          <div>Draw calls: {perfHud.calls}</div>
          <div>Triangles: {perfHud.triangles.toLocaleString("ru-RU")}</div>
        </div>
      )}

      {/* ── Navigation controls ── */}
      {loadState === 'ok' && !externalNav && (
        <NavControls3D sceneRef={sceneRef}/>
      )}
    </div>
  );
}

/* ─── 3D NAV CONTROLS (draggable, collapsible) ──────────────── */
function NavControls3D({ sceneRef, dockStyle }) {
  const [visible, setVisible] = React.useState(true);
  const [pos, setPos] = React.useState({ x: null, y: null });
  const [collapsed, setCollapsed] = React.useState(false);
  const dragRef = React.useRef(null);
  const isDragging = React.useRef(false);
  const dragStart = React.useRef({ mx: 0, my: 0, px: 0, py: 0 });

  const onDragStart = (e) => {
    if (e.button !== 0) return;
    const el = dragRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    isDragging.current = true;
    dragStart.current = { mx: e.clientX, my: e.clientY, px: rect.left, py: rect.top };
    e.preventDefault();
    const onMove = (ev) => {
      if (!isDragging.current) return;
      setPos({ x: dragStart.current.px + ev.clientX - dragStart.current.mx, y: dragStart.current.py + ev.clientY - dragStart.current.my });
    };
    const onUp = () => { isDragging.current = false; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  const btnBase = {
    width:28, height:28, borderRadius:6,
    border:"1px solid rgba(148,180,220,0.16)",
    background:"rgba(8,14,26,0.90)",
    cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
    backdropFilter:"blur(8px)", transition:"all 0.15s",
    color:"rgba(120,145,180,0.75)", flexShrink:0,
  };

  const containerStyle = pos.x !== null ? {
    position:"fixed", left: pos.x, top: pos.y, zIndex: 20,
  } : {
    position:(dockStyle && dockStyle.position)||"absolute",
    top:(dockStyle && dockStyle.top) ?? 8,
    right:(dockStyle && dockStyle.right),
    left:(dockStyle && dockStyle.left),
    bottom:(dockStyle && dockStyle.bottom),
    zIndex:(dockStyle && dockStyle.zIndex)||20,
    ...(dockStyle||{}),
  };

  const goView = view => {
    const s = sceneRef.current; if (!s) return;
    const d = s.initCamPos.length();
    const t = s.initTarget || new THREE.Vector3();
    const zu = s.isZUp;
    let p;
    if (view==="front") p = zu ? new THREE.Vector3(0,-d,t.z) : new THREE.Vector3(0,t.y,d);
    else if (view==="back") p = zu ? new THREE.Vector3(0,d,t.z) : new THREE.Vector3(0,t.y,-d);
    else p = zu ? new THREE.Vector3(d,0,t.z) : new THREE.Vector3(d,t.y,0);
    s.camera.position.copy(p); s.controls.target.copy(t); s.controls.update();
    s.invalidate && s.invalidate();
  };

  return (
    <div ref={dragRef} style={{...containerStyle, userSelect:"none"}}>
      {/* drag handle + collapse toggle header */}
      <div onMouseDown={onDragStart}
        style={{display:"flex",flexDirection:"column",gap:3,cursor:"grab",padding:2}}>
        {/* Toggle visibility row */}
        <div style={{display:"flex",gap:3,alignItems:"center"}}>
          {/* drag dots */}
          <div style={{width:8,display:"flex",flexDirection:"column",gap:2,padding:"3px 0",opacity:0.35}}>
            {[0,1,2].map(i=><div key={i} style={{display:"flex",gap:2}}>{[0,1].map(j=><div key={j} style={{width:2,height:2,borderRadius:"50%",background:"rgba(148,180,220,0.8)"}}/>)}</div>)}
          </div>
          <button title={collapsed?"Развернуть":"Свернуть"} onMouseDown={e=>e.stopPropagation()} onClick={()=>setCollapsed(v=>!v)}
            style={{...btnBase, color: collapsed?"rgba(3,194,252,0.9)":"rgba(120,145,180,0.6)", border:`1px solid ${collapsed?"rgba(3,194,252,0.4)":"rgba(148,180,220,0.12)"}`}}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              {collapsed
                ? <path d="M2 4l4 4 4-4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                : <path d="M2 8l4-4 4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>}
            </svg>
          </button>
        </div>

        {!collapsed && <>
          {/* Reset */}
          <button title="Сбросить вид" onMouseDown={e=>e.stopPropagation()}
            onClick={()=>{const s=sceneRef.current;if(!s)return;s.camera.position.copy(s.initCamPos);s.controls.target.copy(s.initTarget||new THREE.Vector3());s.controls.update();s.invalidate&&s.invalidate();}}
            style={{...btnBase,color:"#93c5fd"}}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 7A5 5 0 1 0 7 2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><polyline points="2,2 2,7 7,7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
          </button>
          {/* Zoom + */}
          <button title="Приблизить" onMouseDown={e=>e.stopPropagation()}
            onClick={()=>{const s=sceneRef.current;if(!s)return;s.camera.position.multiplyScalar(0.75);s.controls.update();s.invalidate&&s.invalidate();}}
            style={btnBase}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" strokeWidth="1.4"/><line x1="6" y1="4" x2="6" y2="8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
          </button>
          {/* Zoom - */}
          <button title="Отдалить" onMouseDown={e=>e.stopPropagation()}
            onClick={()=>{const s=sceneRef.current;if(!s)return;s.camera.position.multiplyScalar(1.33);s.controls.update();s.invalidate&&s.invalidate();}}
            style={btnBase}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" strokeWidth="1.4"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
          </button>
          <div style={{height:1,background:"rgba(148,180,220,0.1)",margin:"1px 4px"}}/>
          {/* Front */}
          <button title="Спереди" onMouseDown={e=>e.stopPropagation()} onClick={()=>goView("front")} style={btnBase}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" strokeWidth="1.3"/><circle cx="7" cy="7" r="2" stroke="currentColor" strokeWidth="1.2"/></svg>
          </button>
          {/* Back */}
          <button title="Сзади" onMouseDown={e=>e.stopPropagation()} onClick={()=>goView("back")} style={btnBase}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" strokeWidth="1.3"/><rect x="4" y="4" width="6" height="6" rx="1" stroke="currentColor" strokeWidth="1.2"/></svg>
          </button>
          {/* Side */}
          <button title="Сбоку" onMouseDown={e=>e.stopPropagation()} onClick={()=>goView("side")} style={btnBase}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" strokeWidth="1.3"/><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" strokeWidth="1.2"/></svg>
          </button>
        </>}
      </div>
    </div>
  );
}


const ORGAN_CHART_ALLOWLIST = new Set([
  "heart","liver","kidney_left","kidney_right","lung_left","lung_right",
  "brain","thyroid","pancreas","prostate","uterus"
]);

function organStatusMeta(status) {
  if (status === "sick") return { label:"Патология", color:C.red2, bg:"rgba(239,68,68,0.1)", border:"rgba(239,68,68,0.26)" };
  if (status === "warning") return { label:"Наблюдение", color:C.orange2, bg:"rgba(249,115,22,0.1)", border:"rgba(249,115,22,0.26)" };
  if (status === "healthy") return { label:"Норма", color:C.green2, bg:"rgba(16,185,129,0.1)", border:"rgba(16,185,129,0.24)" };
  return { label:"Нет данных", color:C.blue2, bg:"rgba(3,194,252,0.08)", border:"rgba(3,194,252,0.2)" };
}

function parseNumericMetric(raw) {
  const s = String(raw ?? "").replace(",", ".").trim();
  if (!s) return null;
  const match = s.match(/-?\d+(?:\.\d+)?/);
  if (!match) return null;
  const val = Number(match[0]);
  return Number.isFinite(val) ? val : null;
}

function buildOrganHoverModel(hoverInfo) {
  if (!hoverInfo) return null;
  const oid = canonicalizeOrganId(hoverInfo.organId || hoverInfo.entry?.organ_id || hoverInfo.meshName);
  const meta = OM[oid] || {};
  const entry = hoverInfo.entry || {};
  let labValues = {};
  try { labValues = JSON.parse(entry.lab_values || "{}"); } catch {}

  const metrics = Object.entries(labValues)
    .map(([key, raw]) => ({ key, raw: String(raw), numeric: parseNumericMetric(raw) }))
    .filter(item => item.raw);

  const numericMetrics = metrics.filter(item => item.numeric !== null);
  const showCharts = ORGAN_CHART_ALLOWLIST.has(oid) && numericMetrics.length > 0;

  return {
    organId: oid,
    organName: hoverInfo.organName || meta.n || translateMeshLabel(hoverInfo.meshName) || prettyMeshLabel(hoverInfo.meshName) || oid,
    meshLabel: translateMeshLabel(hoverInfo.meshName),
    emoji: meta.e || "•",
    status: entry._nlpUpgrade || entry.status || hoverInfo.status || "none",
    statusMeta: organStatusMeta(entry._nlpUpgrade || entry.status || hoverInfo.status || "none"),
    studyType: entry.study_type || "",
    studyDate: entry.study_date || "",
    findings: entry.findings || "",
    notes: entry.notes || "",
    metrics,
    numericMetrics,
    showCharts,
  };
}

function OrganMetricChart({ items }) {

  return (

/* ─── X-RAY LABEL OVERLAY — cinematic broken-line info labels ──────── */
function HoverOrganOverlay({ hoverInfo, onCardClick, frozen = false, minCardGapPx = 30, maxCards = 8 }) {
  const [animated, setAnimated] = React.useState(false);
  const prevKey = React.useRef(null);
  const key = hoverInfo ? `${hoverInfo.anchor?.x|0},${hoverInfo.anchor?.y|0}|${(hoverInfo.xrayHits||[]).map(h=>h.meshName).join("|")}` : null;

  React.useEffect(() => {
    if (!key) return;
    if (frozen) {
      setAnimated(true);
      prevKey.current = key;
      return;
    }
    if (key !== prevKey.current) {
      setAnimated(false);
      prevKey.current = key;
      requestAnimationFrame(() => requestAnimationFrame(() => setAnimated(true)));
    }
  }, [key, frozen]);

  if (!hoverInfo || !hoverInfo.rect || !hoverInfo.xrayHits?.length) return null;

  const hits = hoverInfo.xrayHits.slice(0, Math.max(1, Math.min(12, maxCards)));
  const { rect, anchor } = hoverInfo;
  const PAD = 40;
  const px = rect.left + anchor.x;
  const py = rect.top + anchor.y;
  const cLeft = rect.left + PAD;
  const cRight = rect.right - PAD;
  const cTop = rect.top + PAD;
  const cBottom = rect.bottom - PAD;

  const STATUS_COLOR = { sick:"#fca5a5", warning:"#fdba74", healthy:"#34d399", none:"#93c5fd" };
  const minLabelGap = Math.max(30, minCardGapPx);
  const labelHeight = 24;
  const minX = cLeft + 8;
  const minY = cTop + 14;
  const maxY = cBottom - 14;

  const estimateLabelWidth = (txt) => Math.max(140, Math.min(320, Math.round((String(txt || "").length * 7.2) + 28)));
  const makeSeededRandom = (seedText) => {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < seedText.length; i++) {
      h ^= seedText.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return () => {
      h += 0x6D2B79F5;
      let t = Math.imul(h ^ (h >>> 15), 1 | h);
      t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  };
  const rand = makeSeededRandom(`${key || ""}|${hits.map(h => h.meshName).join("|")}`);
  const boxesOverlap = (a, b, pad = minLabelGap) =>
    !(a.left >= b.left + b.width + pad ||
      a.left + a.width + pad <= b.left ||
      a.top >= b.top + b.height + pad ||
      a.top + a.height + pad <= b.top);

  const orderedHits = [...hits].sort((a, b) => (b.priority ?? 0) - (a.priority ?? 0));
  const labelPositions = [];
  orderedHits.forEach((hit, i) => {
    const width = estimateLabelWidth(hit.organName);
    const maxX = Math.max(minX, cRight - width - 6);
    let placed = null;
    for (let attempt = 0; attempt < 360; attempt++) {
      const lx = minX + rand() * Math.max(1, maxX - minX);
      const ly = minY + rand() * Math.max(1, maxY - minY);
      if (Math.hypot(lx - px, ly - py) < 58) continue;
      const box = { left: lx, top: ly - labelHeight / 2, width, height: labelHeight };
      if (labelPositions.every(prev => !boxesOverlap(box, prev.box))) {
        placed = { lx, ly, box, hit, idx: i, labelWidth: width };
        break;
      }
    }
    if (placed) labelPositions.push(placed);
  });

  if (!labelPositions.length) return null;

  return (
    <>
      {/* SVG: probe + orthogonal lines */}
      <svg style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:88,overflow:"visible",width:"100%",height:"100%"}}>
        <defs>
          <filter id="xrGlow">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <circle cx={px} cy={py} r="5" fill="rgba(3,194,252,0.9)" filter="url(#xrGlow)"/>
        <circle cx={px} cy={py} r="9" fill="none" stroke="rgba(3,194,252,0.4)" strokeWidth="1"/>

        {labelPositions.map(({ lx, ly, hit }, i) => {
          const color = STATUS_COLOR[hit.status] || STATUS_COLOR.none;
          const delay = i * 0.04;
          const dashLen = Math.abs(lx - px) + Math.abs(ly - py) + 2;
          return (
            <g key={i}>
              <polyline
                points={`${px},${py} ${lx},${py} ${lx},${ly}`}
                fill="none"
                stroke={color}
                strokeWidth="1"
                strokeOpacity="0.55"
                strokeDasharray={dashLen}
                strokeDashoffset={animated ? 0 : dashLen}
                style={{ transition: `stroke-dashoffset 0.35s ease ${delay}s` }}
              />
              <circle cx={lx} cy={ly} r="2.5" fill={color} opacity={animated ? 0.9 : 0}
                style={{ transition: `opacity 0.2s ease ${delay + 0.28}s` }}/>
            </g>
          );
        })}
      </svg>

      {labelPositions.map(({ lx, ly, hit, labelWidth }, i) => {
        const color = STATUS_COLOR[hit.status] || STATUS_COLOR.none;
        const delay = i * 0.04 + 0.18;
        return (
          <button key={`${hit.meshName}_${i}`}
            onClick={() => onCardClick && onCardClick(hit)}
            title={hit.organName}
            style={{
              position:"fixed",
              left: lx,
              top: ly,
              transform:"translateY(-50%)",
              pointerEvents:"auto",
              cursor:"pointer",
              zIndex:89,
              color,
              fontSize:11,
              fontWeight:700,
              fontFamily:"'Sora',system-ui,sans-serif",
              letterSpacing:"0.02em",
              whiteSpace:"nowrap",
              width: labelWidth,
              maxWidth: 320,
              overflow:"hidden",
              textOverflow:"ellipsis",
              opacity: animated ? 1 : 0,
              transition:`opacity 0.22s ease ${delay}s, color 0.15s`,
              textShadow:`0 0 12px ${color}55`,
              userSelect:"none",
              background:"transparent",
              border:"none",
              padding:0,
              textAlign:"left",
              lineHeight:"24px",
            }}
            onMouseEnter={e => { e.currentTarget.style.opacity = "0.72"; }}
            onMouseLeave={e => { e.currentTarget.style.opacity = "1"; }}
          >
            {hit.organName}
          </button>
        );
      })}
    </>
  );
}

      {/* scan lines */}
      {[...Array(12)].map((_,i)=><div key={i} style={{position:"absolute",top:`${5+i*8}%`,left:"4%",right:"4%",height:1,background:`rgba(0,200,120,${0.015+Math.abs(Math.sin(i*0.8))*0.02})`}}/>)}

  { name: "skeletal",       label: "Костная система",                  icon: "" },
  { name: "joints",         label: "Суставы",                          icon: "" },
  { name: "visceral",       label: "Органы",                           icon: "" },

  { name: "nervous",        label: "Нервная система и органы чувств",  icon: "" },
