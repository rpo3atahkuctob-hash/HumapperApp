<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════
   SQL DATABASE LAYER
═══════════════════════════════════════════════ */
let sqlDB = null;
let sqlModule = null;
let dbReady = false;
const dbReadyCallbacks = [];
const DB_STORAGE_KEY_LEGACY = "medvis_db";
const DB_IDB_NAME = "humapper_store_v1";
const DB_IDB_STORE = "kv";
const DB_IDB_KEY = "medvis_db_bin";
const DB_LOCALSTORAGE_MAX_BYTES = 1200000;
const CLOUD_SYNC_META_KEY = "humapper_cloud_meta_v1";
const CLOUD_SYNC_DEBOUNCE_MS = 1400;
const cloudSyncState = {
  activeDoctorKey: "",
  timer: null,
  inFlight: false,
  pending: false,
};

function onDbReady(fn) {
  if (dbReady) fn();
  else dbReadyCallbacks.push(fn);
}

function isQuotaExceededError(err) {
  if (!err) return false;
  return err.name === "QuotaExceededError" || err.code === 22 || err.code === 1014;
}

function openPersistStore() {
  return new Promise((resolve, reject) => {
    if (typeof indexedDB === "undefined") {
      reject(new Error("IndexedDB unavailable"));
      return;
    }
    const req = indexedDB.open(DB_IDB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(DB_IDB_STORE)) db.createObjectStore(DB_IDB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
  });
}

function idbSetValue(key, value) {
  return openPersistStore().then(db => new Promise((resolve, reject) => {
    let settled = false;
    const finalize = (fn) => {
      if (settled) return;
      settled = true;
      try { db.close(); } catch (_) {}
      fn();
    };
    const tx = db.transaction(DB_IDB_STORE, "readwrite");
    tx.objectStore(DB_IDB_STORE).put(value, key);
    tx.oncomplete = () => finalize(() => resolve(true));
    tx.onabort = () => finalize(() => reject(tx.error || new Error("IndexedDB write aborted")));
    tx.onerror = () => finalize(() => reject(tx.error || new Error("IndexedDB write failed")));
  }));
}

function idbGetValue(key) {
  return openPersistStore().then(db => new Promise((resolve, reject) => {
    let settled = false;
    const finalize = (fn) => {
      if (settled) return;
      settled = true;
      try { db.close(); } catch (_) {}
      fn();
    };
    const tx = db.transaction(DB_IDB_STORE, "readonly");
    const req = tx.objectStore(DB_IDB_STORE).get(key);
    req.onsuccess = () => finalize(() => resolve(req.result ?? null));
    req.onerror = () => finalize(() => reject(req.error || new Error("IndexedDB read failed")));
    tx.onabort = () => finalize(() => reject(tx.error || new Error("IndexedDB read aborted")));
    tx.onerror = () => finalize(() => reject(tx.error || new Error("IndexedDB read tx failed")));
  }));
}

function asUint8Array(value) {
  if (!value) return null;
  if (value instanceof Uint8Array) return value;
  if (value instanceof ArrayBuffer) return new Uint8Array(value);
  if (Array.isArray(value)) return new Uint8Array(value);
  return null;
}

function persistDbBytes(bytes) {
  const safe = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes || []);
  if (!safe.length) return;
  if (safe.byteLength <= DB_LOCALSTORAGE_MAX_BYTES) {
    try {
      localStorage.setItem(DB_STORAGE_KEY_LEGACY, JSON.stringify(Array.from(safe)));
      return;
    } catch (e) {
      if (!isQuotaExceededError(e)) {
        console.error("DB persist localStorage failed:", e);
        return;
      }
    }
  }
  const ab = safe.buffer.slice(safe.byteOffset, safe.byteOffset + safe.byteLength);
  idbSetValue(DB_IDB_KEY, ab)
    .then(() => {
      try { localStorage.removeItem(DB_STORAGE_KEY_LEGACY); } catch (_) {}
    })
    .catch(e => console.error("DB persist IndexedDB failed:", e));
}

async function loadPersistedDbBytes() {
  try {
    const fromIdb = asUint8Array(await idbGetValue(DB_IDB_KEY));
    if (fromIdb && fromIdb.length) return fromIdb;
  } catch (e) {
    console.warn("DB load from IndexedDB skipped:", e);
  }
  try {
    const saved = localStorage.getItem(DB_STORAGE_KEY_LEGACY);
    if (!saved) return null;
    return asUint8Array(JSON.parse(saved));
  } catch (e) {
    console.warn("DB load from localStorage skipped:", e);
    try { localStorage.removeItem(DB_STORAGE_KEY_LEGACY); } catch (_) {}
    return null;
  }
}

function uint8ToBase64(bytes) {
  const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes || []);
  if (!arr.length) return "";
  const CHUNK = 0x8000;
  let out = "";
  for (let i = 0; i < arr.length; i += CHUNK) {
    out += String.fromCharCode.apply(null, arr.subarray(i, i + CHUNK));
  }
  return btoa(out);
}

function base64ToUint8(base64) {
  const raw = atob(String(base64 || ""));
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}

function readCloudMeta() {
  try {
    const raw = localStorage.getItem(CLOUD_SYNC_META_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === "object" ? parsed : {};
  } catch (_) {
    return {};
  }
}

function writeCloudMeta(next) {
  try {
    localStorage.setItem(CLOUD_SYNC_META_KEY, JSON.stringify(next || {}));
  } catch (_) {}
}

function normalizeDoctorCloudKey(user) {
  if (!user || user.role !== "doctor") return "";
  const base = String(user.email || user.id || "").trim().toLowerCase();
  return base.slice(0, 190);
}

function setCloudSyncUser(user) {
  cloudSyncState.activeDoctorKey = normalizeDoctorCloudKey(user);
}

async function sha256Hex(bytes) {
  const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes || []);
  if (!arr.length || !window.crypto?.subtle) return "";
  const digest = await window.crypto.subtle.digest("SHA-256", arr);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function scheduleCloudPush(delayMs = CLOUD_SYNC_DEBOUNCE_MS) {
  if (!cloudSyncState.activeDoctorKey) return;
  if (cloudSyncState.timer) clearTimeout(cloudSyncState.timer);
  cloudSyncState.timer = setTimeout(() => {
    cloudSyncState.timer = null;
    cloudPushNow(false);
  }, Math.max(300, Number(delayMs) || CLOUD_SYNC_DEBOUNCE_MS));
}

async function cloudPushNow(force = false) {
  const doctorKey = cloudSyncState.activeDoctorKey;
  if (!doctorKey || !sqlDB) return { ok: false, reason: "inactive" };
  if (cloudSyncState.inFlight) {
    cloudSyncState.pending = true;
    return { ok: false, reason: "busy" };
  }

  cloudSyncState.inFlight = true;
  try {
    const bytes = sqlDB.export();
    if (!bytes?.length) return { ok: false, reason: "empty" };

    const sha = await sha256Hex(bytes);
    const meta = readCloudMeta();
    const prevSha = String(meta?.[doctorKey]?.lastPushedSha || "");
    if (!force && sha && prevSha === sha) return { ok: true, skipped: true };

    const db_b64 = uint8ToBase64(bytes);
    const resp = await fetch(`/api/cloud-db/${encodeURIComponent(doctorKey)}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        db_b64,
        db_sha256: sha || "",
        client_ts: new Date().toISOString()
      })
    });
    if (!resp.ok) {
      const txt = await resp.text().catch(() => "");
      throw new Error(txt || `cloud_push_${resp.status}`);
    }
    const payload = await resp.json().catch(() => ({}));
    const nextMeta = readCloudMeta();
    nextMeta[doctorKey] = {
      lastPushedSha: String(payload?.db_sha256 || sha || ""),
      lastRemoteUpdatedAt: String(payload?.updated_at || new Date().toISOString()),
    };
    writeCloudMeta(nextMeta);
    return { ok: true };
  } catch (e) {
    console.warn("[HuMapper] cloud push failed:", e);
    return { ok: false, reason: "exception", error: String(e?.message || e) };
  } finally {
    cloudSyncState.inFlight = false;
    if (cloudSyncState.pending) {
      cloudSyncState.pending = false;
      scheduleCloudPush(800);
    }
  }
}

async function cloudPullForUser(user) {
  const doctorKey = normalizeDoctorCloudKey(user);
  if (!doctorKey || !sqlModule || !sqlDB) return { ok: false, reason: "inactive" };

  try {
    const resp = await fetch(`/api/cloud-db/${encodeURIComponent(doctorKey)}`, { cache: "no-store" });
    if (resp.status === 404) return { ok: false, reason: "empty_remote" };
    if (!resp.ok) {
      const txt = await resp.text().catch(() => "");
      throw new Error(txt || `cloud_pull_${resp.status}`);
    }
    const remote = await resp.json();
    const remoteB64 = String(remote?.db_b64 || "");
    if (!remoteB64) return { ok: false, reason: "invalid_remote" };
    const remoteBytes = base64ToUint8(remoteB64);
    if (!remoteBytes.length) return { ok: false, reason: "invalid_remote_bytes" };

    const localSha = await sha256Hex(sqlDB.export());
    const remoteSha = String(remote?.db_sha256 || "");
    if (localSha && remoteSha && localSha === remoteSha) {
      const m0 = readCloudMeta();
      m0[doctorKey] = {
        lastPushedSha: remoteSha,
        lastRemoteUpdatedAt: String(remote?.updated_at || new Date().toISOString()),
      };
      writeCloudMeta(m0);
      return { ok: true, skipped: true, reason: "same_hash" };
    }

    const meta = readCloudMeta();
    const lastKnown = Date.parse(String(meta?.[doctorKey]?.lastRemoteUpdatedAt || ""));
    const remoteTs = Date.parse(String(remote?.updated_at || ""));
    if (Number.isFinite(lastKnown) && Number.isFinite(remoteTs) && remoteTs <= lastKnown) {
      return { ok: true, skipped: true, reason: "remote_not_newer" };
    }

    const nextMeta = readCloudMeta();
    nextMeta[doctorKey] = {
      lastPushedSha: remoteSha || "",
      lastRemoteUpdatedAt: String(remote?.updated_at || new Date().toISOString()),
    };
    writeCloudMeta(nextMeta);

    sqlDB = new sqlModule.Database(remoteBytes);
    ensureAppSchema();
    saveDB();
    pub("organ_updated", { source: "cloud_pull", doctorKey });
    return { ok: true, replaced: true };
  } catch (e) {
    console.warn("[HuMapper] cloud pull failed:", e);
    return { ok: false, reason: "exception", error: String(e?.message || e) };
  }
}

async function initDB() {
  const SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
  });
  sqlModule = SQL;
  
  // Load from persisted storage (IndexedDB preferred, localStorage legacy fallback)
  const persisted = await loadPersistedDbBytes();
  if (persisted && persisted.length) {
    sqlDB = new SQL.Database(persisted);
  } else {
    sqlDB = new SQL.Database();
    sqlDB.run(`
      CREATE TABLE IF NOT EXISTS users (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        email TEXT UNIQUE NOT NULL,
        pw TEXT NOT NULL,
        role TEXT NOT NULL,
        name TEXT NOT NULL,
        gender TEXT DEFAULT 'male',
        spec TEXT DEFAULT '',
        av TEXT DEFAULT ''
      );
      CREATE TABLE IF NOT EXISTS patients (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        name TEXT NOT NULL,
        gender TEXT DEFAULT 'male',
        dob TEXT DEFAULT '',
        address TEXT DEFAULT '',
        phone TEXT DEFAULT '',
        user_id INTEGER,
        doctor_id INTEGER DEFAULT 1,
        last_visit TEXT DEFAULT ''
      );
      CREATE TABLE IF NOT EXISTS organ_data (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        patient_id INTEGER NOT NULL,
        organ_id TEXT NOT NULL,
        status TEXT DEFAULT 'none',
        study_type TEXT DEFAULT '',
        study_date TEXT DEFAULT '',
        findings TEXT DEFAULT '',
        lab_values TEXT DEFAULT '{}',
        fracture_status TEXT DEFAULT '',
        notes TEXT DEFAULT '',
        UNIQUE(patient_id, organ_id)
      );
    `);
    // Seed demo data
    sqlDB.run(`INSERT INTO users(email,pw,role,name,gender,spec,av) VALUES
      ('dr@demo.com','demo','doctor','Смирнов Алексей Владимирович','male','Терапевт','СА'),
      ('p@demo.com','demo','patient','Демо Пациент Иванов','male','','ДП')`);
    sqlDB.run(`INSERT INTO patients(name,gender,dob,address,phone,user_id,doctor_id,last_visit) VALUES
      ('Демо Пациент Иванов','male','15.03.1985','г. Москва, ул. Ленина 12','+7 999 123-45-67',2,1,'26.02.2025')`);
    // Seed some organ data for demo patient
    sqlDB.run(`INSERT INTO organ_data(patient_id,organ_id,status,study_type,study_date,findings,lab_values,notes) VALUES
      (1,'heart','sick','ЭКГ + ЭхоКГ','15.02.2025','Фракция выброса 38%. Дилатация левого желудочка. Митральная регургитация II степени. Признаки гипертрофии ЛЖ.','{"ФВ":"38%","КДО":"220 мл","КСО":"135 мл","АД":"145/92 мм рт.ст."}','Бисопролол 5 мг/сут, Лизиноприл 10 мг/сут. Контроль ЭхоКГ через 3 месяца.'),
      (1,'lung_right','healthy','КТ грудной клетки','20.02.2025','Очаговых и инфильтративных изменений не выявлено. Лёгочный рисунок не усилен. Синусы свободны.','{"SpO2":"98%","ЧДД":"16/мин"}',''),
      (1,'liver','warning','УЗИ брюшной полости','18.02.2025','Увеличение размеров печени: КВР правой доли 175 мм. Умеренно повышенная эхогенность паренхимы. Признаки жировой дистрофии I-II ст.','{"АЛТ":"68 Ед/л","АСТ":"52 Ед/л","Билирубин":"24 мкмоль/л"}','Диета, гепатопротекторы: Эссенциале 2 капс х3/сут 3 мес.')`);
  }
  ensureAppSchema();
  saveDB();
  
  dbReady = true;
  dbReadyCallbacks.forEach(f => f());
}

function saveDB() {
  if (!sqlDB) return;
  const data = sqlDB.export();
  persistDbBytes(data);
  scheduleCloudPush();
}

function dbQuery(sql, params = []) {
  if (!sqlDB) return [];
  try {
    const res = sqlDB.exec(sql, params);
    if (!res.length) return [];
    return res[0].values.map(row => {
      const obj = {};
      res[0].columns.forEach((col, i) => obj[col] = row[i]);
      return obj;
    });
  } catch(e) { console.error('DB query error:', e, sql); return []; }
}

function dbRun(sql, params = []) {
  if (!sqlDB) return false;
  try { sqlDB.run(sql, params); saveDB(); return true; }
  catch(e) { console.error('DB run error:', e); return false; }
}

function dbGetOne(sql, params = []) {
  const rows = dbQuery(sql, params);
  return rows[0] || null;
}

function dbTransaction(workFn) {
  if (!sqlDB) return false;
  try {
    sqlDB.run("BEGIN");
    workFn((sql, params = []) => sqlDB.run(sql, params));
    sqlDB.run("COMMIT");
    saveDB();
    return true;
  } catch (e) {
    try { sqlDB.run("ROLLBACK"); } catch (_) {}
    console.error("DB transaction error:", e);
    return false;
  }
}

function ensureAppSchema() {
  if (!sqlDB) return;
  try {
    sqlDB.run(`
      CREATE TABLE IF NOT EXISTS timeline_items (
        id TEXT PRIMARY KEY,
        patient_id INTEGER NOT NULL,
        organ_id TEXT NOT NULL,
        date_iso TEXT NOT NULL,
        study_type TEXT DEFAULT '',
        source TEXT DEFAULT '',
        dicom_refs TEXT DEFAULT '[]',
        conclusion TEXT DEFAULT '',
        color TEXT DEFAULT 'gray',
        subtype TEXT DEFAULT '',
        ai_confidence REAL DEFAULT 0,
        ttl_days INTEGER DEFAULT 0,
        notes TEXT DEFAULT '',
        status TEXT DEFAULT 'completed',
        payload TEXT DEFAULT '{}'
      );
    `);
    sqlDB.run("CREATE INDEX IF NOT EXISTS idx_timeline_patient_date ON timeline_items(patient_id, date_iso)");
    sqlDB.run("CREATE INDEX IF NOT EXISTS idx_timeline_patient_organ ON timeline_items(patient_id, organ_id)");
  } catch (e) {
    console.error("Schema migration timeline_items failed:", e);
  }
  try { sqlDB.run("ALTER TABLE patients ADD COLUMN external_id TEXT DEFAULT ''"); } catch (_) {}
}

const QUALITY_STORAGE_KEY = "humapper_quality_v1";
const QUALITY_DEFAULTS = {
  resolutionScale: 1,
  raycastIntervalMs: 35,
  maxInfoCards: 8,
  renderMode: "onDemand", // onDemand | continuous
};

function clampNum(v, min, max, fb) {
  const n = Number(v);
  if (!Number.isFinite(n)) return fb;
  return Math.max(min, Math.min(max, n));
}

function clampQualitySettings(raw = {}) {
  return {
    resolutionScale: clampNum(raw.resolutionScale, 0.6, 1.6, QUALITY_DEFAULTS.resolutionScale),
    raycastIntervalMs: Math.round(clampNum(raw.raycastIntervalMs, 16, 200, QUALITY_DEFAULTS.raycastIntervalMs)),
    maxInfoCards: Math.round(clampNum(raw.maxInfoCards, 1, 12, QUALITY_DEFAULTS.maxInfoCards)),
    renderMode: raw.renderMode === "continuous" ? "continuous" : "onDemand",
  };
}

function loadQualitySettings() {
  try {
    const raw = localStorage.getItem(QUALITY_STORAGE_KEY);
    if (!raw) return { ...QUALITY_DEFAULTS };
    return clampQualitySettings(JSON.parse(raw));
  } catch (_) {
    return { ...QUALITY_DEFAULTS };
  }
}

function saveQualitySettings(settings) {
  try {
    localStorage.setItem(QUALITY_STORAGE_KEY, JSON.stringify(clampQualitySettings(settings)));
  } catch (_) {}
}

const GITHUB_DATASET_SCHEMA = "humapper-patientdb/v1";

function resolveGitHubDatasetUrl(inputUrl) {
  try {
    const u = new URL(String(inputUrl || "").trim());
    if (!/^https?:$/.test(u.protocol)) {
      return { ok: false, error: "Поддерживаются только http/https ссылки." };
    }
    const host = u.hostname.toLowerCase();
    if (host === "raw.githubusercontent.com") {
      return { ok: true, url: u.toString() };
    }
    if (host !== "github.com") {
      return { ok: false, error: "Поддерживаются только github.com и raw.githubusercontent.com." };
    }
    const parts = u.pathname.split("/").filter(Boolean);
    if (parts.length >= 5 && parts[2] === "blob") {
      const owner = parts[0];
      const repo = parts[1].replace(/\.git$/i, "");
      const branch = parts[3];
      const filePath = parts.slice(4).join("/");
      if (!filePath.toLowerCase().endsWith(".json")) {
        return { ok: false, error: "Нужна ссылка на JSON-файл (оканчивается на .json)." };
      }
      return { ok: true, url: `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}` };
    }
    if (parts.length >= 5 && parts[2] === "raw") {
      const owner = parts[0];
      const repo = parts[1].replace(/\.git$/i, "");
      const branch = parts[3];
      const filePath = parts.slice(4).join("/");
      return { ok: true, url: `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}` };
    }
    if (parts.length >= 2) {
      return { ok: false, error: "Укажите ссылку на конкретный файл JSON (формат github.com/.../blob/.../file.json)." };
    }
    return { ok: false, error: "Некорректная ссылка GitHub." };
  } catch (_) {
    return { ok: false, error: "Некорректный URL." };
  }
}

function isGithubRawUrl(url) {
  return resolveGitHubDatasetUrl(url).ok;
}

function signalToStatus(color, subtype = "") {
  const c = String(color || "").toLowerCase();
  if (c === "red") return "sick";
  if (c === "orange" || c === "yellow") return "warning";
  if (c === "blue") return /technical|artefact|artifact/.test(String(subtype || "").toLowerCase()) ? "warning" : "none";
  return "none";
}

const CLINICAL_STATUS_ALIASES = {
  resolved: "healthy",
  remission: "healthy",
  inactive: "healthy",
  recovered: "healthy",
  healed: "healthy",
  cured: "healthy",
  abated: "healthy",
  abatement: "healthy",
  disease_free: "healthy",
  no_evidence_of_disease: "healthy",
  entered_in_error: "none",
  cancelled: "none",
  active: "sick",
  confirmed: "sick",
  severe: "sick",
  abnormal: "sick",
  suspected: "warning",
  suspicion: "warning",
  observation: "warning",
  monitoring: "warning",
  followup: "warning",
  follow_up: "warning",
  pending: "warning",
};

function normalizeClinicalStatus(rawStatus, fallbackColor = "", fallbackSubtype = "") {
  const raw = String(rawStatus || "")
    .trim()
    .toLowerCase()
    .replace(/[.\s-]+/g, "_")
    .replace(/_+/g, "_");
  if (!raw) return signalToStatus(fallbackColor, fallbackSubtype) || "none";
  if (raw === "sick" || raw === "warning" || raw === "healthy" || raw === "none") return raw;
  if (raw === "completed" || raw === "final" || raw === "unknown") {
    return signalToStatus(fallbackColor, fallbackSubtype) || "none";
  }
  if (CLINICAL_STATUS_ALIASES[raw]) return CLINICAL_STATUS_ALIASES[raw];
  if (/resolved|remission|inactive|recovered|healed|cured|disease_free|abatement/.test(raw)) return "healthy";
  const fromSignal = signalToStatus(fallbackColor, fallbackSubtype);
  if (fromSignal && fromSignal !== "none") return fromSignal;
  return "none";
}

function detectResolvedOutcome(row, normalizedStatus = "") {
  if (normalizedStatus === "healthy") return true;
  const statusRaw = String(row?.status || "").toLowerCase();
  if (/\b(resolved|inactive|remission|recovered|healed|cured|abatement|disease[-_\s]?free)\b/.test(statusRaw)) return true;
  const txt = `${row?.findings || ""} ${row?.notes || ""}`.toLowerCase();
  return /(clinical[_\s-]?status\s*[:=]?\s*(resolved|inactive|remission)|\bresolved\b|\brecovered\b|\bhealed\b|\bcured\b|\bremission\b|\bdisease[-\s]?free\b|\bno evidence of disease\b|вылечен|выздоров|ремисси|купирова|без признаков активн)/.test(txt);
}

function statusToSignal(status) {
  if (status === "sick") return "red";
  if (status === "warning") return "orange";
  if (status === "healthy") return "gray";
  return "gray";
}

function buildStudyOrganKey(studyType = "", organId = "") {
  const study = String(studyType || "").trim().toLowerCase();
  const organ = canonicalizeOrganId(organId || "");
  return `${study}::${organ}`;
}

function parseJsonObjectSafe(raw) {
  if (!raw) return {};
  if (typeof raw === "object") return raw;
  try {
    const parsed = JSON.parse(String(raw));
    return parsed && typeof parsed === "object" ? parsed : {};
  } catch (_) {
    return {};
  }
}

function extractTimelineMediaRefs(row) {
  const refs = [];
  const pushAny = (value) => {
    if (!value) return;
    if (Array.isArray(value)) {
      value.forEach(pushAny);
      return;
    }
    if (typeof value === "object") {
      return;
    }
    const text = String(value || "").trim();
    if (!text) return;
    if ((text.startsWith("[") && text.endsWith("]")) || (text.startsWith("{") && text.endsWith("}"))) {
      try {
        const parsed = JSON.parse(text);
        pushAny(parsed);
        return;
      } catch (_) {}
    }
    if (/^(none|null|n\/a|na|-|—)$/i.test(text)) return;
    refs.push(text);
  };

  pushAny(row?.dicom_refs);
  const payload = parseJsonObjectSafe(row?.payload);
  pushAny(payload?.dicom_refs);
  pushAny(payload?.dicomRefs);
  pushAny(payload?.image_refs);
  pushAny(payload?.images);
  pushAny(payload?.files);
  if (payload?.affected_organ && typeof payload.affected_organ === "object") {
    pushAny(payload.affected_organ.dicom_refs);
    pushAny(payload.affected_organ.dicomRefs);
    pushAny(payload.affected_organ.image_refs);
    pushAny(payload.affected_organ.images);
    pushAny(payload.affected_organ.files);
  }

  const seen = new Set();
  const unique = [];
  refs.forEach(v => {
    if (!seen.has(v)) {
      seen.add(v);
      unique.push(v);
    }
  });
  return unique;
}

function buildTimelineImageIndexForRows(rows) {
  const byStudy = new Map();
  const byOrgan = new Map();
  (rows || []).forEach(row => {
    const payload = parseJsonObjectSafe(row?.payload);
    const organ = resolveClinicalOrganId(
      row?.organ_id || payload?.organ_id || "",
      row?.study_type,
      row?.conclusion,
      payload?.conclusion,
      payload?.condition_description,
      payload?.notes
    );
    if (!organ) return;
    const refs = extractTimelineMediaRefs(row);
    if (!refs.length) return;
    byOrgan.set(organ, true);
    byStudy.set(buildStudyOrganKey(row?.study_type || "", organ), true);
  });
  return { byStudy, byOrgan };
}

function hasTimelineImages(index, organId = "", studyType = "") {
  const organ = canonicalizeOrganId(organId || "");
  if (!organ) return false;
  const byStudy = index?.byStudy;
  const byOrgan = index?.byOrgan;
  if (byStudy && byStudy.get(buildStudyOrganKey(studyType, organ))) return true;
  return !!(byOrgan && byOrgan.get(organ));
}

function normalizeMedicalSearchText(raw) {
  return String(raw || "")
    .toLowerCase()
    .replace(/[_/]/g, " ")
    .replace(/[.,;:()[\]{}"'`]+/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function extractSemanticTag(raw) {
  const m = String(raw || "").trim().match(/\(([^)]+)\)\s*$/i);
  return m ? normalizeMedicalSearchText(m[1]) : "";
}

function stripSemanticTag(raw) {
  return String(raw || "").replace(/\s*\(([^)]+)\)\s*$/i, "").trim();
}

function capitalizeMedicalDisplay(text) {
  const s = String(text || "").replace(/\s+/g, " ").trim();
  return s ? s[0].toUpperCase() + s.slice(1) : "";
}

function dedupeAdjacentWords(text) {
  const tokens = String(text || "").split(/\s+/).filter(Boolean);
  const out = [];
  tokens.forEach(tok => {
    const prev = out[out.length - 1];
    if (prev && prev.toLowerCase() === tok.toLowerCase()) return;
    out.push(tok);
  });
  return out.join(" ");
}

function translateStudyTypeDisplay(raw) {
  const src = String(raw || "").trim();
  if (!src) return "";
  const norm = normalizeMedicalSearchText(src);
  const rule = STUDY_TYPE_DISPLAY_RULES.find(item => item.re.test(norm));
  if (rule) return rule.out;
  return src;
}

function translateClinicalTargetPhrase(raw, grammaticalCase = "gen") {
  const src = normalizeMedicalSearchText(raw);
  if (!src) return "";
  const entries = Object.entries(CLINICAL_TARGET_TRANSLATIONS).sort((a, b) => b[0].length - a[0].length);
  const exact = entries.find(([key]) => key === src);
  if (exact) {
    const forms = exact[1];
    return forms[grammaticalCase] || forms.nom || src;
  }
  const partial = entries.find(([key]) => src.includes(key));
  if (partial) {
    const [key, forms] = partial;
    const replacement = forms[grammaticalCase] || forms.nom || key;
    return src.replace(key, replacement);
  }
  return raw;
}

function getDiagnosisGlossaryMatches(raw) {
  const norm = normalizeMedicalSearchText(raw);
  if (!norm) return [];
  return DIAGNOSIS_GLOSSARY
    .map(entry => {
      const aliases = [...(entry.aliases_en || []), ...(entry.aliases_ru || []), entry.source_en, entry.display_ru]
        .map(normalizeMedicalSearchText)
        .filter(Boolean);
      const matchedAlias = aliases
        .sort((a, b) => b.length - a.length)
        .find(alias => {
          const escaped = alias.replace(/[.*+?^${}()|[\]\\]/g, "\\$&").replace(/\s+/g, "\\s+");
          return new RegExp(`(?:^|\\s)${escaped}(?:$|\\s)`, "i").test(norm);
        });
      return matchedAlias ? { entry, matchedAlias } : null;
    })
    .filter(Boolean)
    .sort((a, b) => b.matchedAlias.length - a.matchedAlias.length);
}

function translateClinicalFallbackTokens(raw) {
  const src = normalizeMedicalSearchText(raw);
  if (!src) return "";
  let value = src;
  Object.entries(CLINICAL_FALLBACK_PHRASES)
    .sort((a, b) => b[0].length - a[0].length)
    .forEach(([needle, out]) => {
      value = value.replace(new RegExp(`\\b${needle.replace(/\s+/g, "\\s+")}\\b`, "g"), out);
    });
  const tokens = value.split(/\s+/).filter(Boolean);
  const translated = tokens.map(tok => CLINICAL_FALLBACK_TOKENS[tok] || tok);
  const hasUnknownLatin = translated.some(tok => /^[a-z][a-z-]*$/i.test(tok) && !Object.values(CLINICAL_FALLBACK_TOKENS).includes(tok));
  if (hasUnknownLatin) return capitalizeMedicalDisplay(stripSemanticTag(raw));
  return capitalizeMedicalDisplay(dedupeAdjacentWords(translated.join(" ")));
}

function translateClinicalTextDisplay(raw, context = {}) {
  const src = String(raw || "").replace(/\s+/g, " ").trim();
  if (!src) return "";
  const firstLine = src.split(/\r?\n/).map(x => x.trim()).find(Boolean) || src;
  const tag = extractSemanticTag(firstLine);
  const stripped = stripSemanticTag(firstLine);
  if (!stripped) return "";
  if (/[А-Яа-яЁё]/.test(stripped) && !/[A-Za-z]/.test(stripped)) {
    return capitalizeMedicalDisplay(stripped);
  }

  const glossaryMatch = getDiagnosisGlossaryMatches(firstLine)[0];
  if (glossaryMatch?.entry?.display_ru) {
    return glossaryMatch.entry.display_ru;
  }

  for (const rule of CLINICAL_DISPLAY_RULES) {
    const m = stripped.match(rule.re);
    if (m) {
      const result = typeof rule.out === "function" ? rule.out(...m) : rule.out;
      return capitalizeMedicalDisplay(result);
    }
  }

  const fallback = translateClinicalFallbackTokens(stripped);
  if (fallback) return fallback;
  if (tag && SEMANTIC_TAG_DISPLAY_RU[tag]) return capitalizeMedicalDisplay(stripped);
  return capitalizeMedicalDisplay(stripped);
}

function normalizeMedicalConcepts(raw, context = {}) {
  const src = String(raw || "").trim();
  if (!src) return [];
  const matches = getDiagnosisGlossaryMatches(src).map(({ entry }) => ({
    ...entry,
    semantic_tag: extractSemanticTag(src),
  }));
  if (context.kind === "study_type") {
    const display = translateStudyTypeDisplay(src);
    if (display && display !== src) {
      matches.push({
        canonical_key: normalizeMedicalSearchText(src),
        display_ru: display,
        semantic_class: "procedure",
        organ_id: "",
      });
    }
  }
  const unique = [];
  const seen = new Set();
  matches.forEach(item => {
    if (!item?.canonical_key || seen.has(item.canonical_key)) return;
    seen.add(item.canonical_key);
    unique.push(item);
  });
  return unique;
}

function translateMedicalDisplay(raw, context = {}) {
  const kind = context?.kind || "";
  if (kind === "study_type") return translateStudyTypeDisplay(raw);
  if (kind === "mesh") return translateMeshLabel(raw);
  if (kind === "diagnosis" || kind === "finding" || kind === "conclusion" || kind === "note" || !kind) {
    return translateClinicalTextDisplay(raw, context);
  }
  return String(raw || "").trim();
}

function normalizeDiseaseTitle(raw) {
  let t = String(raw || "").replace(/\s+/g, " ").trim();
  if (!t) return "";
  const nl = t.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
  if (nl.length) t = nl[0];
  const firstSentence = t.split(/[.;]/).map(x => x.trim()).find(Boolean);
  if (firstSentence) t = firstSentence;
  t = translateMedicalDisplay(t, { kind: "diagnosis" }) || t;
  t = t.replace(/\s{2,}/g, " ").trim();
  if (t.length > 72) t = `${t.slice(0, 69)}…`;
  return t;
}

function getPatientDiseaseInfo(pid) {
  const tl = dbGetOne(
    `SELECT conclusion, color, date_iso, id
     FROM timeline_items
     WHERE patient_id=? AND IFNULL(conclusion,'')<>''
     ORDER BY
       CASE color
         WHEN 'red' THEN 0
         WHEN 'orange' THEN 1
         WHEN 'yellow' THEN 2
         WHEN 'blue' THEN 3
         ELSE 4
       END,
       date_iso DESC,
       id DESC
     LIMIT 1`,
    [pid]
  );
  if (tl?.conclusion) {
    return {
      name: normalizeDiseaseTitle(tl.conclusion),
      tone: tl.color === "red" ? "sick" : tl.color === "orange" ? "warning" : tl.color === "blue" ? "none" : "ok",
    };
  }

  const od = dbGetOne(
    `SELECT findings, status, id
     FROM organ_data
     WHERE patient_id=?
       AND organ_id NOT IN ('__record__','__ai__')
       AND IFNULL(findings,'')<>''
     ORDER BY
       CASE status
         WHEN 'sick' THEN 0
         WHEN 'warning' THEN 1
         WHEN 'healthy' THEN 2
         ELSE 3
       END,
       id DESC
     LIMIT 1`,
    [pid]
  );
  if (od?.findings) {
    const tone = od.status === "sick" ? "sick" : od.status === "warning" ? "warning" : od.status === "healthy" ? "ok" : "none";
    return { name: normalizeDiseaseTitle(od.findings), tone };
  }

  const ai = dbGetOne("SELECT findings FROM organ_data WHERE patient_id=? AND organ_id='__ai__'", [pid]);
  if (ai?.findings) {
    try {
      const payload = JSON.parse(ai.findings);
      const first = Array.isArray(payload?.results) ? payload.results.find(r => r?.disease) : null;
      if (first?.disease) {
        const tone = first?.severity === "sick" ? "sick" : first?.severity === "warning" ? "warning" : "ok";
        return { name: normalizeDiseaseTitle(first.disease), tone };
      }
    } catch (_) {}
  }

  return { name: "", tone: "none" };
}

function normalizeTimelineDateIso(raw, fallbackNow = false) {
  const src = String(raw || "").trim();
  if (!src) return fallbackNow ? new Date().toISOString() : "";
  const ms = parseTimelineDate(src);
  if (ms === null || ms === undefined) return fallbackNow ? new Date().toISOString() : "";
  return new Date(ms).toISOString();
}

function normalizeGenderValue(raw) {
  const v = String(raw || "").toLowerCase().trim();
  if (v === "female" || v === "f" || v === "жен" || v === "женский") return "female";
  return "male";
}

function normalizeExternalId(raw) {
  return String(raw || "").trim();
}

function buildTimelineItemId(seed) {
  const base = String(seed || "").replace(/[^a-zA-Z0-9_\-:.]/g, "_").slice(0, 140);
  if (base) return base;
  const rnd = Math.random().toString(36).slice(2, 8);
  return `tl_${Date.now()}_${rnd}`;
}

function validateGitHubDatasetV1(dataset) {
  const errors = [];
  const data = dataset && typeof dataset === "object" ? dataset : null;
  if (!data) return { ok: false, errors: ["JSON должен быть объектом."] };
  if (data.schema_version !== GITHUB_DATASET_SCHEMA) {
    errors.push(`schema_version должен быть "${GITHUB_DATASET_SCHEMA}".`);
  }
  if (!Array.isArray(data.patients)) {
    errors.push("Поле patients должно быть массивом.");
  }
  if (!Array.isArray(data.timeline_items)) {
    errors.push("Поле timeline_items должно быть массивом.");
  }
  return { ok: errors.length === 0, errors };
}

function importGitHubDatasetV1(dataset, doctorId = 1) {
  const patients = Array.isArray(dataset?.patients) ? dataset.patients : [];
  const timelineItems = Array.isArray(dataset?.timeline_items) ? dataset.timeline_items : [];
  const organCurrent = Array.isArray(dataset?.organ_data_current) ? dataset.organ_data_current : [];
  const report = {
    patientsCreated: 0,
    patientsUpdated: 0,
    timelineCreated: 0,
    timelineUpdated: 0,
    skipped: 0,
    affectedPatients: 0,
  };
  const patientIdByExternal = new Map();
  const knownPatients = dbQuery("SELECT id, external_id, name, dob FROM patients");
  knownPatients.forEach(row => {
    const ext = normalizeExternalId(row.external_id);
    if (ext) patientIdByExternal.set(ext, row.id);
  });

  const importOk = dbTransaction((run) => {
    const execRun = (sql, params = []) => run(sql, params);

    patients.forEach((srcPatient) => {
      const externalId = normalizeExternalId(
        srcPatient?.external_id || srcPatient?.id || srcPatient?.patientid || srcPatient?.patient_id
      );
      const name = String(srcPatient?.name || srcPatient?.full_name || "").trim();
      if (!externalId || !name) {
        report.skipped++;
        return;
      }
      const gender = normalizeGenderValue(srcPatient?.gender || srcPatient?.sex);
      const dob = String(srcPatient?.dob || srcPatient?.birth_date || "").trim();
      const address = String(srcPatient?.address || "").trim();
      const phone = String(srcPatient?.phone || srcPatient?.phone_number || "").trim();
      const lastVisit = String(srcPatient?.last_visit || "").trim();
      const existing = dbGetOne("SELECT id FROM patients WHERE external_id=?", [externalId]);
      if (existing?.id) {
        execRun(
          "UPDATE patients SET name=?,gender=?,dob=?,address=?,phone=?,doctor_id=?,last_visit=? WHERE id=?",
          [name, gender, dob, address, phone, doctorId || 1, lastVisit, existing.id]
        );
        patientIdByExternal.set(externalId, existing.id);
        report.patientsUpdated++;
      } else {
        execRun(
          "INSERT INTO patients(name,gender,dob,address,phone,doctor_id,last_visit,external_id) VALUES(?,?,?,?,?,?,?,?)",
          [name, gender, dob, address, phone, doctorId || 1, lastVisit, externalId]
        );
        const created = dbGetOne("SELECT id FROM patients WHERE external_id=? ORDER BY id DESC LIMIT 1", [externalId]);
        if (created?.id) {
          patientIdByExternal.set(externalId, created.id);
          report.patientsCreated++;
        } else {
          report.skipped++;
        }
      }
    });

    const singleExternalId = patientIdByExternal.size === 1 ? Array.from(patientIdByExternal.keys())[0] : "";
    const affectedPatientIds = new Set();
    const upsertTimelineRow = (norm) => {
      const targetPid = patientIdByExternal.get(norm.patientExternalId);
      if (!targetPid) {
        report.skipped++;
        return;
      }
      const rowExists = dbGetOne("SELECT id FROM timeline_items WHERE id=?", [norm.id]);
      const params = [
        norm.id,
        targetPid,
        norm.organId,
        norm.dateIso,
        norm.studyType,
        norm.source,
        JSON.stringify(norm.dicomRefs || []),
        norm.conclusion,
        norm.color,
        norm.subtype,
        norm.aiConfidence,
        norm.ttlDays,
        norm.notes,
        norm.status,
        JSON.stringify(norm.payload || {}),
      ];
      if (rowExists?.id) {
        execRun(
          "UPDATE timeline_items SET patient_id=?,organ_id=?,date_iso=?,study_type=?,source=?,dicom_refs=?,conclusion=?,color=?,subtype=?,ai_confidence=?,ttl_days=?,notes=?,status=?,payload=? WHERE id=?",
          [targetPid, norm.organId, norm.dateIso, norm.studyType, norm.source, JSON.stringify(norm.dicomRefs || []), norm.conclusion, norm.color, norm.subtype, norm.aiConfidence, norm.ttlDays, norm.notes, norm.status, JSON.stringify(norm.payload || {}), norm.id]
        );
        report.timelineUpdated++;
      } else {
        execRun(
          "INSERT INTO timeline_items(id,patient_id,organ_id,date_iso,study_type,source,dicom_refs,conclusion,color,subtype,ai_confidence,ttl_days,notes,status,payload) VALUES(?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)",
          params
        );
        report.timelineCreated++;
      }
      affectedPatientIds.add(targetPid);
    };

    timelineItems.forEach((item, idx) => {
      const patientExternalId = normalizeExternalId(
        item?.patient_external_id || item?.patientid || item?.patient_id || item?.patientId || singleExternalId
      );
      if (!patientExternalId) {
        report.skipped++;
        return;
      }
      const baseDateIso = normalizeTimelineDateIso(item?.date_iso || item?.date || item?.study_date, true);
      const baseStudyType = String(item?.study_type || item?.type || "").trim();
      const baseSource = String(item?.source || "github_import").trim();
      const baseConclusion = String(item?.conclusion || item?.findings || "").trim();
      const baseNotes = String(item?.notes || "").trim();
      const baseDicomRefs = Array.isArray(item?.dicom_refs) ? item.dicom_refs : [];
      const baseStatus = String(item?.status || "completed").trim();
      const affected = Array.isArray(item?.affected_organs) && item.affected_organs.length ? item.affected_organs : [item];
      affected.forEach((affectedOrgan, i) => {
        const organId = canonicalizeOrganId(
          affectedOrgan?.organid || affectedOrgan?.organ_id || item?.organ_id || item?.organid || ""
        );
        if (!organId) {
          report.skipped++;
          return;
        }
        const rawColor = String(
          affectedOrgan?.color ||
          item?.color ||
          statusToSignal(affectedOrgan?.status || item?.organ_status || item?.status)
        ).toLowerCase();
        const color = ["red", "orange", "yellow", "blue", "gray"].includes(rawColor) ? rawColor : "gray";
        const subtype = String(affectedOrgan?.subtype || item?.subtype || "").trim();
        const aiConfidence = clampNum(
          affectedOrgan?.ai_confidence ?? item?.ai_confidence,
          0,
          1,
          0
        );
        const ttlDays = Math.round(
          clampNum(affectedOrgan?.ttl_days ?? item?.ttl_days, 1, 2000, TL_DEFAULT_TTL_DAYS[color] || 90)
        );
        const seedId = affectedOrgan?.id || (item?.id ? `${item.id}_${organId}` : `gh_${patientExternalId}_${organId}_${baseDateIso}_${idx}_${i}`);
        upsertTimelineRow({
          id: buildTimelineItemId(seedId),
          patientExternalId,
          organId,
          dateIso: baseDateIso,
          studyType: baseStudyType,
          source: baseSource,
          dicomRefs: baseDicomRefs,
          conclusion: String(affectedOrgan?.conclusion || affectedOrgan?.notes || baseConclusion).trim(),
          color,
          subtype,
          aiConfidence,
          ttlDays,
          notes: String(affectedOrgan?.notes || baseNotes).trim(),
          status: baseStatus,
          payload: {
            ...item,
            affected_organ: affectedOrgan,
          },
        });
      });
    });

    organCurrent.forEach((row) => {
      const patientExternalId = normalizeExternalId(
        row?.patient_external_id || row?.patientid || row?.patient_id || row?.patientId || singleExternalId
      );
      const targetPid = patientIdByExternal.get(patientExternalId);
      const organId = canonicalizeOrganId(row?.organ_id || row?.organid || "");
      if (!targetPid || !organId) {
        report.skipped++;
        return;
      }
      const status = normalizeClinicalStatus(row?.status, row?.color, row?.subtype);
      const studyType = String(row?.study_type || row?.source || "imported").trim();
      const studyDateIso = normalizeTimelineDateIso(row?.study_date || row?.date_iso || row?.date, true);
      const studyDate = Number.isNaN(Date.parse(studyDateIso)) ? studyDateIso : new Date(studyDateIso).toLocaleDateString("ru-RU");
      const findings = String(row?.findings || row?.conclusion || "").trim();
      const notes = String(row?.notes || "").trim();
      const labValues = (row?.lab_values && typeof row.lab_values === "object") ? row.lab_values : {};
      const existing = dbGetOne("SELECT id FROM organ_data WHERE patient_id=? AND organ_id=?", [targetPid, organId]);
      if (existing?.id) {
        execRun(
          "UPDATE organ_data SET status=?,study_type=?,study_date=?,findings=?,lab_values=?,notes=? WHERE patient_id=? AND organ_id=?",
          [status, studyType, studyDate, findings, JSON.stringify(labValues), notes, targetPid, organId]
        );
      } else {
        execRun(
          "INSERT INTO organ_data(patient_id,organ_id,status,study_type,study_date,findings,lab_values,notes) VALUES(?,?,?,?,?,?,?,?)",
          [targetPid, organId, status, studyType, studyDate, findings, JSON.stringify(labValues), notes]
        );
      }
      affectedPatientIds.add(targetPid);
    });

    affectedPatientIds.forEach(patientId => {
      const rows = dbQuery("SELECT * FROM timeline_items WHERE patient_id=? ORDER BY date_iso ASC, id ASC", [patientId]);
      if (!rows.length) return;
      const latestByOrgan = new Map();
      rows.forEach(row => {
        const organId = canonicalizeOrganId(row.organ_id || "");
        if (!organId) return;
        latestByOrgan.set(organId, row);
      });
      let maxDateMs = 0;
      latestByOrgan.forEach((row, organId) => {
        let payload = {};
        try { payload = JSON.parse(row.payload || "{}"); } catch (_) {}
        const statusCandidate =
          payload?.organ_status ||
          payload?.clinical_status ||
          payload?.status ||
          row?.status ||
          "";
        const status = normalizeClinicalStatus(statusCandidate, row?.color, row?.subtype);
        const studyDateIso = String(row.date_iso || "");
        const studyDate = Number.isNaN(Date.parse(studyDateIso)) ? studyDateIso : new Date(studyDateIso).toLocaleDateString("ru-RU");
        const findings = String(row.conclusion || payload?.conclusion || "").trim();
        const notes = String(row.notes || payload?.notes || "").trim();
        const studyType = String(row.study_type || payload?.study_type || "").trim();
        const labValues = (payload?.lab_values && typeof payload.lab_values === "object") ? payload.lab_values : {};
        const existing = dbGetOne("SELECT id FROM organ_data WHERE patient_id=? AND organ_id=?", [patientId, organId]);
        if (existing?.id) {
          execRun(
            "UPDATE organ_data SET status=?,study_type=?,study_date=?,findings=?,lab_values=?,notes=? WHERE patient_id=? AND organ_id=?",
            [status || "none", studyType, studyDate, findings, JSON.stringify(labValues), notes, patientId, organId]
          );
        } else {
          execRun(
            "INSERT INTO organ_data(patient_id,organ_id,status,study_type,study_date,findings,lab_values,notes) VALUES(?,?,?,?,?,?,?,?)",
            [patientId, organId, status || "none", studyType, studyDate, findings, JSON.stringify(labValues), notes]
          );
        }
        const dateMs = Date.parse(studyDateIso);
        if (!Number.isNaN(dateMs) && dateMs > maxDateMs) maxDateMs = dateMs;
      });
      if (maxDateMs > 0) {
        execRun("UPDATE patients SET last_visit=? WHERE id=?", [new Date(maxDateMs).toLocaleDateString("ru-RU"), patientId]);
      }
    });

    report.affectedPatients = affectedPatientIds.size;
  });

  if (!importOk) throw new Error("Ошибка транзакции импорта.");
  pub("patient_added", { source: "github_import" });
  pub("organ_updated", { source: "github_import" });
  return report;
}

async function autoImportLocalDatasetV1(doctorId = 1) {
  try {
    const patientCount = Number(dbGetOne("SELECT COUNT(*) AS c FROM patients")?.c || 0);
    const timelineCount = Number(dbGetOne("SELECT COUNT(*) AS c FROM timeline_items")?.c || 0);
    if (timelineCount > 0 || patientCount > 2) {
      return { ok: false, skipped: true, reason: "db_not_empty" };
    }
    const resp = await fetch("./dataset.json", { cache: "no-store" });
    if (!resp.ok) {
      return { ok: false, skipped: true, reason: `http_${resp.status}` };
    }
    const dataset = await resp.json();
    const validation = validateGitHubDatasetV1(dataset);
    if (!validation.ok) {
      return { ok: false, skipped: true, reason: "invalid_schema", errors: validation.errors };
    }
    const report = importGitHubDatasetV1(dataset, doctorId);
    return { ok: true, report };
  } catch (e) {
    console.warn("[HuMapper] local dataset auto-import skipped:", e);
    return { ok: false, skipped: true, reason: "exception", error: String(e?.message || e) };
  }
}

/* ═══════════════════════════════════════════════
   SYNC / PUBSUB
═══════════════════════════════════════════════ */
let _subs = [];
function pub(event = 'update', data = {}) {
  _subs.forEach(f => f(event, data));
  // Cross-tab sync
  localStorage.setItem('medvis_sync', JSON.stringify({ event, data, ts: Date.now() }));
}
function sub(fn) {
  _subs.push(fn);
  return () => { _subs = _subs.filter(x => x !== fn); };
}

function useDB() {
  const [, s] = useState(0);
  useEffect(() => {
    const unsub = sub(() => s(t => t + 1));
    const handleStorage = e => { if (e.key === 'medvis_sync') s(t => t + 1); };
    window.addEventListener('storage', handleStorage);
    return () => { unsub(); window.removeEventListener('storage', handleStorage); };
  }, []);
}

const GENERAL_CLINICAL_CONTEXT_RE = /reports? of violence|violence in the environment|intimate partner abuse|domestic violence|risk activity involvement|risk taking behavior|received higher education|higher education|full[- ]time employment|\bemployment\b|medication review due|review due|wellness visit|wellness|checkup|preventive visit|preventive care|annual exam|social determinant|housing insecurity|financial insecurity|food insecurity|transportation insecurity|насилие|социальн|занятост|образован/;

function resolveClinicalOrganId(rawOrganId = "", ...texts) {
  const base = canonicalizeOrganId(rawOrganId || "");
  const combined = texts
    .flat()
    .map(x => String(x || "").trim())
    .filter(Boolean)
    .join(" ")
    .toLowerCase()
    .replace(/\s+/g, " ")
    .trim();

  if (combined) {
    const normalizedConcepts = normalizeMedicalConcepts(combined, { kind: "diagnosis", organId: base });
    const conceptOrgan = resolveOrganFromConcepts(normalizedConcepts);
    if (conceptOrgan && conceptOrgan !== "general") {
      return conceptOrgan;
    }

    for (const hint of CLINICAL_TEXT_ORGAN_HINTS) {
      if (hint.re.test(combined)) return hint.organ;
    }

    if (
      conceptOrgan === "general" &&
      normalizedConcepts.some(item => item?.organ_id === "general") &&
      (!base || base === "general" || base === "heart" || base === "skull" || base === "oral_cavity" || base === "nasal_sinuses")
    ) {
      return "general";
    }

    if (
      GENERAL_CLINICAL_CONTEXT_RE.test(combined) &&
      (!base || base === "general" || base === "heart" || base === "skull" || base === "oral_cavity" || base === "nasal_sinuses")
    ) {
      return "general";
    }

    if (
      base === "heart" &&
      !/\bheart\b|cardiac|myocard|coronary|arrhythm|angina|atrial|ventricular|pericard|endocard|epicard|mitral|tricuspid|aortic valve/.test(combined) &&
      (/\(procedure\)|\(situation\)|\bprocedure\b|\bsituation\b|referral|screening|review due|wellness|checkup|examination|consultation|follow[- ]up/.test(combined))
    ) {
      return "general";
    }
  }

  if (base && (OM[base] || ORGAN_ID_EXPANSIONS[base])) return base;
  return combined ? "general" : (base || "");
}

function normalizeMeshName(raw) {
  let s = String(raw || "").trim();
  if (!s) return "";

  const rawLower = s.toLowerCase();
  const hasLeft = /(?:^|[\s._-])(left|l)(?:$|[\s._-])/.test(rawLower);
  const hasRight = /(?:^|[\s._-])(right|r)(?:$|[\s._-])/.test(rawLower);

  s = s
    .replace(/_[0-9a-f]{6,8}\b/gi, "")
    .replace(/\.\d{3,}\b/g, "")
    .replace(/_\d+\b/g, "")
    .replace(/\b\d+\b/g, " ")
    .replace(/[()*]/g, " ")
    .replace(/_/g, " ")
    .replace(/\.(?=\s|$)/g, " ")
    .replace(/\s+/g, " ")
    .trim();

  let lower = s.toLowerCase();
  lower = lower.replace(/\b(left|right|l|r)\b/g, " ").replace(/\s+/g, " ").trim();
  if (hasLeft && !/\bleft\b/.test(lower)) lower = `${lower} left`.trim();
  if (hasRight && !/\bright\b/.test(lower)) lower = `${lower} right`.trim();
  return lower;
}

const HEAD_PRIORITY_BLOCK_ORGANS = new Set([
  "brain",
  "skull",
  "nasal_sinuses",
  "oral_cavity",
  "meninges",
  "tmj",
  "head_neck_muscles",
  "skin_head_neck",
  "cerebral_vessels",
  "carotid_vessels",
  "salivary_glands",
  "tonsils",
  "tongue",
  "lymph_nodes_head_neck",
  "hyoid_laryngeal",
]);

function isHeadRegionMesh(meshName, cat = "", organId = "") {
  const oid = canonicalizeOrganId(organId || "");
  if (oid && HEAD_PRIORITY_BLOCK_ORGANS.has(oid)) return true;
  const n = normalizeMeshName(meshName || "");
  if (!n) return false;
  if (/\b(head|cranial|cranium|skull|brain|cerebr|cerebell|orbital|orbit|ocular|ophthalm|eye|nasal|sinus|ethmoid|frontal|parietal|temporal|occipital|maxilla|mandible|jaw|zygoma|hyoid|olfactory|facial|auricular|ear|tonsil|tongue)\b/.test(n)) return true;
  if (cat === "nervous" && /\b(ventricle|gyrus|sulcus|insula|thalam|hippoc|amygdal|pons|medulla)\b/.test(n)) return true;
  return false;
}

function suppressNonHeadClinicalEntryForHeadMesh(meshName, cat, entry) {
  if (!entry) return null;
  const entryOrganId = canonicalizeOrganId(entry.organ_id || "");
  const meshIsHeadRegion = isHeadRegionMesh(meshName, cat, "");
  if (meshIsHeadRegion && entryOrganId && !HEAD_PRIORITY_BLOCK_ORGANS.has(entryOrganId)) {
    return null;
  }
  return entry;
}

function prettyMeshLabel(raw) {
  const base = normalizeMeshName(raw) || String(raw || "").trim();
  if (!base) return "Орган";
  return base
    .replace(/\bleft\b/gi, "Left")
    .replace(/\bright\b/gi, "Right")
    .replace(/\s+/g, " ")
    .replace(/\b\w/g, ch => ch.toUpperCase());
}

function inflectRuAdjByGender(word, gender) {
  const w = String(word || "");
  if (!/(ый|ий|ой)$/i.test(w)) return w;
  if (gender === "f") {
    if (/ий$/i.test(w)) return w.replace(/ий$/i, "яя");
    return w.replace(/(ый|ой)$/i, "ая");
  }
  if (gender === "n") {
    if (/ий$/i.test(w)) return w.replace(/ий$/i, "ее");
    return w.replace(/(ый|ой)$/i, "ое");
  }
  if (gender === "p") {
    if (/ий$/i.test(w)) return w.replace(/ий$/i, "ие");
    return w.replace(/(ый|ой)$/i, "ые");
  }
  return w;
}

function applyRuGenderAgreement(text) {
  const parts = String(text || "").split(/\s+/).filter(Boolean);
  for (let i = 0; i < parts.length - 1; i++) {
    const noun = parts[i + 1].toLowerCase();
    const g = RU_NOUN_GENDER[noun];
    if (!g) continue;
    parts[i] = inflectRuAdjByGender(parts[i], g);
  }
  return parts.join(" ");
}

function romanToInt(roman) {
  const s = String(roman || "").toUpperCase().trim();
  if (!s || !/^[IVXLCDM]+$/.test(s)) return null;
  const vals = { I: 1, V: 5, X: 10, L: 50, C: 100, D: 500, M: 1000 };
  let sum = 0;
  for (let i = 0; i < s.length; i++) {
    const cur = vals[s[i]] || 0;
    const next = vals[s[i + 1]] || 0;
    sum += cur < next ? -cur : cur;
  }
  return sum > 0 ? sum : null;
}

function splitMeshCoreAndNumbers(raw) {
  let s = String(raw || "")
    .replace(/([A-Za-zА-Яа-я])(\d)/g, "$1 $2")
    .replace(/(\d)([A-Za-zА-Яа-я])/g, "$1 $2")
    .replace(/_/g, " ")
    .replace(/-/g, " ")
    .replace(/[().,+/?*'"\\]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
  const numberTokens = [];
  s = s.replace(/\b(\d+|[ivxlcdm]{2,8})\b/gi, (_, tok) => {
    let v = tok;
    if (/^\d+$/.test(tok)) v = tok;
    else {
      const n = romanToInt(tok);
      v = n ? String(n) : tok.toUpperCase();
    }
    numberTokens.push(v);
    return " ";
  }).replace(/\s+/g, " ").trim();
  return { core: s, numberTokens };
}

function appendNumberTokens(text, numberTokens) {
  const out = String(text || "").trim();
  if (!numberTokens?.length) return out;
  const exists = new Set((out.match(/\b(\d+|[IVXLCDM]{1,8})\b/g) || []).map(v => v.toUpperCase()));
  const tail = numberTokens.filter(v => !exists.has(String(v).toUpperCase()));
  if (!tail.length) return out;
  return `${out} ${tail.join(" ")}`.replace(/\s+/g, " ").trim();
}

function transliterateEnToken(token) {
  let s = String(token || "").toLowerCase();
  const digraphs = [
    ["shch", "щ"], ["sch", "щ"], ["zh", "ж"], ["kh", "х"], ["ch", "ч"], ["sh", "ш"],
    ["yo", "ё"], ["yu", "ю"], ["ya", "я"], ["ye", "е"], ["ph", "ф"], ["th", "т"],
    ["ts", "ц"], ["qu", "кв"], ["ck", "к"], ["x", "кс"]
  ];
  digraphs.forEach(([a, b]) => { s = s.replace(new RegExp(a, "g"), b); });
  const map = {
    a: "а", b: "б", c: "к", d: "д", e: "е", f: "ф", g: "г", h: "х", i: "и", j: "дж",
    k: "к", l: "л", m: "м", n: "н", o: "о", p: "п", q: "к", r: "р", s: "с", t: "т",
    u: "у", v: "в", w: "в", y: "й", z: "з"
  };
  return s.split("").map(ch => map[ch] || ch).join("");
}

function dedupeRepeatedMedicalPhrases(text) {
  let out = String(text || "").trim();
  if (!out) return "";
  out = out
    .replace(/\bshape(?:d)?\b/gi, " ")
    .replace(/\bmesh\b/gi, " ")
    .replace(/\s+/g, " ")
    .trim();
  let prev = "";
  while (out !== prev) {
    prev = out;
    out = out
      .replace(/\b([А-Яа-яЁёA-Za-z-]+(?:\s+[А-Яа-яЁёA-Za-z-]+){1,3})\s+\1\b/gi, "$1")
      .replace(/\b([А-Яа-яЁёA-Za-z-]+)\s+\1\b/gi, "$1")
      .replace(/\s+/g, " ")
      .trim();
  }
  return out;
}

function translateMeshLabel(raw) {
  const { core, numberTokens } = splitMeshCoreAndNumbers(raw);
  let base = String(core || "")
    .toLowerCase()
    .replace(/_[0-9a-f]{6,8}\b/gi, "")
    .replace(/mesh\b/g, " ")
    .replace(/\b-t\b/g, " ")
    .replace(/\b(muscle|muscles|membrane|fascia|costarum|artery|vein|segmental)r\b/g, "$1")
    .replace(/\bfascial\b/g, "fascia")
    .replace(/\bmuscler\b/g, "muscle")
    .replace(/\bmusclesr\b/g, "muscles")
    .replace(/\bmembraner\b/g, "membrane")
    .replace(/\s+/g, " ")
    .trim();
  if (!base) return "Орган";

  const exactMatched = MESH_PHRASE_RULES.some(rule => new RegExp(rule.re.source, rule.re.flags).test(base));
  MESH_PHRASE_RULES.forEach(rule => {
    base = base.replace(rule.re, rule.out);
  });
  base = base.replace(/\b([ivx]{1,5})\b/gi, (_, r) => r.toUpperCase());

  const parts = base
    .split(/\s+/)
    .map(p => p.trim().toLowerCase())
    .filter(Boolean)
    .filter(p => !["of", "the", "and", "for", "to", "in", "a", "an", "r", "l", "s", "t"].includes(p))
    .filter(p => !/^[0-9]+$/.test(p))
    .filter(p => p.length > 1);
  let hasUnknownEnglish = false;
  const translated = parts
    .map(p => {
      if (MESH_WORD_RU[p] !== undefined) return MESH_WORD_RU[p];
      if (/^[a-z]+$/.test(p)) {
        hasUnknownEnglish = true;
        return p;
      }
      return p;
    })
    .filter(Boolean);
  let text = translated
    .join(" ")
    .replace(/\b([ivx]{1,5})\b/gi, (_, r) => r.toUpperCase())
    .replace(/\s+/g, " ")
    .trim();
  if (hasUnknownEnglish && !exactMatched) {
    return appendNumberTokens(prettyMeshLabel(raw), numberTokens);
  }
  text = applyRuGenderAgreement(text);
  let fixed = text;
  MESH_CASE_FIX_RULES.forEach(rule => {
    fixed = fixed.replace(rule.re, rule.out);
  });
  fixed = dedupeRepeatedMedicalPhrases(fixed);
  fixed = appendNumberTokens(fixed, numberTokens);
  fixed = fixed.replace(/\s+/g, " ").trim();
  return fixed ? fixed[0].toUpperCase() + fixed.slice(1) : "Орган";
}

function canonicalizeOrganMap(map) {
  const out = {};
  const priority = { sick: 2, warning: 1, healthy: 0, none: -1 };
  Object.entries(map || {}).forEach(([rawId, status]) => {
    const id = canonicalizeOrganId(rawId);
    if (!id) return;
    const targets = ORGAN_ID_EXPANSIONS[id] || [id];
    targets.forEach(targetId => {
      const cur = out[targetId];
      if (!cur || (priority[status] ?? -1) > (priority[cur] ?? -1)) {
        out[targetId] = status;
      }
    });
  });
  return out;
}

/* ═══ Global model cache — по отдельному кэшу на каждый файл ═══ */
const _modelCache = {};
function getOrLoadModel(path, onSuccess, onProgress, onError) {
  if (!_modelCache[path]) _modelCache[path] = { gltf: null, loading: false, callbacks: [] };
  const entry = _modelCache[path];
  if (entry.gltf) { onSuccess(entry.gltf); return; }
  entry.callbacks.push({ onSuccess, onProgress, onError });
  if (entry.loading) return;
  entry.loading = true;
  function _doLoad() {
    const loader = new THREE.GLTFLoader();
    if (THREE.DRACOLoader) {
      const draco = new THREE.DRACOLoader();
      draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
      draco.preload();
      loader.setDRACOLoader(draco);
    }
    const dec = window.MeshoptDecoder;
    if (dec && dec.supported !== false) {
      try { loader.setMeshoptDecoder(dec); } catch(e) { console.warn('setMeshoptDecoder:', e); }
    }
    loader.load(path,
      gltf => {
        entry.gltf = gltf;
        entry.loading = false;
        entry.callbacks.forEach(cb => cb.onSuccess && cb.onSuccess(gltf));
        entry.callbacks = [];
      },
      xhr => { entry.callbacks.forEach(cb => cb.onProgress && cb.onProgress(xhr)); },
      err => {
        entry.loading = false;
        entry.callbacks.forEach(cb => cb.onError && cb.onError(err));
        entry.callbacks = [];
      }
    );
  }
  const dec = window.MeshoptDecoder;
  if (dec && dec.ready) dec.ready.then(_doLoad);
  else _doLoad();
}
