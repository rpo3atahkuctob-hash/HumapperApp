function OrganCard({ r, radNotes, saveRadNote, aiState = "idle" }) {
  const [expanded, setExpanded] = useState(false);
  const sc2 = {sick:C.red2,warning:C.orange2,healthy:C.green2}[r.status]||"rgba(3,194,252,0.5)";
  let lv = {}; try { lv = JSON.parse(r.lab_values||"{}"); } catch{}
  const stLabel = {sick:"Патология",warning:"Наблюдение",healthy:"Норма"}[r.status]||"Нет данных";
  const hasScanImages = !!r?._hasImages;
  const displayStudyType = translateMedicalDisplay(r.study_type || "", { kind: "study_type" }) || r.study_type || "";
  const rawConclusion = radNotes[`${r.study_type}_${r.organ_id}`] ?? (r.findings || "");
  const displayConclusion = translateMedicalDisplay(rawConclusion, { kind: "conclusion", organId: r.organ_id, studyType: r.study_type }) || rawConclusion;
  const showDisplayConclusion = displayConclusion && normalizeMedicalSearchText(displayConclusion) !== normalizeMedicalSearchText(stripSemanticTag(rawConclusion));

  return (
    <div style={{marginBottom:6,background:C.bg3,borderRadius:10,border:`1px solid ${r.status==="sick"?"rgba(239,68,68,0.22)":r.status==="warning"?"rgba(249,115,22,0.18)":C.border}`,overflow:"hidden"}}>
      {/* collapsed header */}
      <div onClick={()=>setExpanded(e=>!e)} style={{padding:"8px 12px",display:"flex",alignItems:"center",gap:8,cursor:"pointer",transition:"background 0.15s"}}
        onMouseEnter={e=>e.currentTarget.style.background="rgba(148,180,220,0.06)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <span style={{fontSize:15,flexShrink:0}}>{OM[r.organ_id]?.e||""}</span>
        <span style={{fontSize:12,fontWeight:700,color:C.text,flex:1}}>{OM[r.organ_id]?.n||r.organ_id}</span>
        <span style={{fontSize:10,padding:"1px 7px",borderRadius:8,background:`${sc2}14`,color:sc2,fontWeight:700,flexShrink:0}}>{stLabel}</span>
        {r.study_date&&<span style={{fontSize:10,color:C.muted,fontFamily:C.mono,flexShrink:0}}>{r.study_date}</span>}
        <span style={{fontSize:11,color:C.muted,transform:expanded?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",flexShrink:0}}>›</span>
      </div>
      {expanded&&(
        <div style={{padding:"10px 12px",borderTop:`1px solid ${C.border}`,animation:"fadeUp 0.16s ease both"}}>
          {displayStudyType&&<div style={{fontSize:9,color:"rgba(3,194,252,0.6)",fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:8}}>{displayStudyType}</div>}
          {hasScanImages && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <ScanCard status={r.status} label="Срез A"/>
              <ScanCard status={r.status} label="Срез B"/>
            </div>
          )}
          {Object.keys(lv).length>0&&(
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
              {Object.entries(lv).map(([k,v])=>(
                <div key={k} style={{fontSize:9,padding:"3px 8px",borderRadius:5,background:C.bg4,border:`1px solid ${C.border}`,color:C.dim,fontFamily:C.mono}}>
                  {k}: <b style={{color:C.text}}>{v}</b>
                </div>
              ))}
            </div>
          )}
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:5}}>
              <div style={{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase"}}>Заключение</div>
            </div>
            {showDisplayConclusion && (
              <div style={{marginBottom:6,padding:"7px 10px",borderRadius:8,background:`${sc2}10`,border:`1px solid ${sc2}18`,fontSize:10,color:C.text,lineHeight:1.55}}>
                {displayConclusion}
              </div>
            )}
            <textarea rows={3}
              placeholder={`Заключение по ${OM[r.organ_id]?.n||r.organ_id}...`}
              value={rawConclusion}
              onChange={e=>saveRadNote(`${r.study_type}_${r.organ_id}`, e.target.value)}
              style={{width:"100%",padding:"9px 12px",background:"rgba(148,180,220,0.04)",border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:11,outline:"none",color:C.text,fontFamily:"inherit",lineHeight:1.65,resize:"vertical",boxSizing:"border-box",transition:"border-color 0.2s"}}
              onFocus={e=>e.target.style.borderColor="rgba(59,130,246,0.4)"} onBlur={e=>e.target.style.borderColor=C.border}
            />
          </div>
        </div>
      )}
    </div>
  );
}

function EMRExplorerOverview({ rows, aiState = "idle", radNotes, saveRadNote, fields, setFields, onSelectRow }) {
  const [selectedEntryId, setSelectedEntryId] = useState(null);

  const docEntries = useMemo(() => {
    const source = fields || {};
    return [
      { id: "doc:symptoms", label: "Заметки врача", field: "symptoms" },
      { id: "doc:treatment", label: "Назначенное лечение", field: "treatment" },
    ].filter(doc => String(source?.[doc.field] || "").trim());
  }, [fields?.symptoms, fields?.treatment]);

  const dateTs = (value) => {
    const raw = String(value || "").trim();
    if (!raw) return 0;
    if (/^\d{2}\.\d{2}\.\d{4}$/.test(raw)) {
      const [dd, mm, yyyy] = raw.split(".").map(Number);
      return new Date(yyyy, mm - 1, dd).getTime();
    }
    const ts = Date.parse(raw);
    return Number.isFinite(ts) ? ts : 0;
  };

  const rowsSignature = (rows || [])
    .map(r => `${r.organ_id}|${r.study_type || ""}|${r.study_date || ""}|${r.status || ""}|${r.findings || ""}`)
    .join("||");

  const normalizedRows = useMemo(() => {
    return (rows || [])
      .map((r, idx) => ({
        ...r,
        _rowId: `${r.organ_id || "org"}::${r.study_type || "type"}::${r.study_date || "date"}::${idx}`,
        _ts: dateTs(r.study_date),
      }))
      .sort((a, b) => (b._ts || 0) - (a._ts || 0));
  }, [rowsSignature]);

  const filteredRows = normalizedRows;

  useEffect(() => {
    const isDoc = String(selectedEntryId || "").startsWith("doc:");
    if (isDoc) return;
    if (!filteredRows.length) {
      setSelectedEntryId(docEntries[0]?.id || null);
      return;
    }
    if (!selectedEntryId || !filteredRows.some(r => r._rowId === selectedEntryId)) {
      setSelectedEntryId(filteredRows[0]._rowId);
    }
  }, [filteredRows, selectedEntryId, docEntries]);

  useEffect(() => {
    if (!String(selectedEntryId || "").startsWith("doc:")) return;
    if (docEntries.some(d => d.id === selectedEntryId)) return;
    if (filteredRows.length) {
      setSelectedEntryId(filteredRows[0]._rowId);
      return;
    }
    setSelectedEntryId(docEntries[0]?.id || null);
  }, [selectedEntryId, docEntries, filteredRows]);

  const selectedRow = filteredRows.find(r => r._rowId === selectedEntryId) || null;
  const selectedDoc = docEntries.find(d => d.id === selectedEntryId) || null;
  const selectedNoteKey = selectedRow
    ? (selectedRow._timeline_item_id ? `timeline:${selectedRow._timeline_item_id}` : `${selectedRow.study_type || ""}_${selectedRow.organ_id || ""}`)
    : "";
  const selectedConclusion = selectedRow ? (radNotes?.[selectedNoteKey] ?? (selectedRow.findings || "")) : "";
  const selectedStudyName = selectedRow?.study_type || "Исследование";
  const selectedStudyLabel = translateMedicalDisplay(selectedStudyName, { kind: "study_type" }) || selectedStudyName;
  const selectedOrganName = selectedRow ? (OM[selectedRow.organ_id]?.n || selectedRow.organ_id) : "";
  const selectedConclusionDisplay = selectedRow ? (translateMedicalDisplay(selectedConclusion, { kind: "conclusion", organId: selectedRow.organ_id, studyType: selectedRow.study_type }) || selectedConclusion) : "";
  const showSelectedConclusionDisplay = !!selectedRow && !!selectedConclusionDisplay && normalizeMedicalSearchText(selectedConclusionDisplay) !== normalizeMedicalSearchText(stripSemanticTag(selectedConclusion));
  const selectedModality = /mri|mr|мрт/i.test(selectedStudyName) ? "МРТ" : /ct|кт/i.test(selectedStudyName) ? "КТ" : "Снимок";
  const hasDocSection = docEntries.length > 0;

  useEffect(() => {
    if (typeof onSelectRow === "function") onSelectRow(selectedRow || null);
  }, [selectedRow?._rowId, onSelectRow]);

  const fileBtnStyle = (active) => ({
    width:"100%",
    display:"grid",
    gridTemplateColumns:"20px minmax(0,1fr) auto",
    alignItems:"center",
    gap:8,
    marginBottom:2,
    border:"none",
    borderRadius:7,
    padding:"7px 8px",
    textAlign:"left",
    cursor:"pointer",
    background:active ? "rgba(255,255,255,0.16)" : "transparent",
    color:active ? C.text : C.dim,
    fontSize:11,
    fontWeight:active ? 700 : 500,
  });

  const fileIcon = (
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M4 2.5h5l3 3V13a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1Z" stroke="currentColor" strokeWidth="1.3"/>
      <path d="M9 2.5V5.5h3" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  return (
    <div style={{marginBottom:16,background:C.bg3,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
      <div style={{padding:"9px 10px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <div style={{fontSize:10,fontWeight:700,color:C.dim,letterSpacing:"0.05em",textTransform:"uppercase"}}>Файлы пациента</div>
      </div>

      <div style={{padding:"8px 8px 12px"}}>
        <div style={{padding:"0 2px 5px",fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase"}}>Анализы</div>
        <div style={{maxHeight:230,overflowY:"auto",paddingRight:2}}>
          {!filteredRows.length ? (
            <div style={{padding:"7px 8px 10px",fontSize:11,color:C.muted}}>Анализы не найдены</div>
          ) : filteredRows.map(r => {
            const active = selectedEntryId === r._rowId;
            const organName = OM[r.organ_id]?.n || r.organ_id;
            const studyLabel = translateMedicalDisplay(r.study_type || "", { kind: "study_type" }) || r.study_type || "Исследование";
            return (
              <button key={r._rowId} onClick={() => setSelectedEntryId(r._rowId)} style={fileBtnStyle(active)}>
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",color:active ? C.blue2 : C.muted}}>{fileIcon}</span>
                <span style={{minWidth:0}}>
                  <span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{studyLabel} · {organName}</span>
                  <span style={{display:"block",fontSize:9,color:C.muted,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {r.study_date || "Дата не указана"}
                  </span>
                </span>
                <span style={{fontSize:10,color:C.muted,fontFamily:C.mono}}>scan</span>
              </button>
            );
          })}
        </div>

        {docEntries.length > 0 && (
          <>
            <div style={{height:1,background:C.border,margin:"10px 4px 8px"}}/>
            <div style={{padding:"0 2px 5px",fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase"}}>Документы пациента</div>
            <div>
              {docEntries.map(doc => {
                const active = selectedEntryId === doc.id;
                return (
                  <button key={doc.id} onClick={() => setSelectedEntryId(doc.id)} style={fileBtnStyle(active)}>
                    <span style={{display:"flex",alignItems:"center",justifyContent:"center",color:active ? C.blue2 : C.muted}}>{fileIcon}</span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.label}</span>
                    <span style={{fontSize:10,color:C.muted,fontFamily:C.mono}}>txt</span>
                  </button>
                );
              })}
            </div>
            <div style={{height:1,background:C.border,margin:"10px 4px 8px"}}/>
          </>
        )}

        {selectedDoc && (
          <div style={{padding:"2px 4px 2px"}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:8}}>
              Пациент / документы / <span style={{color:C.text,fontWeight:700}}>{selectedDoc.label}</span>
            </div>
            <div style={{
              width:"100%",
              minHeight:selectedDoc.field === "symptoms" ? 108 : 128,
              padding:"10px 12px",
              background:"rgba(148,180,220,0.04)",
              border:`1.5px solid ${C.border}`,
              borderRadius:9,
              fontSize:11,
              color:C.text,
              lineHeight:1.7,
              boxSizing:"border-box",
              whiteSpace:"pre-wrap",
              wordBreak:"break-word",
            }}>
              {String(fields?.[selectedDoc.field] || "").trim()}
            </div>
          </div>
        )}

        {selectedRow && (
          <div style={{padding: hasDocSection ? "2px 4px 2px" : "0 4px 2px"}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:8}}>
              Пациент / анализы / {selectedStudyLabel} / <span style={{color:C.text,fontWeight:700}}>{selectedOrganName}</span>
            </div>
            {!!selectedRow._hasImages && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                <ScanCard status={selectedRow.status} label={`${selectedModality} A`}/>
                <ScanCard status={selectedRow.status} label={`${selectedModality} B`}/>
              </div>
            )}
            <div style={{fontSize:8,fontWeight:700,color:C.muted,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>Заключение</div>
            {showSelectedConclusionDisplay && (
              <div style={{marginBottom:6,padding:"7px 10px",borderRadius:8,background:"rgba(3,194,252,0.08)",border:`1px solid ${C.border}`,fontSize:10,color:C.text,lineHeight:1.55}}>
                {selectedConclusionDisplay}
              </div>
            )}
            <textarea
              rows={3}
              placeholder={`Заключение по ${selectedOrganName}...`}
              value={selectedConclusion}
              onChange={e => saveRadNote(selectedNoteKey, e.target.value)}
              style={{width:"100%",padding:"9px 12px",background:"rgba(148,180,220,0.04)",border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:11,outline:"none",color:C.text,fontFamily:"inherit",lineHeight:1.65,resize:"vertical",boxSizing:"border-box",transition:"border-color 0.2s"}}
              onFocus={e=>e.target.style.borderColor="rgba(59,130,246,0.4)"}
              onBlur={e=>e.target.style.borderColor=C.border}
            />
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   PATIENT OVERVIEW PANEL
   Studies sorted alpha + symptoms/treatment
═══════════════════════════════════════════════ */
function PatientRecord({
  patient,
  onBack,
  onAddStudy,
  activeOrganTab,
  onCloseOrganTab,
  isolateLayerEnabled = false,
  canIsolateLayer = false,
  onToggleIsolateLayer,
  onSelectStudyRow,
}) {
  useDB();
  const [aiLiveState, setAiLiveState] = useState("idle");

  // Editable record fields
  const recRow = dbGetOne("SELECT * FROM organ_data WHERE patient_id=? AND organ_id='__record__'", [patient.id]);
  let recData = {};
  try { recData = JSON.parse(recRow?.findings || "{}"); } catch{}
  const [fields, setFields] = useState({ symptoms: recData.symptoms||"", treatment: recData.treatment||"" });
  const [radNotes, setRadNotes] = useState(() => { try { return recData.radNotes||{}; } catch{return{};} });

  // Reload when patient changes
  useEffect(() => {
    const r = dbGetOne("SELECT * FROM organ_data WHERE patient_id=? AND organ_id='__record__'", [patient.id]);
    let d = {}; try { d = JSON.parse(r?.findings || "{}"); } catch{}
    setFields({ symptoms:d.symptoms||"", treatment:d.treatment||"" });
    setRadNotes(d.radNotes || {});
    setAiLiveState("idle");
  }, [patient.id]);

  const persistRecordSnapshot = (nextFields = fields, nextRadNotes = radNotes) => {
    const curRow = dbGetOne("SELECT * FROM organ_data WHERE patient_id=? AND organ_id='__record__'", [patient.id]);
    let curData = {}; try { curData = JSON.parse(curRow?.findings || "{}"); } catch{}
    const snapshot = {
      ...curData,
      symptoms: nextFields?.symptoms || "",
      treatment: nextFields?.treatment || "",
      radNotes: nextRadNotes || {},
    };
    delete snapshot.diagnosis;
    const json = JSON.stringify(snapshot);
    if (curRow) {
      dbRun("UPDATE organ_data SET findings=?,study_date=? WHERE patient_id=? AND organ_id='__record__'",
        [json, new Date().toLocaleDateString('ru-RU'), patient.id]);
    } else {
      dbRun("INSERT INTO organ_data(patient_id,organ_id,status,findings,study_date) VALUES(?,?,?,?,?)",
        [patient.id, '__record__', 'none', json, new Date().toLocaleDateString('ru-RU')]);
    }
  };

  // Current organ slice + full history for file explorer
  const organRows = dbQuery("SELECT * FROM organ_data WHERE patient_id=? AND organ_id NOT IN ('__record__','__ai__')", [patient.id]);
  const timelineSourceRows = getPatientTimelineSourceRows(patient.id);
  const timelineRowsForImages = dbQuery(
    "SELECT organ_id,study_type,dicom_refs,payload,conclusion,date_iso,id FROM timeline_items WHERE patient_id=? ORDER BY date_iso DESC, id DESC",
    [patient.id]
  );
  const timelineRowsForImagesSig = timelineRowsForImages
    .map(r => `${r.id || ""}|${r.organ_id || ""}|${r.study_type || ""}|${r.date_iso || ""}|${r.dicom_refs || ""}|${r.payload || ""}|${r.conclusion || ""}`)
    .join("||");
  const timelineImageIndex = useMemo(() => {
    return buildTimelineImageIndexForRows(timelineRowsForImages);
  }, [timelineRowsForImagesSig]);
  const aiOverlayRow = dbGetOne("SELECT * FROM organ_data WHERE patient_id=? AND organ_id='__ai__'", [patient.id]);
  let aiOverlayData = {};
  try { aiOverlayData = JSON.parse(aiOverlayRow?.findings || "{}"); } catch {}
  const aiOverlayMap = canonicalizeOrganMap(aiOverlayData.organMap || {});
  const STATUS_PRIORITY = { sick: 3, warning: 2, healthy: 1, none: 0 };
  const resolveDisplayStatus = (rowOrStatus, organId) => {
    const b = typeof rowOrStatus === "object"
      ? resolveRowClinicalStatus(rowOrStatus, rowOrStatus?.status)
      : String(rowOrStatus || "none");
    const a = String(aiOverlayMap?.[organId] || "");
    return (STATUS_PRIORITY[a] ?? 0) > (STATUS_PRIORITY[b] ?? 0) ? a : b;
  };
  const resolvedOrganRows = organRows.map(r => {
    const resolvedOrganId = resolveClinicalOrganId(r.organ_id, r.study_type, r.findings, r.notes);
    return {
      ...r,
      organ_id: resolvedOrganId,
      _source_organ_id: r.organ_id,
      status: resolveDisplayStatus(r, resolvedOrganId),
      _hasImages: hasTimelineImages(timelineImageIndex, resolvedOrganId, r.study_type),
    };
  });
  const timelineSourceSignature = timelineSourceRows
    .map(r => `${r._timeline_item_id || ""}|${r.organ_id || ""}|${r.study_type || ""}|${r.study_date || ""}|${r.date_iso || ""}|${r.findings || ""}|${r.notes || ""}|${r.status || ""}`)
    .join("||");
  const resolvedStudyRows = useMemo(() => {
    return (timelineSourceRows || []).map(r => {
      const resolvedOrganId = resolveClinicalOrganId(r.organ_id, r.study_type, r.findings, r.notes);
      return {
        ...r,
        organ_id: resolvedOrganId,
        _source_organ_id: r.organ_id,
        status: resolveRowClinicalStatus(r, r?.status),
        study_date: formatStudyDateDisplay(r.date_iso || r.study_date || ""),
        _hasImages: hasTimelineImages(timelineImageIndex, resolvedOrganId, r.study_type),
      };
    });
  }, [timelineSourceSignature, timelineRowsForImagesSig]);

  const saveRadNote = (scanKey, val) => {
    const updated = { ...radNotes, [scanKey]: val };
    setRadNotes(updated);
  };

  // Autosave doctor notes / symptoms / treatment
  useEffect(() => {
    const t = setTimeout(() => {
      persistRecordSnapshot(fields, radNotes);
      pub('organ_updated', { pid: patient.id, source: 'record_autosave' });
    }, 320);
    return () => clearTimeout(t);
  }, [patient.id, fields.symptoms, fields.treatment, JSON.stringify(radNotes)]);

  const organFindingsSignature = organRows.map(r => `${r.id||""}|${r.organ_id||""}|${r.study_type||""}|${r.findings||""}`).join("||");

  // Realtime AI analysis from conclusions + symptoms + treatment
  useEffect(() => {
    let cancelled = false;
    const t = setTimeout(async () => {
      const relevantOrganRows = organRows.filter(r => resolveRowClinicalStatus(r, r?.status) !== "none");
      const studyKeys = new Set();
      const conclusionChunks = [];
      relevantOrganRows.forEach(r => {
        const key = `${r.study_type || ""}_${r.organ_id || ""}`;
        studyKeys.add(key);
        const fromCard = String(radNotes?.[key] ?? "").trim();
        const fromDb = String(r?.findings || "").trim();
        if (fromCard) conclusionChunks.push(fromCard);
        else if (fromDb) conclusionChunks.push(fromDb);
      });
      Object.entries(radNotes || {}).forEach(([k, v]) => {
        if (studyKeys.has(k)) return;
        const txt = String(v || "").trim();
        if (txt) conclusionChunks.push(txt);
      });

      const liveText = [
        fields.symptoms || "",
        fields.treatment || "",
        ...conclusionChunks
      ].join("\n").trim();

      if (!liveText || liveText.length < 4) {
        dbRun("DELETE FROM organ_data WHERE patient_id=? AND organ_id='__ai__'", [patient.id]);
        pub('organ_updated', { pid: patient.id, source: 'ai_clear' });
        setAiLiveState("idle");
        return;
      }

      setAiLiveState("analyzing");
      try {
        const results = await analyzeText(liveText);
        const organMap = mergeAnalysisToOrgans(results || []);
        relevantOrganRows.forEach(r => {
          const key = `${r.study_type || ""}_${r.organ_id || ""}`;
          const txt = String(radNotes?.[key] ?? r?.findings ?? "").trim();
          const heur = inferStatusFromConclusionText(txt);
          if (!heur || heur === "none") return;
          const oid = canonicalizeOrganId(r.organ_id);
          if (!oid) return;
          if ((STATUS_PRIORITY[heur] ?? 0) > (STATUS_PRIORITY[organMap[oid]] ?? 0)) {
            organMap[oid] = heur;
          }
        });
        if (cancelled) return;

        const payload = JSON.stringify({
          text: liveText,
          results,
          organMap,
          updatedAt: new Date().toISOString()
        });
        const existing = dbGetOne("SELECT id FROM organ_data WHERE patient_id=? AND organ_id='__ai__'", [patient.id]);
        if (existing) {
          dbRun("UPDATE organ_data SET findings=?,study_date=? WHERE patient_id=? AND organ_id='__ai__'",
            [payload, new Date().toLocaleDateString('ru-RU'), patient.id]);
        } else {
          dbRun("INSERT INTO organ_data(patient_id,organ_id,status,findings,study_date) VALUES(?,?,?,?,?)",
            [patient.id, '__ai__', 'none', payload, new Date().toLocaleDateString('ru-RU')]);
        }
        pub('organ_updated', { pid: patient.id, source: 'ai_overlay' });
        setAiLiveState("synced");
      } catch (e) {
        console.warn("Realtime AI analysis failed:", e);
        setAiLiveState("error");
      }
    }, 650);

    return () => { cancelled = true; clearTimeout(t); };
  }, [patient.id, fields.symptoms, fields.treatment, JSON.stringify(radNotes), organFindingsSignature]);

  // Current organ tab data
  const activeOrganData = activeOrganTab ? dbGetOne("SELECT * FROM organ_data WHERE patient_id=? AND organ_id=?", [patient.id, activeOrganTab]) : null;
  const activeOrganStatus = activeOrganData ? resolveDisplayStatus(activeOrganData, activeOrganData?.organ_id) : "none";
  const activeHasImages = !!(activeOrganData && hasTimelineImages(timelineImageIndex, activeOrganData.organ_id, activeOrganData.study_type));
  const activeMeta = activeOrganTab ? OM[activeOrganTab] : null;
  const sc = activeOrganData ? ({sick:C.red2,warning:C.orange2,healthy:C.green2}[activeOrganStatus]||C.muted) : C.muted;
  const activeStudyTypeDisplay = translateMedicalDisplay(activeOrganData?.study_type || "", { kind: "study_type" }) || activeOrganData?.study_type || "";
  const activeFindingsDisplay = translateMedicalDisplay(activeOrganData?.findings || "", { kind: "conclusion", organId: activeOrganData?.organ_id, studyType: activeOrganData?.study_type }) || activeOrganData?.findings || "";

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",height:"100%",overflow:"hidden",background:C.bg}}>
      {/* ── patient header ── */}

function TBtn({ icon, label, active, onClick, accentColor="rgba(3,194,252,0.55)", compact=false }) {
  const [hov, setHov] = React.useState(false);
  const col = active ? "#03C2FC" : "rgba(120,145,180,0.7)";
  return (
    <div style={{position:"relative",display:"flex",alignItems:"center"}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
      <button onClick={onClick} style={{
        width:compact?36:34,height:compact?36:34,borderRadius:10,flexShrink:0,
        border:`1.5px solid ${active?accentColor:C.border2}`,
        background:active?"rgba(3,194,252,0.12)":hov?"rgba(148,180,220,0.07)":C.surf,
        color:col,cursor:"pointer",fontSize:16,
        display:"flex",alignItems:"center",justifyContent:"center",
        transition:"all 0.15s",
      }}>{icon}</button>
      {hov && (
        <div style={{
          position:"absolute",left:"calc(100% + 8px)",top:"50%",transform:"translateY(-50%)",
          background:"rgba(4,7,15,0.95)",border:`1px solid ${C.border2}`,
          borderRadius:6,padding:"4px 10px",whiteSpace:"nowrap",
          fontSize:11,color:C.text,fontWeight:600,pointerEvents:"none",
          boxShadow:"0 4px 16px rgba(0,0,0,0.6)",zIndex:200,
          letterSpacing:"0.01em",
        }}>{label}</div>
      )}
    </div>
  );
}

function SidebarControlMenu({
  showGroupPanel, setShowGroupPanel,
  xrayMode, setXrayMode,
  showTimeline, setShowTimeline,
  criticalOnlyMode, setCriticalOnlyMode,
  modelGroups,
  showLegend, setShowLegend,
  qualitySettings, onQualityChange,
  onBackToPatients,
  defaultCollapsed = false,
  collapseToken = "",
}) {
  const initialPos = React.useMemo(() => ({ left:16, top:70 }), []);
  const [collapsed, setCollapsed] = React.useState(!!defaultCollapsed);
  const [showQuality, setShowQuality] = React.useState(false);
  const [pos, setPos] = React.useState(initialPos);
  const rootRef = React.useRef(null);
  const dragRef = React.useRef({ active:false, startX:0, startY:0, left:0, top:0 });

  React.useEffect(() => {
    setCollapsed(!!defaultCollapsed);
  }, [collapseToken, defaultCollapsed]);

  React.useEffect(() => {
    const onMove = e => {
      if (!dragRef.current.active) return;
      const panelWidth = rootRef.current?.offsetWidth || (collapsed ? 60 : 248);
      const panelHeight = rootRef.current?.offsetHeight || (collapsed ? 52 : 290);
      const nextLeft = dragRef.current.left + (e.clientX - dragRef.current.startX);
      const nextTop = dragRef.current.top + (e.clientY - dragRef.current.startY);
      setPos({
        left: Math.max(10, Math.min(window.innerWidth - panelWidth - 10, nextLeft)),
        top: Math.max(64, Math.min(window.innerHeight - panelHeight - 10, nextTop)),
      });
    };
    const onUp = () => {
      dragRef.current.active = false;
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, [collapsed]);

  const beginDrag = e => {
    if (e.button !== 0) return;
    e.preventDefault();
    dragRef.current = { active:true, startX:e.clientX, startY:e.clientY, left:pos.left, top:pos.top };
    document.body.style.userSelect = "none";
    document.body.style.cursor = "grabbing";
  };

  const actionBtn = (primary=false) => ({
    width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
    background:primary?"linear-gradient(135deg,#2563eb,#0891b2)":"transparent",
    border:primary?"none":`1px solid ${C.border}`,
    borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:700,
    color:primary?"#fff":C.text,justifyContent:"flex-start"
  });

  if (collapsed) {
    return (
      <div ref={rootRef} style={{ position:"fixed", left:pos.left, top:pos.top, zIndex:100 }}>
        <div style={{
          display:"flex", alignItems:"center", gap:6, padding:"7px 8px",
          background:"rgba(8,14,26,0.94)", border:`1px solid ${C.border2}`,
          borderRadius:14, backdropFilter:"blur(16px)", boxShadow:"0 18px 36px rgba(0,0,0,0.38)"
        }}>
          <button
            onMouseDown={beginDrag}
            title="Перетащить меню"
            style={{
              width:20,height:28,border:"none",background:"transparent",cursor:"grab",color:"rgba(148,180,220,0.55)",
              display:"flex",alignItems:"center",justifyContent:"center",padding:0
            }}
          >
            <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
              <circle cx="2" cy="3" r="1" fill="currentColor"/><circle cx="8" cy="3" r="1" fill="currentColor"/>

    return () => {
      if (sidebarModelTimerRef.current) clearTimeout(sidebarModelTimerRef.current);

  const scheduleSidebarModelMount = useCallback(() => {
    if (sidebarModelTimerRef.current) clearTimeout(sidebarModelTimerRef.current);

      setSidebarModelReady(true);
      sidebarModelTimerRef.current = null;

    const snapshot = preIsolationGroupVisRef.current;
    if (snapshot) {
      preIsolationGroupVisRef.current = null;
      setGroupVis(snapshot);
    }
  }, []);

  const toggleGroup = (name, bulk) => {
    if (isolateLayerEnabled) {
      setIsolateLayerEnabled(false);
      restoreGroupVisibility();
    }
    if (name === "__set__" && bulk) {
      setGroupVis(normalizeGroupVisibility(bulk, false));
      return;
    }
    setGroupVis(prev => normalizeGroupVisibility({ ...(prev || {}), [name]: !prev?.[name] }, false));
  };

  );

  const getPatientStatus = (pid) => {
    const rows = dbQuery("SELECT status FROM organ_data WHERE patient_id=?", [pid]);
    if (rows.some(r=>r.status==="sick")) return "sick";
    if (rows.some(r=>r.status==="warning")) return "warning";
    if (rows.length) return "ok";
    return "none";

      clearTimeout(closePatientTimerRef.current);

    setActiveOrganLayer(null);
    setIsolateLayerEnabled(false);

    setHoverOverlay(null);
    setCardsFrozen(false);
    setShowGroupPanel(false);

      sidebarModelTimerRef.current = null;
    }
    setSidebarModelReady(false);
    setSidebarOpen(false);
    setShowGroupPanel(false);
    setSelOrgan(null);
    setActiveOrganLayer(null);
    setIsolateLayerEnabled(false);
    restoreGroupVisibility();

    setNavScene(null);
    setCardsFrozen(false);
    setSelectedStudyDate("");

      setIsolateLayerEnabled(false);
      restoreGroupVisibility();
    }
  };

      const delta = e.clientX - startXRef.current;
      const nw = Math.max(360, Math.min(window.innerWidth * 0.82, startWRef.current + delta));
      setSidebarWidth(nw);
    };
    const onUp = () => { draggingRef.current = false; document.body.style.cursor = ""; document.body.style.userSelect = ""; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const startResize = e => {
    e.preventDefault();
    draggingRef.current = true;
    startXRef.current = e.clientX;
    startWRef.current = sidebarWidth;
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  };

  useEffect(() => {
    if (!sidebarOpen || !sel) {
      setHoverOverlay(null);
      if (!sidebarOpen) setNavScene(null);
    }
  }, [sidebarOpen, sel]);

  useEffect(() => {
    const isCtrl = (e) => e.key === "Control" || e.code === "ControlLeft" || e.code === "ControlRight";
    const onKeyDown = (e) => {
      if (!isCtrl(e) || e.altKey || e.metaKey || e.shiftKey) return;
      setCardsFrozen(true);

    const onKeyUp = (e) => {
      if (!isCtrl(e)) return;
      setCardsFrozen(false);
    };
    const onBlur = () => setCardsFrozen(false);
    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);
    window.addEventListener("blur", onBlur);
    return () => {
      window.removeEventListener("keydown", onKeyDown);
      window.removeEventListener("keyup", onKeyUp);
      window.removeEventListener("blur", onBlur);

                    const center = box.getCenter(new THREE.Vector3());
                    const size = Math.max(0.02, box.getSize(new THREE.Vector3()).length());
                    s.controls.target.copy(center);
                    s.camera.position.copy(center.clone().add(new THREE.Vector3(0, size * 0.05, size * 1.8)));
                    s.controls.update();
                    s.invalidate && s.invalidate();
                  } catch (_) {}
                }
              }
              const resolvedOrganId = canonicalizeOrganId(
                hit?.organId ||
                inferMajorOrganIdFromMeshName(hit?.meshName || "", hit?.category || "") ||
                normalizeMeshName(hit?.meshName || "")
              );
              const fallbackOrganId = canonicalizeOrganId(
                inferMajorOrganIdFromMeshName(hit?.meshName || "", hit?.category || "") ||
                normalizeMeshName(hit?.meshName || "")
              );
              const openOrganId = OM[resolvedOrganId] ? resolvedOrganId : (OM[fallbackOrganId] ? fallbackOrganId : null);
              if (openOrganId) setSelOrgan(openOrganId);
              const fallbackMeta = meshName && s.getMeshMeta ? s.getMeshMeta(meshName) : null;
              setActiveOrganLayer(hit?.groupName || fallbackMeta?.groupName || null);
            }}
          />
        )}

        <div style={{flex:1,display:"flex",overflow:"hidden",position:"relative"}}>
          {!sel&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}} className="fade-in">

const inputStyle = {display:"block",width:"100%",padding:"11px 14px",marginBottom:10,background:"rgba(148,180,220,0.06)",border:`1.5px solid ${C.border2}`,borderRadius:10,fontSize:13,outline:"none",color:C.text,boxSizing:"border-box",fontFamily:"inherit",transition:"all 0.2s",letterSpacing:"0.01em"};

function Auth({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [role, setRole] = useState("doctor");
  const [gender, setGender] = useState("male");
  const [form, setForm] = useState({email:"",pw:"",name:"",confirm:"",spec:""});
  const [err, setErr] = useState("");

  const submit = async () => {
    setErr("");
    if (mode==="login") {
      let u = dbGetOne("SELECT * FROM users WHERE email=? AND pw=?", [form.email, form.pw]);
      if (!u && form.email) {
        await cloudPullForUser({ role: "doctor", email: form.email });
        u = dbGetOne("SELECT * FROM users WHERE email=? AND pw=?", [form.email, form.pw]);
      }
      if (!u) return setErr("Неверный email или пароль");
      onLogin(u);
    } else {
      if (!form.name||!form.email||!form.pw) return setErr("Заполните все поля");
      if (form.pw!==form.confirm) return setErr("Пароли не совпадают");
      if (dbGetOne("SELECT 1 FROM users WHERE email=?", [form.email])) return setErr("Email уже занят");
      const av = form.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      dbRun("INSERT INTO users(email,pw,role,name,gender,spec,av) VALUES(?,?,?,?,?,?,?)",
        [form.email, form.pw, role, form.name, gender, form.spec||"", av]);
      const u = dbGetOne("SELECT * FROM users WHERE email=?", [form.email]);
      if (role==="patient") {
        dbRun("INSERT INTO patients(name,gender,user_id,doctor_id) VALUES(?,?,?,1)", [form.name, gender, u.id]);
      }
      onLogin(u);
    }
  };

  return (
    <div style={{minHeight:"100dvh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Sora',system-ui,sans-serif",padding:16}}>

      <div style={{width:"100%",maxWidth:400,background:C.bg2,borderRadius:20,boxShadow:"0 24px 80px rgba(0,0,0,0.7), 0 1px 0 rgba(148,180,220,0.08) inset",border:`1px solid ${C.border}`,overflow:"hidden",position:"relative",zIndex:1}}>

          <HuMapperLogo size={52} style={{margin:"0 auto 16px",display:"block"}}/>
          <div style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:"-0.8px"}}>HuMapper</div>
          <div style={{fontSize:11,color:C.muted,marginTop:5,letterSpacing:"0.06em",textTransform:"uppercase"}}>Клиническая система визуализации</div>
        </div>

        {/* Mode tabs */}
        <div style={{display:"flex",background:C.bg3,borderBottom:`1px solid ${C.border}`}}>
          {[["login","Войти"],["register","Регистрация"]].map(([id,l])=>(

          ))}
        </div>

        <div style={{padding:"22px 28px 26px"}}>
          {/* Role selector */}

              <button key={id} onClick={()=>setRole(id)} style={{flex:1,padding:"10px",border:`2px solid ${role===id?C.blue:C.border2}`,borderRadius:11,cursor:"pointer",background:role===id?C.accent:C.surf,color:role===id?C.blue2:C.dim,fontWeight:600,fontSize:12,transition:"all 0.2s"}}>{l}</button>

                <button key={id} onClick={()=>setGender(id)} style={{flex:1,padding:"9px",border:`2px solid ${gender===id?C.blue:C.border2}`,borderRadius:9,cursor:"pointer",background:gender===id?C.accent:C.surf,color:gender===id?C.blue2:C.dim,fontWeight:600,fontSize:12}}>{l}</button>
              ))}

          </>}

          <input style={inputStyle} type="email" placeholder="Email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          <input style={inputStyle} type="password" placeholder="Пароль" value={form.pw} onChange={e=>setForm({...form,pw:e.target.value})} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          {mode==="register"&&<input style={inputStyle} type="password" placeholder="Повторите пароль" value={form.confirm} onChange={e=>setForm({...form,confirm:e.target.value})}/>}

          {err&&<div style={{marginBottom:12,padding:"10px 14px",background:"rgba(239,68,68,0.08)",color:C.red2,borderRadius:10,fontSize:12,border:`1px solid rgba(239,68,68,0.2)`}}> {err}</div>}

          <button onClick={submit} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#2563eb,#0891b2)",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(37,99,235,0.35)",letterSpacing:"0.02em",marginBottom:16}}
            onMouseEnter={e=>e.target.style.opacity="0.88"} onMouseLeave={e=>e.target.style.opacity="1"}>
            {mode==="login"?"Войти в систему →":"Создать аккаунт"}
          </button>

          {/* Demo credentials */}
          <div style={{background:C.bg3,borderRadius:12,padding:"13px 16px",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:9,fontWeight:700,color:C.muted,marginBottom:10,letterSpacing:"0.08em",textTransform:"uppercase"}}> Демо-доступ</div>
            {[["dr@demo.com","demo","‍  Смирнов А.В. — Врач-терапевт"],["p@demo.com","demo","  Демо Пациент (с данными)"]].map(([e,pw,l])=>(
              <div key={e} onClick={()=>setForm(f=>({...f,email:e,pw}))}
                style={{padding:"7px 10px",borderRadius:8,cursor:"pointer",fontSize:12,color:C.blue2,fontWeight:500,transition:"background 0.15s"}}
                onMouseEnter={ev=>ev.currentTarget.style.background=C.accent}
                onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>{l}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════ */
function App() {
  const [dbLoaded, setDbLoaded] = useState(false);
  const [user, setUser] = useState(null);
  const isMobile = window.innerWidth < 768;

  useEffect(() => {
    let cancelled = false;
    (async () => {
      await initDB();
      let restoredUser = null;
      try {
        const saved = sessionStorage.getItem('medvis_user');
        if (saved) restoredUser = JSON.parse(saved);
      } catch (_) {}

      if (restoredUser?.role === "doctor") {
        setCloudSyncUser(restoredUser);
        await cloudPullForUser(restoredUser);
      } else {
        setCloudSyncUser(null);
      }

      await autoImportLocalDatasetV1(1);

      if (restoredUser?.role === "doctor") {
        await cloudPushNow(true);
      }

      if (cancelled) return;
      setDbLoaded(true);
      if (restoredUser) setUser(restoredUser);
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    const onUnload = () => {
      if (user?.role === "doctor") cloudPushNow(true);
    };
    window.addEventListener("beforeunload", onUnload);
    return () => window.removeEventListener("beforeunload", onUnload);
  }, [user?.role, user?.email, user?.id]);

  const handleLogin = async (u) => {
    if (u?.role === "doctor") {
      setCloudSyncUser(u);
      await cloudPullForUser(u);
      await cloudPushNow(true);
    } else {
      setCloudSyncUser(null);
    }
    setUser(u);
    sessionStorage.setItem('medvis_user', JSON.stringify(u));
  };
  const handleLogout = () => {
    if (user?.role === "doctor") {
      cloudPushNow(true);
    }
    setCloudSyncUser(null);
    setUser(null);
    sessionStorage.removeItem('medvis_user');
  };

  if (!dbLoaded) return (
    <div style={{height:"100dvh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <div style={{position:"relative",width:64,height:64}}>
        <div style={{position:"absolute",inset:0,border:"2px solid rgba(59,130,246,0.15)",borderRadius:"50%"}}/>
        <div style={{position:"absolute",inset:0,border:"2px solid transparent",borderTopColor:C.blue,borderRadius:"50%",animation:"spin 1.1s linear infinite"}}/>
        <div style={{position:"absolute",inset:12,border:"1.5px solid transparent",borderTopColor:"rgba(34,211,238,0.5)",borderRadius:"50%",animation:"spin 0.7s linear infinite reverse"}}/>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:18,fontWeight:700,color:C.text,letterSpacing:"-0.5px"}}>HuMapper</div>
        <div style={{fontSize:11,color:C.muted,marginTop:6,letterSpacing:"0.04em"}}>ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ...</div>
      </div>
    </div>
  );

  if (!user) return <Auth onLogin={handleLogin}/>;
  if (user.role==="doctor") return isMobile ? <DoctorMobile user={user} onLogout={handleLogout}/> : <DoctorDesktop user={user} onLogout={handleLogout}/>;
  return isMobile ? <PatientMobile user={user} onLogout={handleLogout}/> : <PatientDesktop user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
