/* ─── NLP TEXT ANALYZER ────────────────────────
   Infrastructure hook: swap analyzeWithAI() in
   when neural backend is ready.
──────────────────────────────────────────────── */

// 1. Pure keyword matcher (current implementation)
function analyzeWithKeywords(text) {
  if (!text || text.trim().length < 3) return [];
  const lower = text.toLowerCase();
  const results = [];
  for (const disease of DISEASE_DB) {
    const matched = disease.keywords.some(kw => lower.includes(kw));
    if (matched) {
      results.push({
        disease: disease.name,
        severity: disease.severity,
        organs: disease.organs,
        confidence: 0.75, // keyword match confidence
        source: "keyword",
      });
    }
  }
  const glossaryMatches = getDiagnosisGlossaryMatches(text);
  glossaryMatches.forEach(({ entry }) => {
    if (!entry?.organ_id) return;
    const inferred = inferStatusFromConclusionText(text);
    const severity = inferred && inferred !== "none" ? inferred : (entry.defaultSeverity || "warning");
    results.push({
      disease: entry.display_ru || entry.source_en || entry.canonical_key,
      severity,
      organs: [{ id: entry.organ_id, status: severity === "healthy" ? "healthy" : severity }],
      confidence: 0.82,
      source: "glossary",
    });
  });
  return results;
}

// 2. AI endpoint — Gemini on the backend, with graceful fallback
async function analyzeWithAI(text) {
  if (!text || text.trim().length < 4) return [];
  const res = await fetch('/api/analyze', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ text })
  });
  if (!res.ok) {
    const msg = await res.text().catch(()=> '');
    throw new Error(msg || `AI_HTTP_${res.status}`);
  }
  const data = await res.json();
  return Array.isArray(data?.results) ? data.results : [];
}

// 3. Main entry point — merges AI with keyword fallback for robustness
async function analyzeText(text) {
  const aiResults = [];
  try {
    const got = await analyzeWithAI(text);
    if (Array.isArray(got)) aiResults.push(...got);
  } catch(e) {
    // AI unavailable — keep keyword fallback below
  }

  const kwResults = analyzeWithKeywords(text);
  const out = [];
  const seen = new Set();

  const pushUnique = (arr) => {
    (arr || []).forEach(item => {
      const key = JSON.stringify({
        disease: item?.disease || '',
        severity: item?.severity || '',
        organs: (item?.organs || []).map(o => `${o.id}:${o.status}`).sort()
      });
      if (seen.has(key)) return;
      seen.add(key);
      out.push(item);
    });
  };

  pushUnique(aiResults);
  pushUnique(kwResults);
  return out;
}

// 4. Merge analysis results into organ status map
// Returns { organ_id: 'sick'|'warning'|'healthy' }
function mergeAnalysisToOrgans(results) {
  const priority = { sick: 2, warning: 1, healthy: 0 };
  const map = {};
  for (const r of results) {
    for (const o of (r?.organs || [])) {
      const oid = resolveClinicalOrganId(o.id, r?.disease || "", r?.label || "", r?.summary || "");
      if (!oid) continue;
      const cur = map[oid];
      if (!cur || priority[o.status] > priority[cur]) {
        map[oid] = o.status;
      }
    }
  }
  return canonicalizeOrganMap(map);
}

const CLINICAL_STATUS_PRIORITY = { none: 0, healthy: 1, warning: 2, sick: 3 };

function getDiagnosisGlossaryStatus(text) {
  const matches = getDiagnosisGlossaryMatches(text);
  if (!matches.length) return "";
  let best = "";
  matches.forEach(({ entry }) => {
    const next = String(entry?.defaultSeverity || "").trim().toLowerCase();
    if (!next) return;
    if (!best || (CLINICAL_STATUS_PRIORITY[next] || 0) > (CLINICAL_STATUS_PRIORITY[best] || 0)) {
      best = next;
    }
  });
  return best;
}

function inferStatusFromConclusionText(text) {
  const src = String(text || "").trim();
  if (!src) return "none";
  const t = src.toLowerCase();
  const hasNegation = /(no evidence of|without evidence|negative for|rule(?:d)? out|excluded|without|нет признаков|без признаков|исключ(?:ено|ён|ена)|не выявлено)/i.test(src);
  if (hasNegation) return "healthy";
  if (/clinical[_\s-]?status\s*[:=]\s*resolved|\bresolved\b/i.test(t)) return "healthy";
  if (/clinical[_\s-]?status\s*[:=]\s*(inactive|remission)|\bremission\b|\binactive\b/i.test(t)) return "warning";
  if (/\(person\)|\bperson\b/i.test(src)) return "healthy";
  const glossaryStatus = getDiagnosisGlossaryStatus(src);
  if (glossaryStatus === "none") return "none";
  if (/\(procedure\)|\bprocedure\b/i.test(src)) {
    if (/(complication|adverse|hemorrhag|bleed|perforat|infection|sepsis|shock|acute|injury|trauma|fracture|dislocation|iatrogenic|post[-\s]?op)/i.test(t)) return "sick";
    return "warning";
  }
  if (/\(situation\)|\bsituation\b/i.test(src)) {
    if (/(acute|severe|critical|decompensat|shock|sepsis|bleed|embol|stroke|infarct|respiratory failure|renal failure|hepatic failure)/i.test(t)) return "sick";
    return "warning";
  }
  if (/\(disorder\)|\bdisorder\b/i.test(src)) return "sick";
  if (/\(morphologic(?:al)? abnormality\)|\bmorphologic(?:al)?\s+abnormalit(?:y|ies)\b|морфологическ[а-яё]+\s+аномал[а-яё]+/i.test(src)) return "sick";
  if (/\(finding\)|\bfinding\b/i.test(src)) {
    if (/\bnormal\b|within normal|no abnormal|unremarkable|without significant findings|норма|без патологии/i.test(t)) return "healthy";
    return "warning";
  }
  if (/malignant neoplasm|carcinoma|adenocarcinoma|sarcoma|lymphoma|leukemia|cancer|рак|карцинома|злокачеств/i.test(t)) return "sick";
  if (/(acute|остр[а-я]+)\s+(infar|stroke|sepsis|failure|bleed|fracture|bronchitis|pneumonia|панкреатит|инфаркт|инсульт|сепсис|недостаточност|кровотеч|перелом|пневмон)/i.test(t)) return "sick";
  if (glossaryStatus) return glossaryStatus;
  if (/\b(screening|referral|review due|follow[- ]up|consultation|checkup|wellness|скрининг|направление|контроль|консультац|профилактическ)/i.test(t)) return "warning";
  return "none";
}

function extractRowClinicalText(row, payloadOverride = null) {
  const payload = payloadOverride || parseJsonObjectSafe(row?.payload);
  return [
    row?.study_type,
    row?.findings,
    row?.conclusion,
    row?.notes,
    payload?.conclusion,
    payload?.condition_description,
    payload?.notes,
  ]
    .map(v => String(v || "").trim())
    .filter(Boolean)
    .join(" ")
    .trim();
}

function resolveRowClinicalStatus(row, rawStatusOverride = "") {
  const payload = parseJsonObjectSafe(row?.payload);
  const rawStatus =
    rawStatusOverride ||
    payload?.organ_status ||
    payload?.clinical_status ||
    payload?.status ||
    row?.organ_status ||
    row?.clinical_status ||
    row?.status ||
    "";
  const base = normalizeClinicalStatus(rawStatus, row?.color, row?.subtype);
  if (detectResolvedOutcome({ ...row, status: rawStatus }, base)) return "healthy";
  const text = extractRowClinicalText(row, payload);
  if (!text) return base;
  const inferred = inferStatusFromConclusionText(text);
  if (inferred && inferred !== "none") return inferred;
  const glossaryStatus = getDiagnosisGlossaryStatus(text);
  if (glossaryStatus) return glossaryStatus;
  return base;
}

function inferMajorOrganIdFromMeshName(meshName, cat="visceral") {
  const raw = String(meshName || "");
  const n = normalizeMeshName(raw);

  const left  = /\bleft\b/.test(n) || /(?:\.l\b|\bleft\b)/.test(raw.toLowerCase());
  const right = /\bright\b/.test(n) || /(?:\.r\b|\bright\b)/.test(raw.toLowerCase());
  const has = (re) => re.test(n);

  // Global heart fallback: keep it strict to avoid false matches (e.g. brain ventricles).
  if (has(/\bheart\b|\bcardiac\b|coronary|pericard|myocard|endocard|epicard|atrioventricular|mitral|tricuspid|aortic valve|pulmonary valve|papillary muscle|chordae tendineae/)) {
    return "heart";
  }

  if (cat === "cardiovascular") {
    if (has(/coronary|anterior interventricular|circumflex artery of heart|great cardiac vein|middle cardiac vein|coronary sinus/)) return "coronary_vessels";
    if (has(/\bheart\b|atrium|ventricle|pericard|myocard|endocard|epicard|atrioventricular valve|pulmonary valve|aortic valve|mitral|tricuspid|papillary muscle|chordae|trabeculae/)) return "heart";
    if (has(/pulmonary trunk|pulmonary artery|pulmonary vein|lingular artery|segmental artery of left lung|segmental artery of right lung|vein of right lung|vein of left lung/)) return "pulmonary_vessels";
    if (has(/renal artery|renal vein|intrarenal|suprarenal/)) return right ? "kidney_right" : left ? "kidney_left" : "kidney";
    if (has(/pancreaticoduodenal|pancreatic artery|pancreatic vein|pancreatic/)) return "pancreas";
    if (has(/aortic arch|thoracic aorta|ascending aorta|aorta\b|brachiocephalic trunk/)) return "aorta";
    if (has(/carotid|thyroid artery|facial artery|maxillary artery|occipital artery|temporal artery|ophthalmic artery|ethmoidal artery|labial artery|inferior alveolar artery|infra orbital artery|infra-orbital artery|sphenopalatine|palatine artery|mental branch|submental artery|ascending pharyngeal/)) {
      return has(/thyroid/) ? "thyroid" : "carotid_vessels";
    }
    if (has(/cerebral artery|basilar artery|cerebellar artery|callosomarginal|pericallosal|lateral striate|precentral sulcus|central sulcus|parietal artery|temporo occipital|temporo-occipital|pontine branches|retinal artery|anterior cerebral artery|middle cerebral artery|posterior cerebral artery/)) return "cerebral_vessels";
    if (has(/brachial artery|axillary artery|radial artery|ulnar artery|palmar|metacarpal arteries|interosseous artery|humeral artery|thoraco acromial|thoraco-acromial|subscapular artery|circumflex humeral|suprascapular artery|deep brachial|ulnar collateral|radial collateral/)) return "upper_limb_vessels";
    if (has(/common iliac|external iliac|internal iliac|femoral artery|popliteal artery|tibial artery|fibular artery|peroneal artery|genicular|dorsalis pedis|plantar artery|metatarsal artery|digital arteries of foot|gluteal artery|obturator artery|iliolumbar artery|circumflex iliac|inferior epigastric/)) return "lower_limb_vessels";
    if (has(/splenic/)) return "spleen";
    if (has(/hepatic|portal vein|gastroduodenal/)) return "liver";
    if (has(/left gastric|right gastric|gastro omental|gastro-omental|gastric/)) return "stomach";
    if (has(/mesenteric|ileocolic|colic|sigmoid/)) return has(/small/) ? "small_intestine" : "large_intestine";
    return null;
  }

  if (cat === "lymphoid") {
    if (has(/palatine tonsil/)) return "tonsils";
    if (has(/thymus/)) return "thymus";
    if (has(/\bspleen\b|splenic nodes/)) return "spleen";
    if (has(/thyroid nodes|pretracheal|paratracheal cervical|retropharyngeal|jugular|cervical nodes|submandibular|submental|mastoid|occipital nodes|parotid nodes|auricular|mandibular node|nasolabial|bucinator|supraclavicular/)) return "lymph_nodes_head_neck";
    if (has(/tracheobronchial|paratracheal thoracic|parasternal|pericardial|diaphragmatic|juxta oesophageal|juxta-oesophageal|intrapulmonary|intercostal|brachiocephalic nodes|azygos|ligamentum arteriosum/)) return "lymph_nodes_thoracic";
    if (has(/coeliac|gastric nodes|gastro omental|gastro-omental|pyloric|pancreatic|cystic node|mesenteric|ileocolic|colic nodes|appendicular|precaecal|retrocaecal|lumbar nodes|aortic nodes|caval nodes|epigastric nodes/)) return "lymph_nodes_abdominal";
    if (has(/iliac|obturator|gluteal nodes|sacral nodes|vesical|pararectal|prevesical|postvesical|common iliac/)) return "lymph_nodes_pelvic";
    if (has(/axillary|brachial nodes|interpectoral|infraclavicular|supratrochlear|cubital/)) return "lymph_nodes_upper_limb";
    if (has(/inguinal|lacunar node|popliteal|tibial node|fibular node/)) return "lymph_nodes_lower_limb";
    return null;
  }

  if (cat === "visceral") {
    if (has(/parotid|submandibular|sublingual|parotid duct|submandibular duct/)) return "salivary_glands";
    if (has(/gingiva|oral cavity|mouth|buccal mucosa|hard palate|soft palate|tooth|teeth|incisor|canine|premolar|molar|alveolar|dental arch|dental/)) return "oral_cavity";
    if (has(/nasal cavity|nasal mucosa|nose|paranasal sinus|maxillary sinus|frontal sinus|ethmoidal sinus|ethmoid air cell|sphenoid sinus|inferior nasal concha|middle nasal concha|superior nasal concha|vomer/)) return "nasal_sinuses";
    if (has(/tongue|uvula|gingiva/)) return "tongue";
    if (has(/thyroid gland/)) return "thyroid";
    if (has(/parathyroid/)) return "parathyroid";
    if (has(/oesophagus|esophagus/)) return "esophagus";
    if (has(/bronchus|bronchi/)) return "trachea";
    if (has(/lung/)) return left ? "lung_left" : right ? "lung_right" : "lung";
    if (has(/stomach|gastric/)) return "stomach";
    if (has(/duodenum|jejunum|ileum|small intestine/)) return "small_intestine";
    if (has(/colon|caec|cecum|appendix|sigmoid|rectum|large intestine|taenia/)) return "large_intestine";
    if (has(/liver|hepatic/)) return "liver";
    if (has(/gallbladder|bile duct/)) return "gallbladder";
    if (has(/pancrea/)) return "pancreas";
    if (has(/\bspleen\b/)) return "spleen";
    if (has(/kidney|renal|ureter/)) return right ? "kidney_right" : left ? "kidney_left" : "kidney";
    if (has(/bladder|vesical|urethra/)) return "bladder";
    if (has(/prostat/)) return "prostate";
    if (has(/testis|epididymis/)) return right ? "testis_right" : left ? "testis_left" : null;
    if (has(/seminal vesicle|deferens|ejaculatory duct/)) return "seminal_vesicles";
    if (has(/penis/)) return "penis";
    if (has(/uterus|cervix|endomet|myomet/)) return "uterus";
    if (has(/ovary|ovarian|uterine tube|fallopian/)) return right ? "ovary_right" : left ? "ovary_left" : null;
    return null;
  }

  if (cat === "nervous") {
    if (has(/tentorium|falx|dura|arachnoid|pia/)) return has(/spinal/) ? "spinal_cord" : "meninges";
    if (has(/spinal|cauda equina|nerve root/)) return "spinal_cord";
    if (has(/nerve|plexus|ganglion|radicular/)) return "peripheral_nerves";
    if (has(/ventricle|ventricular|cerebral aqueduct|foramen of monro|third ventricle|fourth ventricle/)) return "brain";
    if (has(/brain|cerebr|cerebel|gyrus|sulcus|insula|thalam|amygdal|hippoc|brainstem|pons|medulla|choroid plexus|olfactory|lobule|temporal pole|occipital pole/)) return "brain";
    return null;
  }

  if (cat === "skeletal") {
    if (has(/\btooth\b|\bteeth\b|incisor|canine|premolar|molar|alveolar process|alveolar part|dental arch/)) return "oral_cavity";
    if (has(/maxilla|mandible|palatine bone/)) return "skull";
    if (has(/maxillary sinus|frontal sinus|ethmoidal sinus|ethmoid air cell|sphenoid sinus|nasal cavity|nasal bone|inferior nasal concha|middle nasal concha|superior nasal concha|vomer/)) return "nasal_sinuses";
    if (has(/parietal bone|frontal bone|occipital bone|sphenoid|ethmoid|temporal bone|zygomatic|lacrimal bone|malleus|incus|stapes/)) return "skull";
    if (has(/\bhyoid\b/)) return "hyoid_laryngeal";
    // Vertebrae — split by region
    if (has(/\batlas\b|\baxis\b|vertebra c\d|cervical vertebra/)) return "cervical_spine";
    if (has(/vertebra t\d|thoracic vertebra/)) return "thoracic_spine";
    if (has(/vertebra l\d|lumbar vertebra/)) return "lumbar_spine";
    if (has(/\bsacrum\b|\bcoccyx\b/)) return "sacrum_coccyx";
    if (has(/vertebra|vertebral/)) return "spine"; // fallback for unspecified
    if (has(/\brib\b|\bribs\b|sternum|costal cartilage|manubrium|xiphoid/)) return "ribcage";
    if (has(/\bilium\b|\bischium\b|\bpubis\b|acetabul/)) return "pelvis";
    if (has(/clavicle|scapula|acromion/)) return "shoulder_girdle";
    if (has(/\bhumerus\b/)) return "humerus";
    if (has(/\bradius\b|\bulna\b/)) return "forearm_bones";
    if (has(/carpal|metacarpal|phalanx of hand|phalanges of hand|scaphoid|lunate|triquetrum|pisiform|trapezoid bone|trapezium|capitate|hamate/)) return "hand_bones";
    if (has(/\bfemur\b|femoral/)) return "femur";
    if (has(/patella/)) return "knee_joint";
    if (has(/\btibia\b|\bfibula\b/)) return "tibia_fibula";
    if (has(/talus|calcaneus|cuneiform|navicular bone|cuboid bone|metatarsal|phalanx of.*foot|phalanges of.*foot/)) return "foot_bones";
    return null;
  }

  if (cat === "joints") {
    // Head/neck joints
    if (has(/temporomandibular|sphenomandibular|stylomandibular|lateral temporomandibular|articular.*temporomandibular/)) return "tmj";
    if (has(/thyrohyoid|cricothyroid|cricopharyngeal|stylohyoid|quadrangular membrane|intercornual|pterygospinous/)) return "hyoid_laryngeal";
    // Spine — split by region
    if (has(/intervertebral disc c|nucleus pulposus c/)) return "cervical_spine";
    if (has(/intervertebral disc t|nucleus pulposus t/)) return "thoracic_spine";
    if (has(/intervertebral disc l|nucleus pulposus l/)) return "lumbar_spine";
    if (has(/sacrococcygeal symphysis/)) return "sacrum_coccyx";
    if (has(/intervertebral disc|nucleus pulposus|supraspinous|interspinous|longitudinal ligament|nuchal ligament|ligamenta flava/)) return "spine";
    // Thorax
    if (has(/intercostal membrane|head of rib|costotransverse|costovertebral|sternocostal|radiate ligament.*rib|intra-articular.*rib/)) return "ribcage";
    // Shoulder girdle joints
    if (has(/sternoclavicular|costoclavicular|interclavicular/)) return "sternoclavicular_joint";
    if (has(/acromioclavicular|coracoclavicular|conoid ligament|trapezoid ligament|coraco-acromial|superior transverse scapular|inferior transverse scapular/)) return "acromioclavicular_joint";
    if (has(/glenohumeral|coracohumeral|glenoid labrum|transverse humeral|articular capsule of glenohumeral/)) return "shoulder_joint";
    // Upper limb joints
    if (has(/articular capsule of elbow|annular ligament of radius|oblique cord|quadrate ligament|articular disc of.*radio-ulnar|dorsal radio-ulnar|palmar radio-ulnar|interosseous membrane of forearm|radial collateral ligament(?!.*wrist)|ulnar collateral ligament(?!.*wrist)/)) return "elbow_joint";
    if (has(/radiocarpal|articular capsule of radiocarpal|radial collateral ligament of wrist|ulnar collateral ligament of wrist|dorsal radiocarpal|palmar radiocarpal|ulnocarpal|radioscaphocapitate|radiocapitate|ulnolunate|ulnotriquetral|ulnocapitate|ulnopisiform|lunotriquetral|scapholunate|radiate carpal|palmar lunotriquetral|dorsal ulnocarpal|palmar scaphotriquetral|dorsal scaphotriquetral/)) return "wrist_joint";
    if (has(/metacarpal|metacarpophalangeal|interphalangeal.*hand|palmar interphalangeal|deep transverse metacarpal|dorsal metacarpal|palmar metacarpal|interosseous metacarpal|collateral.*hand|pisohamate|pisometacarpal|pisotriquetral|capitohamate|scaphocapitate|triquetrocapitate|triquetrohamate|trapeziotrapezoidal|trapezoideocapitate|dorsal carpometacarpal|palmar carpometacarpal|scaphotrapeziotrapezoidal|interosseous.*carpal|dorsal intercarpal/)) return "hand_joints";
    // Pelvic joints
    if (has(/sacro-iliac|sacroiliac|pubic symphysis|interpubic disc|pubic ligament|sacrospinous|sacrotuberous|obturator membrane|iliolumbar/)) return "sacroiliac_pubic_joint";
    if (has(/ilium|ischium|pubis|acetabul/)) return "pelvis";
    // Hip
    if (has(/hip joint|acetabular labrum|iliofemoral|ischiofemoral|pubofemoral|ligament of head of femur|transverse acetabular|triradiate cartilage/)) return "hip_joint";
    // Knee
    if (has(/knee|meniscus|cruciate|patellar|infrapatellar|meniscopatellar|fibular collateral|tibial collateral|arcuate popliteal|oblique popliteal|popliteofibular|transverse ligament of knee/)) return "knee_joint";
    // Lower leg — tibiofibular interosseous
    if (has(/superior tibiofibular|articular capsule of superior tibiofibular|interosseous membrane of leg|anterior ligament of fibular head|posterior ligament of fibular head/)) return "tibia_fibula";
    // Ankle
    if (has(/talofibular|calcaneofibular|tibiocalcaneal|tibionavicular|tibiotalar|posterior tibiotalar|tibiofibular|deltoid ligament/)) return "ankle_joint";
    // Foot joints
    if (has(/calcaneocuboid|calcaneonavicular|talocalcaneal|talonavicular|cuneocuboid|cuneonavicular|intercuneiform|cuneometatarsal|tarsometatarsal|metatarsophalangeal|metatarsal.*ligament|interphalangeal.*foot|plantar.*ligament|dorsal.*tarsal|dorsal cuneocuboid|dorsal cuneonavicular|dorsal cuboideonavicular|dorsal tarsometatarsal|collateral.*foot|intersesamoid/)) return "foot_joints";
    return null;
  }

  if (cat === "muscular") {
    if (has(/rectus muscle|oblique muscle|orbicularis|zygomaticus|masseter|temporalis|bucinator|buccinator|nasalis|frontalis|occipitalis|pterygoid|genioglossus|hyoglossus|digastric|mylohyoid|stylohyoid|sternocleidomastoid|scalen|pharyngeal constrictor|crico|arytenoid|platysma|longus capitis|longus colli|levator palpebrae|rectus muscle of eye|superior oblique|inferior oblique|common tendinous ring/)) return "head_neck_muscles";
    if (has(/intercostal|serratus|pectoral|rectus abdominis|external oblique|internal oblique|transversus abdominis|diaphragm|multifidus|erector spinae|latissimus dorsi|trapezius|thoracolumbar fascia|iliocostalis|longissimus|spinalis|splenius|rotatores|quadratus lumborum|piriformis|pelvic diaphragm/)) return "torso_muscles";
    if (has(/deltoid|biceps|triceps|brachialis|pronator|supinator|flexor .* hand|extensor .* hand|thenar|hypothenar|lumbrical|interossei of hand|forearm|arm\b|palmaris|extensor carpi|flexor carpi|abductor pollicis|opponens pollicis/)) return "upper_limb_muscles";
    if (has(/glute|tensor fasciae latae|adductor|gracilis|sartorius|quadriceps|hamstring|biceps femoris|semitendinosus|semimembranosus|tibialis|fibularis|peroneus|gastrocnemius|soleus|plantaris|flexor .* foot|extensor .* foot|lumbricales of foot|interossei of foot|abductor hallucis|adductor hallucis|flexor hallucis|extensor hallucis/)) return "lower_limb_muscles";
    return null;
  }

  if (cat === "skin") {
    if (has(/frontal region|parietal region|occipital region|temporal region|orbital region|nasal region|oral region|buccal region|auricular region|submandibular|submental|carotid triangle|neck|supraclavicular|mastoid|zygomatic|mental region|eyebrow|auricle|concha/)) return "skin_head_neck";
    if (has(/epigastric|umbilic|hypochondriac|hypogastric|inguinal region|lumbar region|sacral region|scapular region|interscapular|vertebral region|anal region|urogenital region|abdomen|thorax|chest|gluteal/)) return "skin_torso";
    if (has(/arm|elbow|forearm|wrist|palm|hand|digits of hand|bicipital|cubital/)) return "skin_upper_limb";
    if (has(/thigh|knee|leg|ankle|foot|digits of foot|patellar|popliteal|calcaneal|plantar|malleolar/)) return "skin_lower_limb";
    return null;
  }

  return null;
}

function getMeshClinicalEntry(meshName, cat, odMap) {
  if (!odMap) return null;
  const direct = odMap[meshName];
  if (direct) return suppressNonHeadClinicalEntryForHeadMesh(meshName, cat, direct);

  const normalizedMesh = normalizeMeshName(meshName);
  const directNormalized = odMap[normalizedMesh];
  if (directNormalized) {
    return suppressNonHeadClinicalEntryForHeadMesh(meshName, cat, { ...directNormalized, _derivedFrom: normalizedMesh });
  }

  const majorId = canonicalizeOrganId(inferMajorOrganIdFromMeshName(meshName, cat));
  if (majorId && odMap[majorId]) {
    return suppressNonHeadClinicalEntryForHeadMesh(meshName, cat, { ...odMap[majorId], organ_id: majorId, _derivedFrom: majorId });
  }
  if (majorId) {
    const sidedFallback = {
      lung_left: "lung",
      lung_right: "lung",
      kidney_left: "kidney",
      kidney_right: "kidney",
      ovary_left: "ovary",
      ovary_right: "ovary",
      testis_left: "testis",
      testis_right: "testis",
    };
    const baseId = sidedFallback[majorId];
    if (baseId && odMap[baseId]) {
      return suppressNonHeadClinicalEntryForHeadMesh(meshName, cat, { ...odMap[baseId], organ_id: majorId, _derivedFrom: baseId });
    }
  }

  const legacyId = inferMajorOrganIdFromMeshName(meshName, cat);
  if (legacyId && odMap[legacyId]) {
    const canonical = canonicalizeOrganId(legacyId);
    return suppressNonHeadClinicalEntryForHeadMesh(meshName, cat, { ...odMap[legacyId], organ_id: canonical || legacyId, _derivedFrom: legacyId });
  }
  return null;
}

// 5. React hook for real-time text analysis
function useTextAnalysis(text, debounceMs=600) {
  const [results, setResults] = useState([]);
  const [organMap, setOrganMap] = useState({});
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const timerRef = useRef(null);

  useEffect(()=>{
    clearTimeout(timerRef.current);
    if (!text || text.trim().length < 4) { setResults([]); setOrganMap({}); return; }
    setIsAnalyzing(true);
    timerRef.current = setTimeout(async ()=>{
      const res = await analyzeText(text);
      setResults(res);
      setOrganMap(mergeAnalysisToOrgans(res));
      setIsAnalyzing(false);
    }, debounceMs);
    return ()=>clearTimeout(timerRef.current);
  }, [text]);

  return { results, organMap, isAnalyzing };
}

function gs(status, isSel, isBone, isNlp, nlpUpgrade) {
  // Effective display status: if NLP upgrades, blend the colour
  const dispStatus = nlpUpgrade && !isNlp ? nlpUpgrade : status;
  if (isBone) {
    const sc = isSel?"#03C2FC":dispStatus==="sick"?"#ef4444":dispStatus==="warning"?"#f97316":"rgba(3,194,252,0.55)";
    const sf = isSel?"rgba(3,194,252,0.16)":dispStatus==="sick"?"rgba(239,68,68,0.2)":dispStatus==="warning"?"rgba(249,115,22,0.15)":"rgba(3,194,252,0.07)";
    return { fill:sf, stroke:sc, strokeWidth:isSel?2:0.9, cursor:"pointer", transition:"all 0.25s",
      filter:isSel?"drop-shadow(0 0 7px #03C2FC)":dispStatus==="sick"?"drop-shadow(0 0 7px rgba(239,68,68,0.6))":"none",
      strokeDasharray: isNlp ? "4 2" : undefined, opacity: isNlp ? 0.65 : 1 };
  }
  const m = {
    sick:   { f:"rgba(239,68,68,0.55)",   s:"#ef4444" },
    healthy:{ f:"rgba(16,185,129,0.45)",  s:"rgba(16,185,129,0.9)" },
    warning:{ f:"rgba(249,115,22,0.50)",  s:"#f97316" },
    none:   { f:"rgba(3,194,252,0.04)",   s:"rgba(3,194,252,0.25)" },
  };
  const c = m[dispStatus] || m.none;
  return {
    fill: isNlp ? c.f.replace(/[\d.]+\)$/, '0.28)') : c.f,
    stroke:isSel?"#03C2FC":c.s,
    strokeWidth:isSel?2.5:1.2,
    strokeDasharray: isNlp ? "5 2" : undefined,
    opacity: isNlp ? 0.7 : 1,
    cursor:"pointer", transition:"all 0.3s ease",
    filter:isSel?"drop-shadow(0 0 10px #03C2FC88)":
      dispStatus==="sick"?"drop-shadow(0 0 12px rgba(239,68,68,0.85))":
      dispStatus==="healthy"?"drop-shadow(0 0 8px rgba(16,185,129,0.65))":
      dispStatus==="warning"?"drop-shadow(0 0 7px rgba(249,115,22,0.6))":"none",
  };
}

// Incomplete cycle hatch overlay — drawn on top of organ
function OrgHatch({ d, cx, cy, rx, ry, ell, color="#03C2FC" }) {
  const hatchId = "hatch_incomplete";
  const style = { fill:`url(#${hatchId})`, stroke:"none", pointerEvents:"none", opacity:0.55 };
  if (ell) return <ellipse cx={cx} cy={cy} rx={rx} ry={ry} style={style}/>;
  return <path d={d} style={style}/>;
}

function O({ id, d, cx, cy, rx, ry, ell, od, sel, oc, bone }) {
  const organData = od?.[id];
  const status = organData?.status || "none";
  const isNlp = !!(organData?._nlp);
  const nlpUpgrade = organData?._nlpUpgrade || null;
  const incomplete = organData?.incomplete === true;
  const s = gs(status, sel===id, bone, isNlp, nlpUpgrade);
  const click = e => { e.stopPropagation(); oc(sel===id?null:id); };
  if (ell) return (
    <>
      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} style={s} onClick={click}/>
      {incomplete && <OrgHatch ell cx={cx} cy={cy} rx={rx} ry={ry}/>}
    </>
  );
  return (
    <>
      <path d={d} style={s} onClick={click}/>
      {incomplete && <OrgHatch d={d}/>}
    </>
  );
}

/* ═══════════════════════════════════════════════
   3D BODY MODEL — Three.js GLB viewer
═══════════════════════════════════════════════ */
function BodyModel3D({
  gender, od, sel, oc, layerVis, onGroupList, groupVisibility,
  xrayMode, criticalOnlyMode, hoveredMesh, onHoverChange, externalNav, onSceneReady,
  cardsFrozen = false, maxCards = 8, qualitySettings = QUALITY_DEFAULTS,
}) {
  const mountRef    = useRef(null);
  const sceneRef    = useRef(null);
  const meshesRef      = useRef({});
  const visibleMeshesRef = useRef([]);
  const meshToGroupRef = useRef(new Map());
  const groupsRef      = useRef([]);
  const groupNodesRef  = useRef(new Map());
  const invalidateRenderRef = useRef(() => {});
  const perfStateRef = useRef({
    fpsEma: 60,
    lastTs: 0,
    raycastIntervalMs: 35,
    targetFps: 60,
    drawCalls: 0,
    triangles: 0,
    points: 0,
    lines: 0,
    dpr: 1,
  });
  const loadedRef   = useRef(false);
  const propsRef    = useRef({});
  const [loadState, setLoadState] = useState('loading');
  const [loadPct,   setLoadPct]   = useState(0);
  const [diagLog,   setDiagLog]   = useState([]);  // diagnostic messages
  const [errorInfo, setErrorInfo] = useState(null); // { title, reason, fix, code }
  const [perfHud, setPerfHud] = useState(null);
  const showPerfHud = useMemo(() => {
    try {
      return new URLSearchParams(window.location.search).get("perfdebug") === "1";
    } catch (_) {
      return false;
    }
  }, []);

  const addLog = (msg, type='info') =>
    setDiagLog(prev => [...prev.slice(-12), { msg, type, ts: Date.now() }]);

  // Always-fresh props via ref
  propsRef.current = {
    od: od || {},
    sel,
    hoveredMesh,
    layerVis: layerVis || {},
    oc,
    onHoverChange,
    groupVisibility: groupVisibility || {},
    onGroupList,
    xrayMode,
    criticalOnlyMode: !!criticalOnlyMode,
    cardsFrozen: !!cardsFrozen,
    maxCards: Math.max(1, Math.min(12, Number(maxCards) || 8)),
    qualitySettings: clampQualitySettings(qualitySettings || QUALITY_DEFAULTS),
  };

  function getCat(name) {
    const n = (name||"").toLowerCase();
    // Skeletal
    if (/\bbone\b|\bbones\b|femur|fibula|tibia\b|radius\b|ulna\b|humerus|vertebra|vertebrae|\brib\b|\bribs\b|skull|cranium|sternum|clavicle|scapula|patella|calcaneus|talus|metatarsal|metacarpal|phalanges|phalang|mandible|maxilla|\bpelvis\b|sacrum|ilium|pubis|ischium|malleus|incus|stapes|ossicle|carpal|capitate|hamate|lunate|pisiform|scaphoid|trapez.*bone|triquetrum|navicular.*bone|cuboid bone|cuneiform bone|sesamoid|ligament|joint\b|capsule\b|\btendon\b|bursa|meniscus|symphysis|retinaculum|aponeurosis|atlas|axis|coccyx|acromion|acetabul|hyoid/.test(n)) return "skeletal";
    // Muscular
    if (/\bmuscle\b|\bmuscles\b|pectoral|deltoid|biceps|triceps|quadriceps|glute|hamstring|gastrocnemius|soleus|trapezius|latissimus|rhomboid|erector|masseter|temporal.*muscle|frontalis|orbicularis|zygomaticus|buccinator|sternocleid|splenius|semispinal|intercostal|diaphragm/.test(n)) return "muscular";
    // Cardiovascular
    if (/artery|\baorta\b|arterial|\bvein\b|\bveins\b|venous|inferior vena cava|superior vena cava|sinus.*vein|dural venous|cranial vein|heart|cardiac|coronary|pulmonary.*vessel|lymph/.test(n)) return "cardiovascular";
    // Nervous
    if (/brain|cerebr|cerebel|brainstem|gyrus|sulcus|\bpons\b|medulla\b|thalamus|striatum|putamen|caudate|diencephalon|telencephalon|hippocampus|amygdal|midbrain|spinal cord|choroid plex|corpus stri|white matter|grey matter|meninges|\bdura\b|\bpia\b|tentorium|\bnerve\b|\bnerves\b|plexus|gangli|sympathetic|vagus|sciatic|facial.*nerve|trigeminal/.test(n)) return "nervous";
    // Skin / body surface
    if (/skin|\bfat\b|adipose|integument|\bfascia\b|subcutaneous|epidermis|dermis/.test(n)) return "skin";
    // Default: visceral organs
    return "visceral";
  }

  // Apply colours & visibility from propsRef — callable any time after load
  const applyRef = useRef(null);
  applyRef.current = function applyMeshUpdates() {
  const { od: od2, sel: sel2, hoveredMesh: hov2, layerVis: lv, groupVisibility: gv, xrayMode: xr, criticalOnlyMode: critOnly } = propsRef.current;
  const meshToGroup = meshToGroupRef.current;
  const groupNodes  = groupNodesRef.current;

  const STATUS_HEX = { sick:0xef4444, warning:0xf97316, healthy:0x10b981, none:0x03c2fc };

  // X-ray: dark background for medical look
  if (sceneRef.current && sceneRef.current.scene) {
    sceneRef.current.scene.background.setHex(xr ? 0x00060f : 0x04070f);
  }

  const hasGroups = groupNodes && groupNodes.size > 0;

  // ── 1) Групповая видимость (узлы Empty) ───────────────────────────────
  if (hasGroups) {
    groupNodes.forEach((node, gname) => {
      const on = (gv && gv[gname] !== undefined) ? (gv[gname] === true) : true;
      if (node) node.visible = on;
    });
  }

  // ── 2) Видимость + материалы каждого меша ─────────────────────────────
  Object.values(meshesRef.current).forEach(({ mesh, cat, organId }) => {
    // Effective visibility: group toggle AND category toggle
    let visible = (lv && lv[cat] !== false);

    if (hasGroups && meshToGroup && meshToGroup.size > 0) {
      const gname = meshToGroup.get(mesh);
      if (!gname) visible = false; // если меш не принадлежит ни одной группе — скрываем
      else {
        const on = (gv && gv[gname] !== undefined) ? (gv[gname] === true) : true;
