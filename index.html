  { name: "outerlayer",     label: "Наружный слой",                    icon: "" },
];

function GroupPanel({ groups, groupVis, onToggle, onClose, excludeRef }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const handler = e => {
      if (ref.current && ref.current.contains(e.target)) return;
      if (excludeRef && excludeRef.current && excludeRef.current.contains(e.target)) return;
      onClose();
    };
    const id = setTimeout(() => document.addEventListener("mousedown", handler), 0);
    return () => { clearTimeout(id); document.removeEventListener("mousedown", handler); };
  }, []);

  const allOn  = LAYER_POPUP_ITEMS.every(l => groupVis[l.name] !== false);
  const allOff = LAYER_POPUP_ITEMS.every(l => groupVis[l.name] === false);

  return (
    <div style={{position:"absolute",inset:0,zIndex:120,display:"flex",alignItems:"flex-start",justifyContent:"flex-start",pointerEvents:"none"}}>
      <div ref={ref} style={{
        pointerEvents:"all", margin:"8px 8px 0",
        background:"rgba(6,10,20,0.97)",
        border:"1px solid rgba(3,194,252,0.22)", borderRadius:16,
        boxShadow:"0 16px 56px rgba(0,0,0,0.75), 0 0 0 1px rgba(3,194,252,0.06)",
        backdropFilter:"blur(12px)", width:268, overflow:"hidden",
        animation:"fadeUp 0.18s cubic-bezier(0.16,1,0.3,1) both",
      }}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 8px",borderBottom:"1px solid rgba(3,194,252,0.1)"}}>
          <span style={{fontSize:10,fontWeight:700,color:"#03C2FC",letterSpacing:"0.07em",textTransform:"uppercase"}}>Слои модели</span>
          <div style={{display:"flex",gap:5}}>
            <button onClick={()=>{const v={};LAYER_POPUP_ITEMS.forEach(l=>{v[l.name]=true;});onToggle("__set__",v);}}
              style={{fontSize:8,padding:"2px 7px",background:allOn?"rgba(3,194,252,0.18)":"rgba(3,194,252,0.06)",border:`1px solid ${allOn?"rgba(3,194,252,0.45)":"rgba(3,194,252,0.18)"}`,borderRadius:5,color:"#03C2FC",cursor:"pointer",fontWeight:700}}>Все</button>
            <button onClick={()=>{const v={};LAYER_POPUP_ITEMS.forEach(l=>{v[l.name]=false;});onToggle("__set__",v);}}
              style={{fontSize:8,padding:"2px 7px",background:allOff?"rgba(148,180,220,0.1)":"rgba(148,180,220,0.03)",border:`1px solid ${allOff?"rgba(148,180,220,0.35)":"rgba(148,180,220,0.12)"}`,borderRadius:5,color:"rgba(180,200,230,0.6)",cursor:"pointer",fontWeight:700}}>Скрыть</button>
            <button onClick={onClose} style={{width:20,height:20,background:"transparent",border:"1px solid rgba(148,180,220,0.16)",borderRadius:5,cursor:"pointer",color:"rgba(180,200,230,0.45)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
          </div>
        </div>
        <div style={{padding:"8px 10px 10px",display:"flex",flexDirection:"column",gap:4}}>
          {LAYER_POPUP_ITEMS.map(item => {
            const on = groupVis[item.name] !== false;
            const loaded = groups.some(g => g.name === item.name);
            return (
              <button key={item.name} onClick={()=>onToggle(item.name)} style={{
                display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:9,
                border:`1.5px solid ${on?"rgba(3,194,252,0.38)":"rgba(148,180,220,0.1)"}`,
                background:on?"rgba(3,194,252,0.1)":"rgba(148,180,220,0.03)",
                color:on?"#dde4f0":"rgba(100,120,150,0.55)",
                cursor:"pointer",opacity:loaded?1:0.45,transition:"all 0.16s",textAlign:"left",width:"100%",
              }}>
                <div style={{width:18,height:18,borderRadius:5,flexShrink:0,border:`1.5px solid ${on?"#03C2FC":"rgba(100,120,150,0.3)"}`,background:on?"rgba(3,194,252,0.22)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
                  {on && <div style={{width:8,height:8,borderRadius:2,background:"#03C2FC"}}/>}
                </div>
                <span style={{fontSize:13,flexShrink:0}}>{item.icon}</span>
                <span style={{fontSize:12,fontWeight:on?600:400,flex:1,letterSpacing:"0.01em"}}>{item.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function _OLD_GroupPanel({ groups, groupVis, onToggle }) {
  const [panelH, setPanelH] = React.useState(220);
  const dragRef = React.useRef(false);
  const startY = React.useRef(0);
  const startH = React.useRef(0);

  React.useEffect(() => {
    const onMove = e => {
      if (!dragRef.current) return;
      // dragging up = panel grows (inverted: startY was top of drag, moving mouse up = negative delta = bigger panel)
      const delta = startY.current - e.clientY;
      setPanelH(Math.min(500, Math.max(80, startH.current + delta)));
    };
    const onUp = () => { dragRef.current = false; document.body.style.cursor = ""; document.body.style.userSelect = ""; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const startDrag = e => {
    e.preventDefault();
    dragRef.current = true;
    startY.current = e.clientY;
    startH.current = panelH;
    document.body.style.cursor = "ns-resize";
    document.body.style.userSelect = "none";
  };

  const rows = TARGET_GROUPS.map(tg => {
    const loaded = groups.find(g => g.name === tg.name);
    return { name: tg.name, displayName: tg.ru, icon: tg.icon||"", count: loaded ? loaded.meshes.length : null };
  });

  // Only show rows that are either loaded or have defaultOn
  const visibleRows = rows.filter(r => {
    const tg = TARGET_GROUPS.find(t => t.name === r.name);
    const loaded = groups.find(g => g.name === r.name);
    return loaded || (tg && tg.defaultOn);
  }).concat(rows.filter(r => {
    const loaded = groups.find(g => g.name === r.name);
    const tg = TARGET_GROUPS.find(t => t.name === r.name);
    return loaded && !(tg && tg.defaultOn);
  }).filter(r => !rows.filter(x => {
    const tg = TARGET_GROUPS.find(t => t.name === x.name);
    return tg && tg.defaultOn;
  }).find(x => x.name === r.name)));

  // Simpler: just show all groups that exist in model, plus always show defaultOn groups
  const finalRows = TARGET_GROUPS.map(tg => {
    const loaded = groups.find(g => g.name === tg.name);
    return { name: tg.name, displayName: tg.ru, icon: tg.icon||"", count: loaded ? loaded.meshes.length : null, found: !!loaded };
  });

  const foundCount = finalRows.filter(r => r.found).length;

  return (
    <div style={{flexShrink:0,display:"flex",flexDirection:"column",background:"rgba(2,4,11,0.97)",borderTop:"1px solid rgba(3,194,252,0.15)"}}>
      {/* Drag handle — grab to resize vertically */}
      <div onMouseDown={startDrag} style={{
        height:6,cursor:"ns-resize",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
        background:"rgba(3,194,252,0.03)",
        borderBottom:"1px solid rgba(3,194,252,0.07)",
      }}>
        <div style={{width:32,height:3,borderRadius:2,background:"rgba(3,194,252,0.3)"}}/>
      </div>
      {/* Header */}
      <div style={{padding:"5px 10px 3px",display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
        <span style={{fontSize:9,fontWeight:700,color:"#03C2FC",textTransform:"uppercase",letterSpacing:"0.06em"}}>Слои</span>
        <span style={{fontSize:8,color:"rgba(180,200,230,0.3)"}}>({foundCount} загружено)</span>
        <div style={{flex:1}}/>
        <button onClick={()=>{const v={};TARGET_GROUPS.forEach(g=>{v[g.name]=true;});onToggle("__set__",v);}}
          style={{fontSize:8,padding:"1px 5px",background:"rgba(3,194,252,0.08)",border:"1px solid rgba(3,194,252,0.22)",borderRadius:4,color:"#03C2FC",cursor:"pointer"}}>Все</button>
        <button onClick={()=>{const v={};TARGET_GROUPS.forEach(g=>{v[g.name]=false;});onToggle("__set__",v);}}
          style={{fontSize:8,padding:"1px 5px",background:"rgba(148,180,220,0.04)",border:"1px solid rgba(148,180,220,0.15)",borderRadius:4,color:"rgba(180,200,230,0.5)",cursor:"pointer"}}>Скрыть</button>
      </div>
      {/* Rows */}
      <div style={{overflowY:"auto",height:panelH,padding:"2px 6px 6px"}}>
        {finalRows.map(row => {
          const on = groupVis[row.name] === true;
          return (
            <div key={row.name} onClick={()=>onToggle(row.name)} style={{
              display:"flex",alignItems:"center",gap:6,padding:"3px 5px",borderRadius:5,
              cursor:"pointer",transition:"background 0.12s",
              opacity: row.found ? 1 : 0.38,
            }}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(3,194,252,0.07)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              {/* Eye toggle */}
              <div style={{width:16,height:16,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:10,color:on?"#03C2FC":"rgba(100,120,150,0.4)",transition:"color 0.15s"}}>
                {on ? "◉" : "○"}
              </div>
              {/* Icon */}
              <span style={{fontSize:11,flexShrink:0}}>{row.icon}</span>
              {/* Name */}
              <span style={{flex:1,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                color:on?"rgba(210,235,255,0.9)":"rgba(100,120,150,0.45)",transition:"color 0.15s"}}>
                {row.displayName}
              </span>
              {/* Mesh count */}
              {row.count !== null
                ? <span style={{fontSize:8,color:"rgba(148,163,184,0.35)",fontFamily:"IBM Plex Mono,monospace",flexShrink:0}}>{row.count}</span>
                : <span style={{fontSize:7,color:"rgba(100,120,150,0.3)",flexShrink:0}}>—</span>
              }
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ModelPanel({ pid, gender, isDoctor, isMobile, onOrganSelect, selOrgan, hideLegend, externalLayerBtnRef,
  externalToolbar, externalGroups, externalOnGroupList,
  externalGroupVis, externalToggleGroup,
  externalShowGroupPanel, externalSetShowGroupPanel,
  externalXrayMode, externalSetXrayMode,
  externalShowTimeline, externalSetShowTimeline,
  externalCriticalOnlyMode, externalSetCriticalOnlyMode,
  externalNav, onSceneReady, onHoverOverlayChange,
  cardsFrozen = false, maxHoverCards = 8, qualitySettings = loadQualitySettings(),
  selectedStudyDate = "",
}) {
  useDB();
  const effectiveQuality = clampQualitySettings(qualitySettings || QUALITY_DEFAULTS);
  const [organ, setOrgan] = useState(null);
  const [hoverInfo, setHoverInfo] = useState(null);
  const [layers, setLayers] = useState({ skeletal:true, muscular:true, cardiovascular:true, visceral:true, nervous:true, skin:true, joints:true, lymphoid:true });
  const [_groups, _setGroups] = useState([]);
  const [_groupVis, _setGroupVis] = useState(() => buildDefaultGroupVisibility());
  const [_showGroupPanel, _setShowGroupPanel] = useState(false);
  const [_xrayMode, _setXrayMode] = useState(true);
  const [_criticalOnlyMode, _setCriticalOnlyMode] = useState(false);

  // Use external state when provided, otherwise internal
  const groups         = externalToolbar ? (externalGroups ?? _groups)                : _groups;
  const groupVis       = externalToolbar ? (externalGroupVis ?? _groupVis)            : _groupVis;
  const showGroupPanel = externalToolbar ? (externalShowGroupPanel ?? _showGroupPanel) : _showGroupPanel;
  const xrayMode       = externalToolbar ? (externalXrayMode ?? _xrayMode)            : _xrayMode;
  const criticalOnlyMode = externalToolbar ? (externalCriticalOnlyMode ?? _criticalOnlyMode) : _criticalOnlyMode;
  const setGroups      = externalToolbar ? (externalOnGroupList ?? _setGroups)        : _setGroups;
  const toggleGroup    = externalToolbar ? (externalToggleGroup  ?? (()=>{}))         : (n,b) => {
    if (n==="__set__"&&b){_setGroupVis(b);return;} _setGroupVis(p=>({...p,[n]:!p[n]}));
  };
  const setShowGroupPanel = externalToolbar ? (externalSetShowGroupPanel ?? _setShowGroupPanel) : _setShowGroupPanel;
  const setXrayMode       = externalToolbar ? (externalSetXrayMode ?? _setXrayMode)            : _setXrayMode;
  const setCriticalOnlyMode = externalToolbar ? (externalSetCriticalOnlyMode ?? _setCriticalOnlyMode) : _setCriticalOnlyMode;

  const handleGroupList = (grps) => {
    setGroups(grps);
    if (grps.length > 0 && !externalToolbar) {
      _setGroupVis(prev => {
        const next = {};
        TARGET_GROUPS.forEach(g => { next[g.name] = prev[g.name] !== undefined ? prev[g.name] : (g.defaultOn !== false); });
        return next;
      });
    }
  };
  // showLayers removed — layers now always visible as icon strip
  const [_showTimeline, _setShowTimeline] = useState(false);
  const [timeIdx, setTimeIdx] = useState(0);
  const showTimeline    = externalToolbar ? (externalShowTimeline ?? _showTimeline)    : _showTimeline;
  const setShowTimeline = externalToolbar ? (externalSetShowTimeline ?? _setShowTimeline) : _setShowTimeline;
  const activeOrgan = selOrgan !== undefined ? selOrgan : organ;
  const handleOrganClick = id => {
    const resolvedId = id
      ? canonicalizeOrganId(
          inferMajorOrganIdFromMeshName(id, "") ||
          normalizeMeshName(id) ||
          id
        )
      : null;
    const next = resolvedId === activeOrgan ? null : resolvedId;
    if (onOrganSelect) onOrganSelect(next);
    else setOrgan(next);
  };

  const odRows = dbQuery("SELECT * FROM organ_data WHERE patient_id=? AND organ_id NOT IN ('__record__','__ai__')", [pid]);
  const timelineSourceRows = getPatientTimelineSourceRows(pid);
  const aiRow = dbGetOne("SELECT * FROM organ_data WHERE patient_id=? AND organ_id='__ai__'", [pid]);
  let aiData = {};
  try { aiData = JSON.parse(aiRow?.findings || "{}"); } catch {}
  const aiOrganMap = useMemo(() => {
    const fromResults = Array.isArray(aiData?.results) ? mergeAnalysisToOrgans(aiData.results) : {};
    if (Object.keys(fromResults).length) return fromResults;
    const fallback = {};
    Object.entries(aiData?.organMap || {}).forEach(([oid, status]) => {
      const resolvedOrganId = resolveClinicalOrganId(oid, aiData?.text || "");
      if (!resolvedOrganId) return;
      fallback[resolvedOrganId] = status;
    });
    return canonicalizeOrganMap(fallback);
  }, [aiRow?.findings || ""]);
  const [timelineNowMs, setTimelineNowMs] = useState(() => Date.now());

  useEffect(() => {
    let timer = null;
    const syncNow = () => setTimelineNowMs(Date.now());
    const scheduleNextDayTick = () => {
      const now = new Date();
      const next = new Date(now);
      next.setHours(24, 0, 2, 0);
      const waitMs = Math.max(1000, next.getTime() - now.getTime());
      timer = setTimeout(() => {
        syncNow();
        scheduleNextDayTick();
      }, waitMs);
    };
    scheduleNextDayTick();
    const onFocus = () => syncNow();
    const onVisibility = () => {
      if (document.visibilityState === "visible") syncNow();
    };
    window.addEventListener("focus", onFocus);
    document.addEventListener("visibilitychange", onVisibility);
    return () => {
      if (timer) clearTimeout(timer);
      window.removeEventListener("focus", onFocus);
      document.removeEventListener("visibilitychange", onVisibility);
    };
  }, [pid]);

  const timelineModel = useMemo(() => {
    return buildClinicalTimelineModel(timelineSourceRows, timelineNowMs, TL_DEFAULT_TTL_DAYS);
  }, [timelineNowMs, timelineSourceRows.map(r => `${r.organ_id}|${r.status}|${timelineRowDate(r)}|${r.study_type}|${r.findings}|${r.notes}`).join("||")]);
  const timelineEntries = timelineModel.entries || [];
  const timelineTasks = timelineModel.tasks || [];
  const preferredTimelineIdx = useMemo(
    () => getPreferredTimelineIndex(timelineEntries),
    [timelineEntries.map(e => `${e.date || ""}|${e.timestamp || 0}|${e.hasCritical ? 1 : 0}|${e.isTodayMarker ? 1 : 0}`).join("||")]
  );
  const timelineAutoSelectKey = useMemo(
    () => `${pid}|${timelineEntries.map(e => `${e.date || ""}|${e.timestamp || 0}|${e.hasCritical ? 1 : 0}|${e.isTodayMarker ? 1 : 0}`).join("||")}`,
    [pid, timelineEntries.map(e => `${e.date || ""}|${e.timestamp || 0}|${e.hasCritical ? 1 : 0}|${e.isTodayMarker ? 1 : 0}`).join("||")]
  );

  const safeIdx = Math.min(timeIdx, Math.max(0, timelineEntries.length-1));
  const effectiveMaxHoverCards = Math.max(
    1,
    Math.min(
      12,
      Number(maxHoverCards || effectiveQuality.maxInfoCards || QUALITY_DEFAULTS.maxInfoCards) || QUALITY_DEFAULTS.maxInfoCards
    )
  );

  // Auto-select latest abnormal event (red/orange). Fallback: latest real event.
  const prevTimelineAutoKeyRef = useRef("");
  useEffect(() => {
    if (selectedStudyDate) return;
    if (!timelineEntries.length) {
      setTimeIdx(0);
      prevTimelineAutoKeyRef.current = timelineAutoSelectKey;
      return;
    }
    if (prevTimelineAutoKeyRef.current !== timelineAutoSelectKey) {
      setTimeIdx(preferredTimelineIdx);
      prevTimelineAutoKeyRef.current = timelineAutoSelectKey;
    }
  }, [selectedStudyDate, timelineEntries.length, preferredTimelineIdx, timelineAutoSelectKey]);

  useEffect(() => {
    const targetTs = parseTimelineDate(selectedStudyDate);
    if (!timelineEntries.length || targetTs === null || targetTs === undefined) return;
    let bestIdx = 0;
    let bestDelta = Math.abs((timelineEntries[0]?.timestamp || 0) - targetTs);
    for (let i = 1; i < timelineEntries.length; i++) {
      const delta = Math.abs((timelineEntries[i]?.timestamp || 0) - targetTs);
      if (delta < bestDelta) {
        bestDelta = delta;
        bestIdx = i;
      }
    }
    setTimeIdx(bestIdx);
  }, [
    selectedStudyDate,
    timelineEntries.map(e => `${e.date || ""}|${e.timestamp || 0}`).join("||"),
  ]);

  const selectedStudyTimestamp = parseTimelineDate(selectedStudyDate);
  const hasPinnedStudySelection =
    selectedStudyTimestamp !== null &&
    selectedStudyTimestamp !== undefined &&
    Number.isFinite(selectedStudyTimestamp);
  const effectiveTimelineEntry = timelineEntries.length
    ? (
        (showTimeline || hasPinnedStudySelection)
          ? (timelineEntries[safeIdx] || timelineEntries[timelineEntries.length - 1])
          : timelineEntries[timelineEntries.length - 1]
      )
    : null;
  const allowGlobalAiOverlay =
    !timelineEntries.length ||
    (!showTimeline && !hasPinnedStudySelection) ||
    safeIdx >= timelineEntries.length - 1 ||
    !!effectiveTimelineEntry?.isTodayMarker;
  const effectiveSourceRows = effectiveTimelineEntry?.snapshot || effectiveTimelineEntry?.organs || odRows;

  // NLP: analyse all text fields from current snapshot and merge into od
  // DB explicit status always wins over NLP; NLP only fills "none" or upgrades severity
  const PRIORITY = { sick:2, warning:1, healthy:0, none:-1 };

  const nlpOrganMap = useMemo(()=>{
    // Collect all text: findings + notes from the current source rows
    const activeRows = (Array.isArray(effectiveSourceRows) ? effectiveSourceRows : odRows)
      .filter(r => {
        const timelineDisplay = r?._timeline?.displayStatus;
        if (timelineDisplay !== undefined) return timelineDisplay !== "none";
        return resolveRowClinicalStatus(r, r?.status) !== "none";
      });
    const allText = activeRows
      .map(r=>extractRowClinicalText(r)).filter(Boolean).join(" ");
    return mergeAnalysisToOrgans(analyzeWithKeywords(allText));
  }, [
    odRows.map(r=>`${r.findings || ""}|${r.notes || ""}|${r.status || ""}`).join('|'),
    showTimeline, safeIdx, timelineEntries.length, selectedStudyDate
  ]);

  // Merge: DB status takes priority; NLP fills gaps or upgrades where DB has "none"
  const od = useMemo(()=>{
    const m = {};
    (Array.isArray(effectiveSourceRows) ? effectiveSourceRows : odRows).forEach(r => {
      const resolvedOrganId = resolveClinicalOrganId(r?.organ_id || "", r?.study_type, r?.findings, r?.notes);
      if (!resolvedOrganId) return;
      m[resolvedOrganId] = {
        ...r,
        status: resolveRowClinicalStatus(r, r?.status),
        organ_id: resolvedOrganId,
        _source_organ_id: r?.organ_id || "",
      };
    });

    const applyAssistantMap = (assistantMap, flagName) => {
      Object.entries(assistantMap || {}).forEach(([oid, nextStatus])=>{
        const existing = m[oid];
        const dbPriority = existing ? (PRIORITY[existing.status] ?? -1) : -1;
        const nextPriority = PRIORITY[nextStatus] ?? -1;
        if (!existing) {
          m[oid] = { organ_id: oid, status: nextStatus, [flagName]: true };
        } else if (nextPriority > dbPriority) {
          m[oid] = { ...existing, _nlpUpgrade: nextStatus, [flagName]: true };
        }
      });
    };

    if (allowGlobalAiOverlay) {
      applyAssistantMap(aiOrganMap, "_ai");
    }
    applyAssistantMap(nlpOrganMap, "_nlp");
    return m;
  }, [
    odRows.map(r=>`${r.organ_id}|${r.status}|${r.study_date}|${r.study_type || ""}|${r.findings || ""}|${r.notes || ""}`).join(','),
    showTimeline, timeIdx, timelineEntries.length, selectedStudyDate,
    JSON.stringify(nlpOrganMap), JSON.stringify(aiOrganMap), allowGlobalAiOverlay
  ]);

  const toggleLayer = id => setLayers(l=>({...l,[id]:!l[id]}));

  const visibleOd = useMemo(() => {
    if (!criticalOnlyMode) return od;
    const filtered = {};
    Object.entries(od || {}).forEach(([organId, row]) => {
      const st = row?._timeline?.displayStatus || row?._nlpUpgrade || row?.status || "none";
      filtered[organId] = (st === "sick" || st === "warning")
        ? row
        : { ...(row || { organ_id: organId }), status: "none" };
    });
    return filtered;
  }, [od, criticalOnlyMode]);

  // Model fills most of the window; timeline takes what it needs
  const modelHeight = isMobile ? "100%" : "100%";

  useEffect(() => {
    onHoverOverlayChange && onHoverOverlayChange(hoverInfo);
  }, [hoverInfo, onHoverOverlayChange]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>

      {/* ── Toolbar: only shown when not using external toolbar ── */}
      {!externalToolbar && (
      <div style={{flexShrink:0,background:C.bg4,borderBottom:`1px solid ${C.border}`,padding:"4px 8px",display:"flex",alignItems:"center",gap:6}}>
        {/* Groups/Layers button */}
        <button onClick={()=>setShowGroupPanel(v=>!v)} title="Слои (коллекции)" style={{
          height:24,borderRadius:6,flexShrink:0,padding:"0 9px",gap:5,
          border:`1.5px solid ${showGroupPanel?"rgba(3,194,252,0.55)":C.border}`,
          background:showGroupPanel?"rgba(3,194,252,0.13)":C.surf,
          color:showGroupPanel?"#03C2FC":C.muted,
          cursor:"pointer",display:"flex",alignItems:"center",
          transition:"all 0.18s",fontSize:9,fontWeight:600,whiteSpace:"nowrap",
        }}>
          <span style={{fontSize:12}}></span>
          <span>Слои</span>
          {groups.length>0&&<span style={{fontSize:8,opacity:0.55,fontFamily:"IBM Plex Mono,monospace"}}>{groups.length}</span>}
        </button>
        <div style={{flex:1}}/>
        {/* Timeline button */}
        <button onClick={()=>setShowTimeline(t=>!t)} title="Прогрессия болезни" style={{
          width:24,height:24,borderRadius:6,flexShrink:0,
          border:`1.5px solid ${showTimeline?"rgba(3,194,252,0.6)":C.border2}`,
          background:showTimeline?"rgba(3,194,252,0.14)":C.surf,
          color:showTimeline?"#03C2FC":C.muted,
          cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          transition:"all 0.18s",
        }}>
          <svg width="15" height="10" viewBox="0 0 20 14" fill="none">
            <path d="M1,7 Q10,0 19,7 Q10,14 1,7Z" stroke="currentColor" strokeWidth="1.8" fill="none"/>
            <circle cx="10" cy="7" r="3" stroke="currentColor" strokeWidth="1.6" fill={showTimeline?"currentColor":"none"}/>
          </svg>
        </button>
        {/* X-ray button */}
        <button onClick={()=>setXrayMode(m=>!m)} title={xrayMode?"Выключить рентген":"Рентген-режим"} style={{
          width:24,height:24,borderRadius:6,flexShrink:0,
          border:`1.5px solid ${xrayMode?"rgba(3,194,252,0.6)":C.border2}`,
          background:xrayMode?"rgba(3,194,252,0.14)":C.surf,
          color:xrayMode?"#03C2FC":C.muted,
          cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          transition:"all 0.18s",fontSize:14,
        }}></button>
        <button onClick={()=>setCriticalOnlyMode(v=>!v)} title={criticalOnlyMode?"Показать все статусы":"Только патология + наблюдение"} style={{
          width:24,height:24,borderRadius:6,flexShrink:0,
          border:`1.5px solid ${criticalOnlyMode?"rgba(249,115,22,0.62)":C.border2}`,
          background:criticalOnlyMode?"rgba(249,115,22,0.14)":C.surf,
          color:criticalOnlyMode?C.orange2:C.muted,
          cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          transition:"all 0.18s",fontSize:13,fontWeight:800,
        }}>!</button>
      </div>
      )}

      {/* ── Body model ── */}
      <div style={isMobile?{height:modelHeight,flex:1,minHeight:0,position:"relative",overflow:"hidden",display:"flex"}:{flex:1,minHeight:0,position:"relative",overflow:"hidden",display:"flex"}}>
        {showTimeline && (
          <VerticalTimelineBar
            entries={timelineEntries}
            currentIdx={safeIdx}
            onTimeChange={setTimeIdx}
            tasks={timelineTasks}
            compact={isMobile}
          />
        )}
        <div style={{flex:1,minWidth:0,position:"relative",overflow:"hidden"}}>
          <BodyModel3D
            gender={gender}
            od={visibleOd}
            sel={activeOrgan}
            oc={handleOrganClick}
            hoveredMesh={hoverInfo?.meshName || null}
            onHoverChange={setHoverInfo}
            layerVis={layers}
            onGroupList={handleGroupList}
            groupVisibility={groupVis}
            xrayMode={xrayMode}
            criticalOnlyMode={criticalOnlyMode}
            externalNav={externalNav}
            onSceneReady={onSceneReady}
            cardsFrozen={cardsFrozen}
            maxCards={effectiveMaxHoverCards}
            qualitySettings={effectiveQuality}
          />

          {/* ── Layer popup overlay (inside model area) ── */}
          {showGroupPanel && (
            <GroupPanel
              groups={groups}
              groupVis={groupVis}
              onToggle={toggleGroup}
              onClose={()=>setShowGroupPanel(false)}
              excludeRef={externalLayerBtnRef}
            />
          )}
        </div>
      </div>

      {/* ── Legend — fixed under model ── */}
      {!hideLegend && (
      <div style={{flexShrink:0,padding:"3px 8px",background:C.bg4,borderTop:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          {[["rgba(16,185,129,0.85)","Норма"],["#ef4444","Патология"],["#f97316","Наблюдение"],["rgba(3,194,252,0.35)","Нет данных"],["rgba(249,115,22,0.5)","░ Незав. цикл"]].map(([c,l])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:3,fontSize:8,color:C.muted}}>
              <div style={{width:l.includes("░")?14:6,height:6,borderRadius:2,background:c,
                backgroundImage:l.includes("░")?"repeating-linear-gradient(-45deg,rgba(249,115,22,0.7) 0,rgba(249,115,22,0.7) 2px,transparent 2px,transparent 5px)":undefined,
                boxShadow:`0 0 3px ${c}60`}}/>{l}
            </div>
          ))}
        </div>
      </div>
      )}

    </div>
  );
}


/* ═══════════════════════════════════════════════
   ADD ORGAN DATA MODAL (doctor)
═══════════════════════════════════════════════ */
function AddOrganModal({ pid, onClose }) {
  const [f, setF] = useState({organ_id:"heart",status:"healthy",study_type:"",study_date:"",findings:"",fracture_status:"",notes:"",
    lab_val_keys:[""],lab_val_vals:[""]});
  const organs = Object.entries(OM);
  const addLab = () => setF(p=>({...p,lab_val_keys:[...p.lab_val_keys,""],lab_val_vals:[...p.lab_val_vals,""]}));
  const save = () => {
    const labObj = {};
    f.lab_val_keys.forEach((k,i)=>{ if(k&&f.lab_val_vals[i]) labObj[k]=f.lab_val_vals[i]; });
    const dateIso = normalizeTimelineDateIso(f.study_date, true);
    const studyDateText = String(f.study_date || "").trim() || new Date(dateIso).toLocaleDateString('ru-RU');
    const signal = statusToSignal(f.status);
    const timelineId = buildTimelineItemId(`manual_${pid}_${f.organ_id}_${dateIso}_${Date.now()}`);
    const ok = dbTransaction((run) => {
      const execRun = (sql, params = []) => run(sql, params);
      const existing = dbGetOne("SELECT id FROM organ_data WHERE patient_id=? AND organ_id=?", [pid, f.organ_id]);
      if (existing) {
        execRun("UPDATE organ_data SET status=?,study_type=?,study_date=?,findings=?,lab_values=?,fracture_status=?,notes=? WHERE patient_id=? AND organ_id=?",
          [f.status,f.study_type,studyDateText,f.findings,JSON.stringify(labObj),f.fracture_status,f.notes,pid,f.organ_id]);
      } else {
        execRun("INSERT INTO organ_data(patient_id,organ_id,status,study_type,study_date,findings,lab_values,fracture_status,notes) VALUES(?,?,?,?,?,?,?,?,?)",
          [pid,f.organ_id,f.status,f.study_type,studyDateText,f.findings,JSON.stringify(labObj),f.fracture_status,f.notes]);
      }
      execRun(
        "INSERT INTO timeline_items(id,patient_id,organ_id,date_iso,study_type,source,dicom_refs,conclusion,color,subtype,ai_confidence,ttl_days,notes,status,payload) VALUES(?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)",
        [
          timelineId,
          pid,
          f.organ_id,
          dateIso,
          f.study_type || "Manual",
          "manual",
          "[]",
          f.findings || "",
          signal,
          signal === "orange" ? "suspicion" : "",
          0,
          TL_DEFAULT_TTL_DAYS[signal] || 90,
          f.notes || "",
          "completed",
          JSON.stringify({ status: f.status, organ_id: f.organ_id, study_type: f.study_type, date: dateIso, lab_values: labObj }),
        ]
      );
      execRun("UPDATE patients SET last_visit=? WHERE id=?", [new Date(dateIso).toLocaleDateString('ru-RU'), pid]);
    });
    if (!ok) return;
    pub('organ_updated', { pid });
    onClose();
  };
  const iS={display:"block",width:"100%",padding:"9px 12px",marginBottom:9,background:"rgba(148,180,220,0.06)",border:`1.5px solid ${C.border2}`,borderRadius:9,fontSize:12,outline:"none",color:C.text,boxSizing:"border-box",fontFamily:"inherit",letterSpacing:"0.01em"};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(10px)",padding:16}} onClick={onClose}>
      <div style={{background:C.bg2,borderRadius:16,width:"100%",maxWidth:460,maxHeight:"90vh",overflowY:"auto",border:`1px solid ${C.border}`,boxShadow:"0 24px 80px rgba(0,0,0,0.65), 0 1px 0 rgba(148,180,220,0.06) inset"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:C.bg2,zIndex:1,backdropFilter:"blur(8px)"}}>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:C.text,letterSpacing:"-0.3px"}}>Исследование органа</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2}}>Добавить или обновить данные</div>
          </div>
          <button onClick={onClose} style={{width:30,height:30,background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer",color:C.muted,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}
            onMouseEnter={e=>e.currentTarget.style.color=C.text} onMouseLeave={e=>e.currentTarget.style.color=C.muted}>×</button>
        </div>
        <div style={{padding:"14px 18px"}}>
          <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:0.7,textTransform:"uppercase",marginBottom:6}}>Орган</div>
          <select value={f.organ_id} onChange={e=>setF({...f,organ_id:e.target.value})} style={{...iS,marginBottom:12}}>
            {organs.map(([id,m])=><option key={id} value={id}>{m.e} {m.n}</option>)}
          </select>
          <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:0.7,textTransform:"uppercase",marginBottom:6}}>Статус</div>
          <div style={{display:"flex",gap:7,marginBottom:12}}>
            {[["healthy"," Норма","rgba(20,220,150,0.8)"],["warning"," Наблюдение",C.orange2],["sick"," Патология",C.red2]].map(([s,l,c])=>(
              <button key={s} onClick={()=>setF({...f,status:s})} style={{flex:1,padding:"7px",border:`2px solid ${f.status===s?c:C.border2}`,borderRadius:8,cursor:"pointer",background:f.status===s?`${c}15`:C.surf,color:f.status===s?c:C.dim,fontWeight:600,fontSize:11,transition:"all 0.15s"}}>{l}</button>

/* ═══════════════════════════════════════════════
   RESIZABLE PANEL WRAPPER
═══════════════════════════════════════════════ */
function ResizablePanel({ defaultWidth=320, minWidth=200, maxWidth=620, visible=true, children, onWidthChange }) {
  const [width, setWidth] = useState(defaultWidth);
  const dragging = useRef(false);
  const startX = useRef(0);
  const startW = useRef(0);

  const onMouseDown = useCallback(e => {
    dragging.current = true;
    startX.current = e.clientX;
    startW.current = width;
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  }, [width]);

  useEffect(() => {
    const onMove = e => {
      if (!dragging.current) return;
      const delta = e.clientX - startX.current;
      const nw = Math.min(maxWidth, Math.max(minWidth, startW.current + delta));
      setWidth(nw);
      onWidthChange && onWidthChange(nw);
    };
    const onUp = () => {
      dragging.current = false;
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, [minWidth, maxWidth, onWidthChange]);

  return (
    <div style={{
      width: visible ? width : 0,
      minWidth: visible ? minWidth : 0,
      maxWidth,
      flexShrink: 0,
      transition: visible ? "none" : "all 0.36s cubic-bezier(0.16,1,0.3,1)",
      overflow: "hidden",
      display: "flex",
      position: "relative",
      background: C.bg,
    }}>
      {visible && <div style={{flex:1, overflow:"hidden", display:"flex", flexDirection:"column"}}>{children}</div>}
      {/* Drag handle */}
      {visible && (
        <div
          onMouseDown={onMouseDown}
          style={{
            position:"absolute", right:0, top:0, bottom:0, width:6,
            cursor:"col-resize",
            background:"transparent",
            zIndex:10,
            display:"flex", alignItems:"center", justifyContent:"center",
          }}
          onMouseEnter={e=>e.currentTarget.children[0]&&(e.currentTarget.children[0].style.opacity="1")}
          onMouseLeave={e=>e.currentTarget.children[0]&&(e.currentTarget.children[0].style.opacity="0.3")}
        >
          <div style={{
            width:3, height:40, borderRadius:3,
            background:"rgba(3,194,252,0.3)",
            opacity:0.3, transition:"opacity 0.18s",
          }}/>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ALWAYS-VISIBLE TIMELINE — полная реализация
═══════════════════════════════════════════════ */

const TL_BASE_COLORS = {
  red: "#ef4444",
  orange: "#f97316",
  yellow: "#facc15",
  blue: "#38bdf8",
  gray: "#94a3b8",
};
const TL_SIGNAL_PRIORITY = { red: 5, orange: 4, yellow: 2, blue: 1, gray: 0 };
const TL_STATUS_TO_SIGNAL = { sick: "red", warning: "orange", healthy: "gray", none: "gray" };
const TL_DEFAULT_TTL_DAYS = { red: 180, orange: 90, yellow: 30, blue: 365, gray: 365 };
const TL_OUTLINE_AFTER_DAYS = 90;
const TL_ORGAN_TTL_OVERRIDES = {
  heart: { red: 150, orange: 90 },
  lung_left: { red: 180, orange: 90 },
  lung_right: { red: 180, orange: 90 },
  liver: { red: 180, orange: 90 },
  kidney_left: { red: 180, orange: 90 },
  kidney_right: { red: 180, orange: 90 },
};

const statusColor = { sick:"#ef4444", warning:"#f97316", healthy:"#10b981", none:"rgba(3,194,252,0.4)" };

function timelineRowDate(row) {
  return row?.study_date || row?.date_iso || row?.date || "";
}

function mapTimelineItemToClinicalRow(row) {
  let payload = {};
  try { payload = JSON.parse(row?.payload || "{}"); } catch (_) {}
  const statusCandidate =
    payload?.organ_status ||
    payload?.clinical_status ||
    payload?.status ||
    row?.organ_status ||
    row?.clinical_status ||
    row?.status ||
    "";
  const status = resolveRowClinicalStatus(row, statusCandidate);
  const organId = resolveClinicalOrganId(
    row?.organ_id || payload?.organ_id || "",
    row?.study_type,
    row?.conclusion,
    payload?.conclusion,
    payload?.condition_description,
    payload?.notes
  );
  return {
    organ_id: organId,
    status: status || "none",
    study_type: row?.study_type || payload?.study_type || "",
    study_date: formatStudyDateDisplay(row?.date_iso || payload?.date || ""),
    date_iso: row?.date_iso || payload?.date || "",
    findings: row?.conclusion || payload?.conclusion || "",
    notes: row?.notes || payload?.notes || "",
    ai_confidence: row?.ai_confidence,
    ttl_days: row?.ttl_days,
    _timeline_item_id: row?.id || "",
    _timeline_source: "timeline_items",
  };
}

function mapOrganDataRowToClinicalRow(row) {
  return {
    ...row,
    status: resolveRowClinicalStatus(row, row?.status),
    organ_id: resolveClinicalOrganId(row?.organ_id || "", row?.study_type, row?.findings, row?.notes),
  };
}

function getPatientTimelineSourceRows(patientId) {
  const tlRows = dbQuery("SELECT * FROM timeline_items WHERE patient_id=? ORDER BY date_iso ASC", [patientId]);
  if (!tlRows.length) {
    return dbQuery("SELECT * FROM organ_data WHERE patient_id=? AND organ_id NOT IN ('__record__','__ai__')", [patientId]).map(mapOrganDataRowToClinicalRow);
  }
  return tlRows.map(mapTimelineItemToClinicalRow).filter(r => r.organ_id);
}

function parseTimelineDate(dateStr) {
  const raw = String(dateStr || "").trim();
  if (!raw) return null;
  const ms = Date.parse(raw);
  if (!Number.isNaN(ms)) return ms;
  const m = raw.match(/^(\d{1,2})[.](\d{1,2})[.](\d{4})$/);
  if (m) return Date.UTC(Number(m[3]), Number(m[2]) - 1, Number(m[1]), 12, 0, 0, 0);
  return null;
}

function timelineShortDate(dateStr) {
  const ms = parseTimelineDate(dateStr);
  if (!ms) return String(dateStr || "—");
  const d = new Date(ms);
  return `${String(d.getUTCDate()).padStart(2, "0")}.${String(d.getUTCMonth() + 1).padStart(2, "0")}`;
}

function formatStudyDateDisplay(dateStr) {
  const ms = parseTimelineDate(dateStr);
  if (!ms) return String(dateStr || "—");
  return new Date(ms).toLocaleDateString("ru-RU");
}

function timelineLocalDateKey(ms = Date.now()) {
  const d = new Date(ms);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function detectTimelineSubtype(row) {
  const txt = `${row?.findings || ""} ${row?.notes || ""}`.toLowerCase();
  if (/artifact|artefact|артефакт|motion|техническ|низк.*качеств/.test(txt)) return "technical";
  if (/stale|устарев|ttl|просроч/.test(txt)) return "stale";
  if (/suspicion|подозр|наблюден/.test(txt)) return "suspicion";
  return "";
}

function detectScheduledPending(row) {
  const txt = `${row?.findings || ""} ${row?.notes || ""}`.toLowerCase();
  return /\bscheduled[_\s-]?pending\b|контроль.*назнач|повторн.*обслед|не явил|не приш[её]л|no[-\s]?show|did not attend|missed follow[-\s]?up|missed appointment/.test(txt);
}

function normalizeAiConfidence(row) {
  if (row?.ai_confidence !== undefined && row?.ai_confidence !== null) {
    const v = Number(row.ai_confidence);
    if (!Number.isNaN(v) && v >= 0 && v <= 1) return v;
  }
  const txt = `${row?.findings || ""} ${row?.notes || ""}`;
  const m = txt.match(/\b(?:ai|ии|confidence|достоверн\w*)\s*[:=]?\s*(0(?:\.\d+)?|1(?:\.0+)?)\b/i);
  if (m) return Number(m[1]);
  const st = String(row?.status || "none");
  if (st === "sick") return 0.9;
  if (st === "warning") return 0.7;
  if (st === "healthy") return 0.55;
  return 0.5;
}

function resolveTtlDays(row, signal, ttlConfig = TL_DEFAULT_TTL_DAYS) {
  const oid = canonicalizeOrganId(row?.organ_id || "");
  const orgOverride = TL_ORGAN_TTL_OVERRIDES[oid]?.[signal];
  if (orgOverride) return orgOverride;
  const cfg = ttlConfig?.[signal];
  if (cfg) return cfg;
  return TL_DEFAULT_TTL_DAYS[signal] || 90;
}

function computeTimelinePhase(ageDays, ttlDays) {
  if (ageDays <= ttlDays) return "bright";
  if (ageDays <= ttlDays * 1.33) return "dim";
  if (ageDays <= ttlDays * 2) return "overdue";
  return "stale";
}

function timelineHexBySignalPhase(signal, phase) {
  const base = TL_BASE_COLORS[signal] || TL_BASE_COLORS.gray;
  if (phase === "bright") return base;
  if (phase === "dim") {
    return signal === "red" ? "#fb7185"
      : signal === "orange" ? "#fdba74"
      : signal === "yellow" ? "#fde68a"
      : signal === "blue" ? "#7dd3fc"
      : "#a1a1aa";
  }
  if (phase === "overdue") return "#9ca3af";
  return "#6b7280";
}

function computeTimelinePriority({ signal, aiConfidence, clinicalSeverity, ageDays, phase }) {
  const cp = TL_SIGNAL_PRIORITY[signal] || 0;
  const agePenalty = Math.min(40, Math.round(ageDays / 30) * 2);
  const overdueBoost = phase === "overdue" ? 20 : 0;
  return cp * 100 + Math.round((aiConfidence || 0) * 30) + Math.round((clinicalSeverity || 0) * 30) + overdueBoost - agePenalty;
}

function buildTimelineRowMeta(row, referenceTs = Date.now(), ttlConfig = TL_DEFAULT_TTL_DAYS) {
  const rowDate = timelineRowDate(row);
  const ts = parseTimelineDate(rowDate) ?? referenceTs;
  const ageDays = Math.max(0, (referenceTs - ts) / 86400000);
  const subtype = detectTimelineSubtype(row);
  const scheduledPending = detectScheduledPending(row);
  const normalizedStatus = resolveRowClinicalStatus(row, row?.status);
  const healed = detectResolvedOutcome(row, normalizedStatus);
  const baseSignal = subtype === "technical" ? "blue" : (TL_STATUS_TO_SIGNAL[normalizedStatus] || "gray");
  const ttlDays = resolveTtlDays(row, baseSignal, ttlConfig);
  const basePhase = scheduledPending ? "overdue" : computeTimelinePhase(ageDays, ttlDays);
  const isCriticalSignal = baseSignal === "red" || baseSignal === "orange";
  const outlineDueToPending = scheduledPending && isCriticalSignal;
  const expired = !healed && basePhase === "stale";
  const outlineDueToAge = !expired && ageDays >= TL_OUTLINE_AFTER_DAYS && isCriticalSignal;
  const outlineOnly = !healed && !expired && (outlineDueToPending || outlineDueToAge);
  const phase = healed ? "resolved" : basePhase;
  const visualSignal = (healed || expired)
    ? "gray"
    : (outlineOnly ? baseSignal : (basePhase === "overdue" ? "yellow" : (basePhase === "stale" ? "gray" : baseSignal)));
  const aiConfidence = normalizeAiConfidence(row);
  const displayStatus = (healed || expired) ? "none" : normalizedStatus;
  const clinicalSeverity = displayStatus === "sick" ? 1 : displayStatus === "warning" ? 0.7 : 0.2;
  const priorityScore = (healed || expired) ? 0 : computeTimelinePriority({
    signal: baseSignal,
    aiConfidence,
    clinicalSeverity,
    ageDays,
    phase: basePhase,
  });
  return {
    timestamp: ts,
    ageDays,
    ttlDays,
    phase,
    basePhase,
    subtype,
    signal: baseSignal,
    visualSignal,
    displayStatus,
    aiConfidence,
    priorityScore,
    healed,
    expired,
    scheduledPending: (healed || expired) ? false : scheduledPending,
    isOverdue: !healed && !expired && basePhase === "overdue",
    isCritical: !healed && !expired && isCriticalSignal,
    outlineOnly,
    outlineSignal: outlineOnly ? baseSignal : "",
    outlineReason: outlineDueToPending ? "scheduled_pending" : (outlineDueToAge ? "ttl_90d" : ""),
    hex: (healed || expired)
      ? TL_BASE_COLORS.gray
      : (outlineOnly ? timelineHexBySignalPhase(baseSignal, "bright") : timelineHexBySignalPhase(visualSignal, basePhase)),
  };
}

function summarizeTimelineSnapshot(rows = []) {
  const snapshotRows = Array.isArray(rows) ? rows : [];
  const top = snapshotRows
    .map(o => o._timeline || {})
    .sort((a, b) => (b.priorityScore || 0) - (a.priorityScore || 0))[0] || {};
  const hasCritical = snapshotRows.some(o => o._timeline?.isCritical);
  const hasOverdue = snapshotRows.some(o => o._timeline?.isOverdue);
  const scheduledPendingCount = snapshotRows.filter(o => o._timeline?.scheduledPending).length;
  const displayStatuses = snapshotRows.map(o => o._timeline?.displayStatus || o.status || "none");
  return {
    worstStatus: hasCritical ? (displayStatuses.some(s => s === "sick") ? "sick" : "warning")
      : (displayStatuses.some(s => s === "healthy") ? "healthy" : "none"),
    worstSignal: top.visualSignal || "gray",
    worstHex: top.hex || TL_BASE_COLORS.gray,
    priorityScore: top.priorityScore || 0,
    hasCritical,
    hasOverdue,
    scheduledPendingCount,
  };
}

function getPreferredTimelineIndex(entries = []) {
  const list = Array.isArray(entries) ? entries : [];
  if (!list.length) return 0;
  for (let i = list.length - 1; i >= 0; i--) {
    if (!list[i]?.isTodayMarker && list[i]?.hasCritical) return i;
  }
  for (let i = list.length - 1; i >= 0; i--) {
    if (!list[i]?.isTodayMarker) return i;
  }
  return Math.max(0, list.length - 1);
}

function buildClinicalTimelineModel(rows, nowMs = Date.now(), ttlConfig = TL_DEFAULT_TTL_DAYS) {
  const byDate = {};
  (rows || []).forEach(r => {
    const rowDate = timelineRowDate(r);
    const ts = parseTimelineDate(rowDate) ?? nowMs;
    const normalizedStatus = resolveRowClinicalStatus(r, r?.status);
    const dateKey = rowDate || "Неизвестно";
    if (!byDate[dateKey]) byDate[dateKey] = { date: dateKey, timestamp: ts, organs: [] };
    byDate[dateKey].timestamp = Math.max(byDate[dateKey].timestamp, ts);
    byDate[dateKey].organs.push({ ...r, status: normalizedStatus });
  });

  const sortedEntries = Object.values(byDate).sort((a, b) => a.timestamp - b.timestamp);
  const rollingOrganState = new Map();
  const entries = sortedEntries.map(entry => {
    (entry.organs || []).forEach(orgRow => {
      const oid = canonicalizeOrganId(orgRow.organ_id || "");
      if (!oid) return;
      rollingOrganState.set(oid, { ...orgRow, organ_id: oid });
    });
    const entryRows = (entry.organs || []).map(orgRow => ({
      ...orgRow,
      _timeline: buildTimelineRowMeta(orgRow, entry.timestamp, ttlConfig),
    }));
    const snapshotRows = Array.from(rollingOrganState.values()).map(v => ({
      ...v,
      _timeline: buildTimelineRowMeta(v, entry.timestamp, ttlConfig),
    }));
    return {
      ...entry,
      organs: entryRows,
      shortDate: timelineShortDate(entry.date),
      snapshot: snapshotRows,
      ...summarizeTimelineSnapshot(snapshotRows),
    };
  });

  const buildCurrentSnapshot = (referenceTs) => (
    Array.from(rollingOrganState.values()).map(v => ({
      ...v,
      _timeline: buildTimelineRowMeta(v, referenceTs, ttlConfig),
    }))
  );
  const currentSnapshot = buildCurrentSnapshot(nowMs);
  const currentSummary = summarizeTimelineSnapshot(currentSnapshot);

  const todayKey = timelineLocalDateKey(nowMs);
  let todayIdx = -1;
  for (let i = entries.length - 1; i >= 0; i--) {
    const entryDayKey = timelineLocalDateKey(entries[i]?.timestamp || 0);
    if (entryDayKey === todayKey) {
      todayIdx = i;
      break;
    }
  }

  if (todayIdx >= 0) {
    const todayEntry = entries[todayIdx];
    const todayEventRows = (todayEntry?.organs || []).map(orgRow => ({
      ...orgRow,
      _timeline: buildTimelineRowMeta(orgRow, nowMs, ttlConfig),
    }));
    entries[todayIdx] = {
      ...todayEntry,
      organs: todayEventRows,
      snapshot: currentSnapshot.map(v => ({ ...v })),
      ...currentSummary,
      isTodayMarker: true,
    };
  } else {
    const latest = entries.length ? entries[entries.length - 1] : null;
    const baseTodayTs = parseTimelineDate(todayKey) ?? nowMs;
    const markerTs = Math.max(baseTodayTs, Number(latest?.timestamp || 0) + 1, nowMs);
    entries.push({
      date: todayKey,
      shortDate: timelineShortDate(todayKey),
      timestamp: markerTs,
      organs: [],
      snapshot: currentSnapshot.map(v => ({ ...v })),
      worstStatus: currentSummary.worstStatus || latest?.worstStatus || "none",
      worstSignal: currentSummary.worstSignal || latest?.worstSignal || "gray",
      worstHex: currentSummary.worstHex || latest?.worstHex || TL_BASE_COLORS.gray,
      priorityScore: currentSummary.priorityScore || latest?.priorityScore || 0,
      hasCritical: currentSummary.hasCritical ?? !!latest?.hasCritical,
      hasOverdue: currentSummary.hasOverdue ?? !!latest?.hasOverdue,
      scheduledPendingCount: Number(currentSummary.scheduledPendingCount ?? latest?.scheduledPendingCount ?? 0),
      isTodayMarker: true,
    });
  }

  const tasks = currentSnapshot
    .filter(o => o?._timeline?.isOverdue || o?._timeline?.scheduledPending)
    .map(o => ({
      id: `${todayKey}_${o.organ_id}_${o?._timeline?.phase || "state"}`,
      date: todayKey,
      organ_id: o.organ_id,
      type: o?._timeline?.scheduledPending ? "scheduled_pending" : "overdue",
      priorityScore: o?._timeline?.priorityScore || 0,
    }));
  tasks.sort((a, b) => (b.priorityScore || 0) - (a.priorityScore || 0));

  return { entries, tasks };
}

function compressTimelineEntries(entries, maxPoints = 22) {
  const list = Array.isArray(entries) ? entries : [];
  if (list.length <= maxPoints) return list.map((e, idx) => ({ ...e, _displayIdx: idx, _clusterSize: 1 }));
  const bucketSize = Math.ceil(list.length / maxPoints);
  const out = [];
  for (let i = 0; i < list.length; i += bucketSize) {
    const chunk = list.slice(i, i + bucketSize);
    const rep = [...chunk].sort((a, b) => (b.priorityScore || 0) - (a.priorityScore || 0))[0] || chunk[0];
    out.push({
      ...rep,
      _clusterSize: chunk.length,
      _clusterDates: chunk.map(c => c.shortDate || c.date).join(", "),
    });
  }
  return out.map((e, idx) => ({ ...e, _displayIdx: idx }));
}

function worstColor(entry) {
  if (entry?.worstHex) return entry.worstHex;
  return statusColor[entry?.worstStatus] || statusColor.none;
}

function VerticalTimelineBar({ entries, currentIdx, onTimeChange, tasks = [], compact = false }) {
  const [mode, setMode] = useState("all");
  const trackRef = useRef(null);
  const dragRef = useRef(false);
  const [trackH, setTrackH] = useState(320);

  const indexed = useMemo(() => (entries || []).map((e, idx) => ({ ...e, _idx: idx })), [entries]);
  const filtered = useMemo(() => {
    if (mode === "critical") return indexed.filter(e => e.isTodayMarker || e.hasCritical);
    if (mode === "overdue") return indexed.filter(e => e.isTodayMarker || e.hasOverdue || e.scheduledPendingCount > 0);
    return indexed;
  }, [indexed, mode]);

  const hasData = filtered.length > 0;
  const topPad = 12;
  const bottomPad = 12;
  const usableH = Math.max(1, trackH - topPad - bottomPad);

  const ratioByFilteredIndex = idx => {
    if (!hasData) return 0;
    if (filtered.length <= 1) return 1;
    return Math.max(0, Math.min(1, idx / (filtered.length - 1)));
  };
  const toYByFilteredIndex = idx => topPad + ratioByFilteredIndex(idx) * usableH;
  const getFilteredIndex = entry => filtered.findIndex(item => item._idx === entry?._idx);
  const toY = entry => {
    const idx = getFilteredIndex(entry);
    return toYByFilteredIndex(idx >= 0 ? idx : 0);
  };
  const toRatioByY = y => Math.max(0, Math.min(1, (Math.max(0, Math.min(usableH, y - topPad)) / usableH)));

  const gradient = hasData
    ? `linear-gradient(180deg, ${filtered.map((e, idx) => `${worstColor(e)} ${Math.round(ratioByFilteredIndex(idx) * 100)}%`).join(", ")})`
    : "rgba(148,180,220,0.18)";

  const currentEntry = useMemo(() => {
    if (!hasData) return null;
    const direct = filtered.find(e => e._idx === currentIdx);
    if (direct) return direct;
    const fallback = indexed.find(e => e._idx === currentIdx);
    if (!fallback) return filtered[filtered.length - 1] || null;
    return filtered.slice().sort((a, b) => Math.abs(getFilteredIndex(a) - getFilteredIndex(fallback)) - Math.abs(getFilteredIndex(b) - getFilteredIndex(fallback)))[0] || filtered[0];
  }, [hasData, filtered, indexed, currentIdx]);

  const currentY = currentEntry ? toY(currentEntry) : topPad;

  const pickNearest = (ratio) => {
    if (!hasData) return null;
    let best = filtered[0];
    let bestD = Math.abs(ratioByFilteredIndex(0) - ratio);
    for (let i = 1; i < filtered.length; i++) {
      const d = Math.abs(ratioByFilteredIndex(i) - ratio);
      if (d < bestD) { best = filtered[i]; bestD = d; }
    }
    return best;
  };

  const selectByClientY = (clientY) => {
    if (!trackRef.current || !hasData) return;
    const rect = trackRef.current.getBoundingClientRect();
    const localY = clientY - rect.top;
    const nearest = pickNearest(toRatioByY(localY));
    if (nearest) onTimeChange(nearest._idx);
  };

  useEffect(() => {
    if (!trackRef.current) return;
    const ro = new ResizeObserver(() => {
      const h = trackRef.current?.clientHeight || 320;
      setTrackH(h);
    });
    ro.observe(trackRef.current);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    const onMove = e => { if (dragRef.current) selectByClientY(e.clientY); };
    const onUp = () => { dragRef.current = false; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, [filtered, hasData, mode, currentIdx]);

  const onWheel = e => {
    if (!hasData) return;
    e.preventDefault();
    const currentFilteredIdx = currentEntry ? getFilteredIndex(currentEntry) : 0;
    const nextIdx = Math.max(0, Math.min(filtered.length - 1, currentFilteredIdx + (e.deltaY > 0 ? 1 : -1)));
    const nextEntry = filtered[nextIdx];
    if (nextEntry) onTimeChange(nextEntry._idx);
  };

  return (
    <div style={{
      width: compact ? 66 : 84,
      borderRight: `1px solid ${C.border}`,
      background: "rgba(2,4,11,0.96)",
      display: "flex",
      flexDirection: "column",
      padding: compact ? "6px 4px" : "8px 6px",
      gap: 8,
      flexShrink: 0,
    }}>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {[["all","Все"],["critical","Важное"],["overdue","Просроч"]].map(([id, label]) => (
          <button key={id} onClick={() => setMode(id)} style={{
            height:18,
            borderRadius:999,
            border:`1px solid ${mode===id ? "rgba(3,194,252,0.42)" : C.border2}`,
            background:mode===id ? "rgba(3,194,252,0.13)" : "transparent",
            color:mode===id ? "#7dd3fc" : C.muted,
            fontSize:8,
            fontWeight:700,
            cursor:"pointer",
          }}>{label}</button>
        ))}
      </div>

      <div style={{fontSize:8,color:C.muted,textAlign:"center",fontFamily:C.mono}}>
        задачи: <span style={{color:tasks.length ? "#facc15" : C.dim}}>{tasks.length}</span>
      </div>

      <div
        ref={trackRef}
        onClick={e => selectByClientY(e.clientY)}
        onMouseDown={e => { dragRef.current = true; selectByClientY(e.clientY); }}
        onWheel={onWheel}
        style={{
          position: "relative",
          flex: 1,
          minHeight: 180,
          borderRadius: 10,
          border: `1px solid ${C.border}`,
          background: "rgba(148,180,220,0.05)",
          overflow: "hidden",
          cursor: hasData ? "ns-resize" : "default",
          userSelect: "none",
        }}
      >
        <div style={{position:"absolute",left:"50%",top:topPad,bottom:bottomPad,width:4,transform:"translateX(-50%)",borderRadius:99,background:gradient}} />

        {hasData && filtered.map((e, i) => {
          const y = toY(e);
          const active = e._idx === currentEntry?._idx;
          const overdue = !!e.hasOverdue;
          const pending = (e.scheduledPendingCount || 0) > 0;
          const c = worstColor(e);
          return (
            <div key={`${e._idx}_${i}`} title={e.date}
              onClick={(ev)=>{ev.stopPropagation();onTimeChange(e._idx);}}
              style={{position:"absolute",left:"50%",top:y,transform:"translate(-50%,-50%)",cursor:"pointer",zIndex:3}}>
              <div style={{
                width: active ? 10 : 7,
                height: active ? 10 : 7,
                borderRadius: "50%",
                background: c,
                border: `1.5px solid ${overdue ? "#facc15" : (active ? "#fff" : c)}`,
                boxShadow: active ? `0 0 8px ${c}` : "none",
                position:"relative",
              }}>
                {pending && <span style={{position:"absolute",right:-7,top:-8,fontSize:8,lineHeight:1}}></span>}
              </div>
            </div>
          );
        })}

        {hasData && (
          <div style={{
            position:"absolute",
            left:"50%",
            top:currentY,
            transform:"translate(-50%,-50%)",
            zIndex:2,
            pointerEvents:"none",
          }}>
            <div style={{width:22,height:1,background:"rgba(255,255,255,0.75)",transform:"translateX(-11px)"}}/>
          </div>
        )}
      </div>

      <div style={{fontSize:8,color:C.muted,textAlign:"center",fontFamily:C.mono,lineHeight:1.35}}>
        {hasData ? `${currentEntry?.shortDate || "—"} (${Math.max(1, indexed.findIndex(e => e._idx === currentEntry?._idx) + 1)}/${indexed.length})` : "Нет данных"}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   FLOATING DRAGGABLE BODY MODEL WINDOW
   Like a Telegram floating video call window:
   - draggable anywhere on screen
   - resizable via corner handle
   - timeline toggle
═══════════════════════════════════════════════ */
function FloatingModelWindow({ patient, onClose, onAddStudy, onOrganSelect, selOrgan }) {
  const defaultW = 300;
  const defaultH = Math.min(600, window.innerHeight - 100);
  const [pos, setPos] = useState({ x: window.innerWidth - defaultW - 20, y: 60 });
  const [size, setSize] = useState({ w: defaultW, h: defaultH });
  const [minimized, setMinimized] = useState(false);
  const dragRef = useRef(null);
  const resizeRef = useRef(null);
  const winRef = useRef(null);

  // Drag + resize logic — single unified handler
  useEffect(() => {
    const onMove = e => {
      if (dragRef.current) {
        const dx = e.clientX - dragRef.current.startX;
        const dy = e.clientY - dragRef.current.startY;
        setPos({ x: Math.max(0, dragRef.current.x0 + dx), y: Math.max(0, dragRef.current.y0 + dy) });
      }
      if (resizeRef.current) {
        const dx = e.clientX - resizeRef.current.startX;
        const dy = e.clientY - resizeRef.current.startY;
        setSize({ w: Math.max(260, Math.min(640, resizeRef.current.w0 + dx)), h: Math.max(360, Math.min(900, resizeRef.current.h0 + dy)) });
      }
    };
    const onUp = () => {
      dragRef.current = null; resizeRef.current = null;
      document.body.style.userSelect = ""; document.body.style.cursor = "";
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const startDrag = e => {
    e.preventDefault();
    dragRef.current = { startX: e.clientX, startY: e.clientY, x0: pos.x, y0: pos.y };
    document.body.style.userSelect = "none";
  };
  const startResize = e => {
    e.preventDefault(); e.stopPropagation();
    resizeRef.current = { startX: e.clientX, startY: e.clientY, w0: size.w, h0: size.h };
    document.body.style.userSelect = "none";
    document.body.style.cursor = "nwse-resize";
  };

  return (
    <div ref={winRef} style={{
      position:"fixed", left:pos.x, top:pos.y,
      width:size.w, height: minimized ? 42 : size.h,
      zIndex:500, display:"flex", flexDirection:"column",
      background:C.bg2, border:`1px solid rgba(3,194,252,0.22)`,
      borderRadius:14, overflow:"hidden",
      boxShadow:"0 16px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(3,194,252,0.08)",
      transition:"height 0.24s cubic-bezier(0.16,1,0.3,1)",
    }}>
      {/* ── title bar (drag handle) ── */}
      <div onMouseDown={startDrag} style={{
        height:42, display:"flex", alignItems:"center", gap:8,
        padding:"0 10px 0 12px", flexShrink:0,
        background:"rgba(3,194,252,0.05)", borderBottom:`1px solid rgba(3,194,252,0.12)`,
        cursor:"move", userSelect:"none",
      }}>
        {/* window traffic lights */}
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          <div onClick={e=>{e.stopPropagation();onClose();}} style={{width:12,height:12,borderRadius:"50%",background:"#ff5f56",cursor:"pointer",border:"1px solid rgba(0,0,0,0.2)"}} title="Закрыть"/>
          <div onClick={e=>{e.stopPropagation();setMinimized(m=>!m);}} style={{width:12,height:12,borderRadius:"50%",background:"#ffbd2e",cursor:"pointer",border:"1px solid rgba(0,0,0,0.2)"}} title="Свернуть"/>
          <div style={{width:12,height:12,borderRadius:"50%",background:"rgba(3,194,252,0.3)",border:"1px solid rgba(0,0,0,0.2)"}}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{patient.name}</div>
          <div style={{fontSize:9,color:"rgba(3,194,252,0.7)",display:"flex",gap:5}}>
            <span>{patient.gender==="female"?" Жен.":" Муж."}</span>
            {patient.dob&&<span style={{fontFamily:C.mono}}>{patient.dob}</span>}
          </div>
        </div>
        <button onClick={e=>{e.stopPropagation();onAddStudy();}}
          style={{padding:"3px 8px",background:C.accent,border:`1px solid rgba(59,130,246,0.3)`,borderRadius:6,fontSize:9,color:C.blue2,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}
          onMouseDown={e=>e.stopPropagation()}>
          + Иссл.
        </button>
      </div>

      {/* ── model panel body ── */}
      {!minimized && (
        <div style={{flex:1,overflow:"hidden"}}>
          <ModelPanel pid={patient.id} gender={patient.gender} isDoctor={true} isMobile={false} onOrganSelect={onOrganSelect} selOrgan={selOrgan}/>
        </div>
      )}

      {/* ── resize handle (bottom-right corner) ── */}
      {!minimized && (
        <div onMouseDown={startResize} style={{
          position:"absolute", bottom:0, right:0,
          width:18, height:18, cursor:"nwse-resize", zIndex:10,
          display:"flex", alignItems:"flex-end", justifyContent:"flex-end",
          padding:3,
        }}>
          <svg width="10" height="10" viewBox="0 0 10 10" style={{opacity:0.4}}>
            <path d="M10,0 L10,10 L0,10" fill="none" stroke="#03C2FC" strokeWidth="2" strokeLinecap="round"/>
            <path d="M10,5 L10,10 L5,10" fill="none" stroke="#03C2FC" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   COLLAPSIBLE ORGAN CARD — proper component so hooks work
