let sqlDB = null;
let dbReady = false;
const dbReadyCallbacks = [];

function onDbReady(fn) {
  if (dbReady) fn();
  else dbReadyCallbacks.push(fn);

  dbReadyCallbacks.forEach(f => f());
}

function saveDB() {
  if (!sqlDB) return;
  const data = sqlDB.export();
  localStorage.setItem('medvis_db', JSON.stringify(Array.from(data)));
}

function dbQuery(sql, params = []) {
  if (!sqlDB) return [];
  try {
    const res = sqlDB.exec(sql, params);
    if (!res.length) return [];
    return res[0].values.map(row => {
      const obj = {};
      res[0].columns.forEach((col, i) => obj[col] = row[i]);
      return obj;
    });
  } catch(e) { console.error('DB query error:', e, sql); return []; }
}

function dbRun(sql, params = []) {
  if (!sqlDB) return false;
  try { sqlDB.run(sql, params); saveDB(); return true; }
  catch(e) { console.error('DB run error:', e); return false; }
}

function dbGetOne(sql, params = []) {
  const rows = dbQuery(sql, params);
  return rows[0] || null;
}

/* ═══════════════════════════════════════════════
   SYNC / PUBSUB
═══════════════════════════════════════════════ */
let _subs = [];
function pub(event = 'update', data = {}) {
  _subs.forEach(f => f(event, data));
  // Cross-tab sync
  localStorage.setItem('medvis_sync', JSON.stringify({ event, data, ts: Date.now() }));
}
function sub(fn) {
  _subs.push(fn);
  return () => { _subs = _subs.filter(x => x !== fn); };
}

function useDB() {
  const [, s] = useState(0);
  useEffect(() => {
    const unsub = sub(() => s(t => t + 1));
    const handleStorage = e => { if (e.key === 'medvis_sync') s(t => t + 1); };
    window.addEventListener('storage', handleStorage);
    return () => { unsub(); window.removeEventListener('storage', handleStorage); };
  }, []);
}

function canonicalizeOrganId(id) {
  const key = String(id || "").trim();
  return ORGAN_ID_ALIASES[key] || key;
}

function canonicalizeOrganMap(map) {
  const out = {};
  const priority = { sick: 2, warning: 1, healthy: 0, none: -1 };
  Object.entries(map || {}).forEach(([rawId, status]) => {
    const id = canonicalizeOrganId(rawId);
    if (!id) return;
    const cur = out[id];
    if (!cur || (priority[status] ?? -1) > (priority[cur] ?? -1)) {
      out[id] = status;
    }
  });
  return out;
}

/* ═══ Global model cache — по отдельному кэшу на каждый файл ═══ */
const _modelCache = {};
function getOrLoadModel(path, onSuccess, onProgress, onError) {
  if (!_modelCache[path]) _modelCache[path] = { gltf: null, loading: false, callbacks: [] };
  const entry = _modelCache[path];
  if (entry.gltf) { onSuccess(entry.gltf); return; }
  entry.callbacks.push({ onSuccess, onProgress, onError });
  if (entry.loading) return;
  entry.loading = true;
  function _doLoad() {
    const loader = new THREE.GLTFLoader();
    if (THREE.DRACOLoader) {
      const draco = new THREE.DRACOLoader();
      draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
      draco.preload();
      loader.setDRACOLoader(draco);
    }
    const dec = window.MeshoptDecoder;
    if (dec && dec.supported !== false) {
      try { loader.setMeshoptDecoder(dec); } catch(e) { console.warn('setMeshoptDecoder:', e); }
    }
    loader.load(path,
      gltf => {
        entry.gltf = gltf;
        entry.loading = false;
        entry.callbacks.forEach(cb => cb.onSuccess && cb.onSuccess(gltf));
        entry.callbacks = [];
      },
      xhr => { entry.callbacks.forEach(cb => cb.onProgress && cb.onProgress(xhr)); },
      err => {
        entry.loading = false;
        entry.callbacks.forEach(cb => cb.onError && cb.onError(err));
        entry.callbacks = [];
      }
    );
  }
  const dec = window.MeshoptDecoder;
  if (dec && dec.ready) dec.ready.then(_doLoad);
  else _doLoad();
}

/* ─── NLP TEXT ANALYZER ────────────────────────
   Infrastructure hook: swap analyzeWithAI() in
   when neural backend is ready.
──────────────────────────────────────────────── */

// 1. Pure keyword matcher (current implementation)
function analyzeWithKeywords(text) {
  if (!text || text.trim().length < 3) return [];
  const lower = text.toLowerCase();
  const results = [];
  for (const disease of DISEASE_DB) {
    const matched = disease.keywords.some(kw => lower.includes(kw));
    if (matched) {
      results.push({
        disease: disease.name,
        severity: disease.severity,
        organs: disease.organs,
        confidence: 0.75, // keyword match confidence
        source: "keyword",
      });
    }
  }
  return results;
}

// 2. AI endpoint — Gemini on the backend, with graceful fallback
async function analyzeWithAI(text) {
  if (!text || text.trim().length < 4) return [];
  const res = await fetch('/api/analyze', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ text })
  });
  if (!res.ok) {
    const msg = await res.text().catch(()=> '');
    throw new Error(msg || `AI_HTTP_${res.status}`);
  }
  const data = await res.json();
  return Array.isArray(data?.results) ? data.results : [];
}

// 3. Main entry point — merges AI with keyword fallback for robustness
async function analyzeText(text) {
  const aiResults = [];
  try {
    const got = await analyzeWithAI(text);
    if (Array.isArray(got)) aiResults.push(...got);
  } catch(e) {
    // AI unavailable — keep keyword fallback below
  }

  const kwResults = analyzeWithKeywords(text);
  const out = [];
  const seen = new Set();

  const pushUnique = (arr) => {
    (arr || []).forEach(item => {
      const key = JSON.stringify({
        disease: item?.disease || '',
        severity: item?.severity || '',
        organs: (item?.organs || []).map(o => `${o.id}:${o.status}`).sort()
      });
      if (seen.has(key)) return;
      seen.add(key);
      out.push(item);
    });
  };

  pushUnique(aiResults);
  pushUnique(kwResults);
  return out;
}

// 4. Merge analysis results into organ status map
// Returns { organ_id: 'sick'|'warning'|'healthy' }
function mergeAnalysisToOrgans(results) {
  const priority = { sick: 2, warning: 1, healthy: 0 };
  const map = {};
  for (const r of results) {
    for (const o of (r?.organs || [])) {
      const oid = canonicalizeOrganId(o.id);
      if (!oid) continue;
      const cur = map[oid];
      if (!cur || priority[o.status] > priority[cur]) {
        map[oid] = o.status;
      }
    }
  }
  return canonicalizeOrganMap(map);
}

function inferMajorOrganIdFromMeshName(meshName, cat="visceral") {
  const raw = String(meshName || "");
  const n = raw
    .toLowerCase()
    .replace(/\.(\d+)\b/g, " ")
    .replace(/_/g, " ")
    .replace(/[()*]/g, " ")
    .replace(/\s+/g, " ")
    .trim();

  const left  = /(?:\.l\b|\bleft\b)/.test(raw.toLowerCase()) || / left /.test(` ${n} `);
  const right = /(?:\.r\b|\bright\b)/.test(raw.toLowerCase()) || / right /.test(` ${n} `);
  const has = (re) => re.test(n);

  if (cat === "cardiovascular") {
    if (has(/coronary|anterior interventricular|circumflex artery of heart|great cardiac vein|middle cardiac vein|coronary sinus/)) return "coronary_vessels";
    if (has(/\bheart\b|atrium|ventricle|pericard|myocard|endocard|epicard|atrioventricular valve|pulmonary valve|aortic valve|mitral|tricuspid|papillary muscle|chordae|trabeculae/)) return "heart";
    if (has(/pulmonary trunk|pulmonary artery|pulmonary vein|lingular artery|segmental artery of left lung|segmental artery of right lung|vein of right lung|vein of left lung/)) return "pulmonary_vessels";
    if (has(/aortic arch|thoracic aorta|ascending aorta|aorta\b|brachiocephalic trunk/)) return "aorta";
    if (has(/carotid|thyroid artery|facial artery|maxillary artery|occipital artery|temporal artery|ophthalmic artery|ethmoidal artery|labial artery|inferior alveolar artery|infra orbital artery|infra-orbital artery|sphenopalatine|palatine artery|mental branch|submental artery|ascending pharyngeal/)) {
      return has(/thyroid/) ? "thyroid" : "carotid_vessels";
    }
    if (has(/cerebral artery|basilar artery|cerebellar artery|callosomarginal|pericallosal|lateral striate|precentral sulcus|central sulcus|parietal artery|temporo occipital|temporo-occipital|pontine branches|retinal artery|anterior cerebral artery|middle cerebral artery|posterior cerebral artery/)) return "cerebral_vessels";
    if (has(/brachial artery|axillary artery|radial artery|ulnar artery|palmar|metacarpal arteries|interosseous artery|humeral artery|thoraco acromial|thoraco-acromial|subscapular artery|circumflex humeral|suprascapular artery|deep brachial|ulnar collateral|radial collateral/)) return "upper_limb_vessels";
    if (has(/common iliac|external iliac|internal iliac|femoral artery|popliteal artery|tibial artery|fibular artery|peroneal artery|genicular|dorsalis pedis|plantar artery|metatarsal artery|digital arteries of foot|gluteal artery|obturator artery|iliolumbar artery|circumflex iliac|inferior epigastric/)) return "lower_limb_vessels";
    if (has(/splenic/)) return "spleen";
    if (has(/hepatic|portal vein|gastroduodenal/)) return "liver";
    if (has(/left gastric|right gastric|gastro omental|gastro-omental|gastric/)) return "stomach";
    if (has(/mesenteric|ileocolic|colic|sigmoid/)) return has(/small/) ? "small_intestine" : "large_intestine";
    return null;
  }

  if (cat === "lymphoid") {
    if (has(/palatine tonsil/)) return "tonsils";
    if (has(/thymus/)) return "thymus";
    if (has(/\bspleen\b|splenic nodes/)) return "spleen";
    if (has(/thyroid nodes|pretracheal|paratracheal cervical|retropharyngeal|jugular|cervical nodes|submandibular|submental|mastoid|occipital nodes|parotid nodes|auricular|mandibular node|nasolabial|bucinator|supraclavicular/)) return "lymph_nodes_head_neck";
    if (has(/tracheobronchial|paratracheal thoracic|parasternal|pericardial|diaphragmatic|juxta oesophageal|juxta-oesophageal|intrapulmonary|intercostal|brachiocephalic nodes|azygos|ligamentum arteriosum/)) return "lymph_nodes_thoracic";
    if (has(/coeliac|gastric nodes|gastro omental|gastro-omental|pyloric|pancreatic|cystic node|mesenteric|ileocolic|colic nodes|appendicular|precaecal|retrocaecal|lumbar nodes|aortic nodes|caval nodes|epigastric nodes/)) return "lymph_nodes_abdominal";
    if (has(/iliac|obturator|gluteal nodes|sacral nodes|vesical|pararectal|prevesical|postvesical|common iliac/)) return "lymph_nodes_pelvic";
    if (has(/axillary|brachial nodes|interpectoral|infraclavicular|supratrochlear|cubital/)) return "lymph_nodes_upper_limb";
    if (has(/inguinal|lacunar node|popliteal|tibial node|fibular node/)) return "lymph_nodes_lower_limb";
    return null;
  }

  if (cat === "visceral") {
    if (has(/parotid|submandibular|sublingual|parotid duct|submandibular duct/)) return "salivary_glands";
    if (has(/tongue|uvula|gingiva/)) return "tongue";
    if (has(/thyroid gland/)) return "thyroid";
    if (has(/parathyroid/)) return "parathyroid";
    if (has(/oesophagus|esophagus/)) return "esophagus";
    if (has(/bronchus|bronchi/)) return "trachea";
    if (has(/lung/)) return left ? "lung_left" : right ? "lung_right" : null;
    if (has(/stomach|gastric/)) return "stomach";
    if (has(/duodenum|jejunum|ileum|small intestine/)) return "small_intestine";
    if (has(/colon|caec|cecum|appendix|sigmoid|rectum|large intestine|taenia/)) return "large_intestine";
    if (has(/liver|hepatic/)) return "liver";
    if (has(/gallbladder|bile duct/)) return "gallbladder";
    if (has(/pancrea/)) return "pancreas";
    if (has(/\bspleen\b/)) return "spleen";
    if (has(/kidney|renal|ureter/)) return right ? "kidney_right" : left ? "kidney_left" : null;
    if (has(/bladder|vesical|urethra/)) return "bladder";
    if (has(/prostat/)) return "prostate";
    if (has(/testis|epididymis/)) return right ? "testis_right" : left ? "testis_left" : null;
    if (has(/seminal vesicle|deferens|ejaculatory duct/)) return "seminal_vesicles";
    if (has(/penis/)) return "penis";
    if (has(/uterus|cervix|endomet|myomet/)) return "uterus";
    if (has(/ovary|ovarian|uterine tube|fallopian/)) return right ? "ovary_right" : left ? "ovary_left" : null;
    return null;
  }

  if (cat === "nervous") {
    if (has(/tentorium|falx|dura|arachnoid|pia/)) return has(/spinal/) ? "spinal_cord" : "meninges";
    if (has(/spinal|cauda equina|nerve root/)) return "spinal_cord";
    if (has(/nerve|plexus|ganglion|radicular/)) return "peripheral_nerves";
    if (has(/brain|cerebr|cerebel|gyrus|sulcus|insula|thalam|amygdal|hippoc|brainstem|pons|medulla|choroid plexus|olfactory|lobule|temporal pole|occipital pole/)) return "brain";
    return null;
  }

  if (cat === "skeletal") {
    if (has(/parietal bone|frontal bone|occipital bone|sphenoid|ethmoid|temporal bone|maxilla|mandible|nasal bone|zygomatic|palatine bone|lacrimal bone|malleus|incus|stapes|tooth|incisor|canine|premolar|molar|inferior nasal concha|vomer/)) return "skull";
    if (has(/\bhyoid\b/)) return "hyoid_laryngeal";
    // Vertebrae — split by region
    if (has(/\batlas\b|\baxis\b|vertebra c\d|cervical vertebra/)) return "cervical_spine";
    if (has(/vertebra t\d|thoracic vertebra/)) return "thoracic_spine";
    if (has(/vertebra l\d|lumbar vertebra/)) return "lumbar_spine";
    if (has(/\bsacrum\b|\bcoccyx\b/)) return "sacrum_coccyx";
    if (has(/vertebra|vertebral/)) return "spine"; // fallback for unspecified
    if (has(/\brib\b|\bribs\b|sternum|costal cartilage|manubrium|xiphoid/)) return "ribcage";
    if (has(/\bilium\b|\bischium\b|\bpubis\b|acetabul/)) return "pelvis";
    if (has(/clavicle|scapula|acromion/)) return "shoulder_girdle";
    if (has(/\bhumerus\b/)) return "humerus";
    if (has(/\bradius\b|\bulna\b/)) return "forearm_bones";
    if (has(/carpal|metacarpal|phalanx of hand|phalanges of hand|scaphoid|lunate|triquetrum|pisiform|trapezoid bone|trapezium|capitate|hamate/)) return "hand_bones";
    if (has(/\bfemur\b|femoral/)) return "femur";
    if (has(/patella/)) return "knee_joint";
    if (has(/\btibia\b|\bfibula\b/)) return "tibia_fibula";
    if (has(/talus|calcaneus|cuneiform|navicular bone|cuboid bone|metatarsal|phalanx of.*foot|phalanges of.*foot/)) return "foot_bones";
    return null;
  }

  if (cat === "joints") {
    // Head/neck joints
    if (has(/temporomandibular|sphenomandibular|stylomandibular|lateral temporomandibular|articular.*temporomandibular/)) return "tmj";
    if (has(/thyrohyoid|cricothyroid|cricopharyngeal|stylohyoid|quadrangular membrane|intercornual|pterygospinous/)) return "hyoid_laryngeal";
    // Spine — split by region
    if (has(/intervertebral disc c|nucleus pulposus c/)) return "cervical_spine";
    if (has(/intervertebral disc t|nucleus pulposus t/)) return "thoracic_spine";
    if (has(/intervertebral disc l|nucleus pulposus l/)) return "lumbar_spine";
    if (has(/sacrococcygeal symphysis/)) return "sacrum_coccyx";
    if (has(/intervertebral disc|nucleus pulposus|supraspinous|interspinous|longitudinal ligament|nuchal ligament|ligamenta flava/)) return "spine";
    // Thorax
    if (has(/intercostal membrane|head of rib|costotransverse|costovertebral|sternocostal|radiate ligament.*rib|intra-articular.*rib/)) return "ribcage";
    // Shoulder girdle joints
    if (has(/sternoclavicular|costoclavicular|interclavicular/)) return "sternoclavicular_joint";
    if (has(/acromioclavicular|coracoclavicular|conoid ligament|trapezoid ligament|coraco-acromial|superior transverse scapular|inferior transverse scapular/)) return "acromioclavicular_joint";
    if (has(/glenohumeral|coracohumeral|glenoid labrum|transverse humeral|articular capsule of glenohumeral/)) return "shoulder_joint";
    // Upper limb joints
    if (has(/articular capsule of elbow|annular ligament of radius|oblique cord|quadrate ligament|articular disc of.*radio-ulnar|dorsal radio-ulnar|palmar radio-ulnar|interosseous membrane of forearm|radial collateral ligament(?!.*wrist)|ulnar collateral ligament(?!.*wrist)/)) return "elbow_joint";
    if (has(/radiocarpal|articular capsule of radiocarpal|radial collateral ligament of wrist|ulnar collateral ligament of wrist|dorsal radiocarpal|palmar radiocarpal|ulnocarpal|radioscaphocapitate|radiocapitate|ulnolunate|ulnotriquetral|ulnocapitate|ulnopisiform|lunotriquetral|scapholunate|radiate carpal|palmar lunotriquetral|dorsal ulnocarpal|palmar scaphotriquetral|dorsal scaphotriquetral/)) return "wrist_joint";
    if (has(/metacarpal|metacarpophalangeal|interphalangeal.*hand|palmar interphalangeal|deep transverse metacarpal|dorsal metacarpal|palmar metacarpal|interosseous metacarpal|collateral.*hand|pisohamate|pisometacarpal|pisotriquetral|capitohamate|scaphocapitate|triquetrocapitate|triquetrohamate|trapeziotrapezoidal|trapezoideocapitate|dorsal carpometacarpal|palmar carpometacarpal|scaphotrapeziotrapezoidal|interosseous.*carpal|dorsal intercarpal/)) return "hand_joints";
    // Pelvic joints
    if (has(/sacro-iliac|sacroiliac|pubic symphysis|interpubic disc|pubic ligament|sacrospinous|sacrotuberous|obturator membrane|iliolumbar/)) return "sacroiliac_pubic_joint";
    if (has(/ilium|ischium|pubis|acetabul/)) return "pelvis";
    // Hip
    if (has(/hip joint|acetabular labrum|iliofemoral|ischiofemoral|pubofemoral|ligament of head of femur|transverse acetabular|triradiate cartilage/)) return "hip_joint";
    // Knee
    if (has(/knee|meniscus|cruciate|patellar|infrapatellar|meniscopatellar|fibular collateral|tibial collateral|arcuate popliteal|oblique popliteal|popliteofibular|transverse ligament of knee/)) return "knee_joint";
    // Lower leg — tibiofibular interosseous
    if (has(/superior tibiofibular|articular capsule of superior tibiofibular|interosseous membrane of leg|anterior ligament of fibular head|posterior ligament of fibular head/)) return "tibia_fibula";
    // Ankle
    if (has(/talofibular|calcaneofibular|tibiocalcaneal|tibionavicular|tibiotalar|posterior tibiotalar|tibiofibular|deltoid ligament/)) return "ankle_joint";
    // Foot joints
    if (has(/calcaneocuboid|calcaneonavicular|talocalcaneal|talonavicular|cuneocuboid|cuneonavicular|intercuneiform|cuneometatarsal|tarsometatarsal|metatarsophalangeal|metatarsal.*ligament|interphalangeal.*foot|plantar.*ligament|dorsal.*tarsal|dorsal cuneocuboid|dorsal cuneonavicular|dorsal cuboideonavicular|dorsal tarsometatarsal|collateral.*foot|intersesamoid/)) return "foot_joints";
    return null;
  }

  if (cat === "muscular") {
    if (has(/rectus muscle|oblique muscle|orbicularis|zygomaticus|masseter|temporalis|bucinator|buccinator|nasalis|frontalis|occipitalis|pterygoid|genioglossus|hyoglossus|digastric|mylohyoid|stylohyoid|sternocleidomastoid|scalen|pharyngeal constrictor|crico|arytenoid|platysma|longus capitis|longus colli|levator palpebrae|rectus muscle of eye|superior oblique|inferior oblique|common tendinous ring/)) return "head_neck_muscles";
    if (has(/intercostal|serratus|pectoral|rectus abdominis|external oblique|internal oblique|transversus abdominis|diaphragm|multifidus|erector spinae|latissimus dorsi|trapezius|thoracolumbar fascia|iliocostalis|longissimus|spinalis|splenius|rotatores|quadratus lumborum|piriformis|pelvic diaphragm/)) return "torso_muscles";
    if (has(/deltoid|biceps|triceps|brachialis|pronator|supinator|flexor .* hand|extensor .* hand|thenar|hypothenar|lumbrical|interossei of hand|forearm|arm\b|palmaris|extensor carpi|flexor carpi|abductor pollicis|opponens pollicis/)) return "upper_limb_muscles";
    if (has(/glute|tensor fasciae latae|adductor|gracilis|sartorius|quadriceps|hamstring|biceps femoris|semitendinosus|semimembranosus|tibialis|fibularis|peroneus|gastrocnemius|soleus|plantaris|flexor .* foot|extensor .* foot|lumbricales of foot|interossei of foot|abductor hallucis|adductor hallucis|flexor hallucis|extensor hallucis/)) return "lower_limb_muscles";
    return null;
  }

  if (cat === "skin") {
    if (has(/frontal region|parietal region|occipital region|temporal region|orbital region|nasal region|oral region|buccal region|auricular region|submandibular|submental|carotid triangle|neck|supraclavicular|mastoid|zygomatic|mental region|eyebrow|auricle|concha/)) return "skin_head_neck";
    if (has(/epigastric|umbilic|hypochondriac|hypogastric|inguinal region|lumbar region|sacral region|scapular region|interscapular|vertebral region|anal region|urogenital region|abdomen|thorax|chest|gluteal/)) return "skin_torso";
    if (has(/arm|elbow|forearm|wrist|palm|hand|digits of hand|bicipital|cubital/)) return "skin_upper_limb";
    if (has(/thigh|knee|leg|ankle|foot|digits of foot|patellar|popliteal|calcaneal|plantar|malleolar/)) return "skin_lower_limb";
    return null;
  }

  return null;
}

function getMeshClinicalEntry(meshName, cat, odMap) {
  if (!odMap) return null;
  const direct = odMap[meshName];
  if (direct) return direct;

  const majorId = canonicalizeOrganId(inferMajorOrganIdFromMeshName(meshName, cat));
  if (majorId && odMap[majorId]) {
    return { ...odMap[majorId], organ_id: majorId, _derivedFrom: majorId };
  }

  const legacyId = inferMajorOrganIdFromMeshName(meshName, cat);
  if (legacyId && odMap[legacyId]) {
    const canonical = canonicalizeOrganId(legacyId);
    return { ...odMap[legacyId], organ_id: canonical || legacyId, _derivedFrom: legacyId };
  }
  return null;
}

// 5. React hook for real-time text analysis
function useTextAnalysis(text, debounceMs=600) {
  const [results, setResults] = useState([]);
  const [organMap, setOrganMap] = useState({});
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const timerRef = useRef(null);

  useEffect(()=>{
    clearTimeout(timerRef.current);
    if (!text || text.trim().length < 4) { setResults([]); setOrganMap({}); return; }
    setIsAnalyzing(true);
    timerRef.current = setTimeout(async ()=>{
      const res = await analyzeText(text);
      setResults(res);
      setOrganMap(mergeAnalysisToOrgans(res));
      setIsAnalyzing(false);
    }, debounceMs);
    return ()=>clearTimeout(timerRef.current);
  }, [text]);

  return { results, organMap, isAnalyzing };
}

function gs(status, isSel, isBone, isNlp, nlpUpgrade) {
  // Effective display status: if NLP upgrades, blend the colour
  const dispStatus = nlpUpgrade && !isNlp ? nlpUpgrade : status;
  if (isBone) {
    const sc = isSel?"#03C2FC":dispStatus==="sick"?"#ef4444":dispStatus==="warning"?"#f97316":"rgba(3,194,252,0.55)";
    const sf = isSel?"rgba(3,194,252,0.16)":dispStatus==="sick"?"rgba(239,68,68,0.2)":dispStatus==="warning"?"rgba(249,115,22,0.15)":"rgba(3,194,252,0.07)";
    return { fill:sf, stroke:sc, strokeWidth:isSel?2:0.9, cursor:"pointer", transition:"all 0.25s",
      filter:isSel?"drop-shadow(0 0 7px #03C2FC)":dispStatus==="sick"?"drop-shadow(0 0 7px rgba(239,68,68,0.6))":"none",
      strokeDasharray: isNlp ? "4 2" : undefined, opacity: isNlp ? 0.65 : 1 };
  }
  const m = {
    sick:   { f:"rgba(239,68,68,0.55)",   s:"#ef4444" },
    healthy:{ f:"rgba(16,185,129,0.45)",  s:"rgba(16,185,129,0.9)" },
    warning:{ f:"rgba(249,115,22,0.50)",  s:"#f97316" },
    none:   { f:"rgba(3,194,252,0.04)",   s:"rgba(3,194,252,0.25)" },
  };
  const c = m[dispStatus] || m.none;
  return {
    fill: isNlp ? c.f.replace(/[\d.]+\)$/, '0.28)') : c.f,
    stroke:isSel?"#03C2FC":c.s,
    strokeWidth:isSel?2.5:1.2,
    strokeDasharray: isNlp ? "5 2" : undefined,
    opacity: isNlp ? 0.7 : 1,
    cursor:"pointer", transition:"all 0.3s ease",
    filter:isSel?"drop-shadow(0 0 10px #03C2FC88)":
      dispStatus==="sick"?"drop-shadow(0 0 12px rgba(239,68,68,0.85))":
      dispStatus==="healthy"?"drop-shadow(0 0 8px rgba(16,185,129,0.65))":
      dispStatus==="warning"?"drop-shadow(0 0 7px rgba(249,115,22,0.6))":"none",
  };
}

function O({ id, d, cx, cy, rx, ry, ell, od, sel, oc, bone }) {
  const organData = od?.[id];
  const status = organData?.status || "none";
  const isNlp = !!(organData?._nlp);
  const nlpUpgrade = organData?._nlpUpgrade || null;
  const incomplete = organData?.incomplete === true;
  const s = gs(status, sel===id, bone, isNlp, nlpUpgrade);
  const click = e => { e.stopPropagation(); oc(sel===id?null:id); };
  if (ell) return (
    <>
      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} style={s} onClick={click}/>
      {incomplete && <OrgHatch ell cx={cx} cy={cy} rx={rx} ry={ry}/>}
    </>
  );
  return (
    <>
      <path d={d} style={s} onClick={click}/>
      {incomplete && <OrgHatch d={d}/>}
    </>
  );
}

/* ═══════════════════════════════════════════════

function BodyModel3D({ gender, od, sel, oc, layerVis, onGroupList, groupVisibility, xrayMode }) {
  const mountRef    = useRef(null);

  const propsRef    = useRef({});
  const [loadState, setLoadState] = useState('loading');
  const [loadPct,   setLoadPct]   = useState(0);
  const [diagLog,   setDiagLog]   = useState([]);  // diagnostic messages
  const [errorInfo, setErrorInfo] = useState(null); // { title, reason, fix, code }

  const addLog = (msg, type='info') =>
    setDiagLog(prev => [...prev.slice(-12), { msg, type, ts: Date.now() }]);

  // Always-fresh props via ref
  propsRef.current = { od: od||{}, sel, layerVis: layerVis||{}, oc, groupVisibility: groupVisibility||{}, onGroupList, xrayMode };

  function getCat(name) {
    const n = (name||"").toLowerCase();
    // Skeletal
    if (/\bbone\b|\bbones\b|femur|fibula|tibia\b|radius\b|ulna\b|humerus|vertebra|vertebrae|\brib\b|\bribs\b|skull|cranium|sternum|clavicle|scapula|patella|calcaneus|talus|metatarsal|metacarpal|phalanges|phalang|mandible|maxilla|\bpelvis\b|sacrum|ilium|pubis|ischium|malleus|incus|stapes|ossicle|carpal|capitate|hamate|lunate|pisiform|scaphoid|trapez.*bone|triquetrum|navicular.*bone|cuboid bone|cuneiform bone|sesamoid|ligament|joint\b|capsule\b|\btendon\b|bursa|meniscus|symphysis|retinaculum|aponeurosis|atlas|axis|coccyx|acromion|acetabul|hyoid/.test(n)) return "skeletal";
    // Muscular
    if (/\bmuscle\b|\bmuscles\b|pectoral|deltoid|biceps|triceps|quadriceps|glute|hamstring|gastrocnemius|soleus|trapezius|latissimus|rhomboid|erector|masseter|temporal.*muscle|frontalis|orbicularis|zygomaticus|buccinator|sternocleid|splenius|semispinal|intercostal|diaphragm/.test(n)) return "muscular";
    // Cardiovascular
    if (/artery|\baorta\b|arterial|\bvein\b|\bveins\b|venous|inferior vena cava|superior vena cava|sinus.*vein|dural venous|cranial vein|heart|cardiac|coronary|pulmonary.*vessel|lymph/.test(n)) return "cardiovascular";
    // Nervous
    if (/brain|cerebr|cerebel|brainstem|gyrus|sulcus|\bpons\b|medulla\b|thalamus|striatum|putamen|caudate|diencephalon|telencephalon|hippocampus|amygdal|midbrain|spinal cord|choroid plex|corpus stri|white matter|grey matter|meninges|\bdura\b|\bpia\b|tentorium|\bnerve\b|\bnerves\b|plexus|gangli|sympathetic|vagus|sciatic|facial.*nerve|trigeminal/.test(n)) return "nervous";
    // Skin / body surface
    if (/skin|\bfat\b|adipose|integument|\bfascia\b|subcutaneous|epidermis|dermis/.test(n)) return "skin";
    // Default: visceral organs
    return "visceral";
  }

  // Apply colours & visibility from propsRef — callable any time after load
  const applyRef = useRef(null);
  applyRef.current = function applyMeshUpdates() {
  const { od: od2, sel: sel2, layerVis: lv, groupVisibility: gv, xrayMode: xr } = propsRef.current;

  if (sceneRef.current && sceneRef.current.scene) {
    sceneRef.current.scene.background.setHex(xr ? 0x00060f : 0x04070f);
  }

  const hasGroups = groupNodes && groupNodes.size > 0;

  if (hasGroups) {

      const on = (gv && gv[gname] !== undefined) ? (gv[gname] === true) : true;
      if (node) node.visible = on;
    });
  }

  // ── 2) Видимость + материалы каждого меша ─────────────────────────────
  Object.values(meshesRef.current).forEach(({ mesh, cat }) => {
    // Effective visibility: group toggle AND category toggle
    let visible = (lv && lv[cat] !== false);

    if (hasGroups && meshToGroup && meshToGroup.size > 0) {
      const gname = meshToGroup.get(mesh);
      if (!gname) visible = false; // если меш не принадлежит ни одной группе — скрываем
      else {
        const on = (gv && gv[gname] !== undefined) ? (gv[gname] === true) : true;
        visible = visible && on;
      }
    }

    mesh.visible = !!visible;

    // ── Gather ALL materials (handles multi-material meshes) ────────────
    const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];

    // ── Skip if nothing changed (visibility + xray + selection + status) ─
    const clinicalEntry = getMeshClinicalEntry(mesh.name, cat, od2);
    const stNow = clinicalEntry ? (clinicalEntry.status || "") : "";
    const _sig = `${mesh.visible?1:0}|${xr?1:0}|${sel2===mesh.name?1:0}|${stNow}`;
    const isSel = sel2 === mesh.name;

    const setMat = (mat, hex, opacity, depthWrite) => {
      if (!mat) return;
      if (mat.color) mat.color.setHex(hex);
      const op = Math.max(0, Math.min(1, opacity));
      mat.opacity = op;
      mat.transparent = op < 1;
      mat.depthWrite = (depthWrite !== undefined) ? depthWrite : (op >= 1);
      if (mat.emissive) mat.emissive.setHex(isSel ? 0x0a2040 : 0x000000);
      mat.needsUpdate = true;
    };

    // ── X-ray mode ─────────────────────────────────────────────────────
if (xr) {
  const xrayPalette = {
    skeletal:       { op: isSel ? 0.31 : 0.19, factor: 1.00 },
    joints:         { op: isSel ? 0.26 : 0.14, factor: 1.00 },
    muscular:       { op: isSel ? 0.05 : 0.015,factor: 1.00 },
    cardiovascular: { op: isSel ? 0.29 : 0.16, factor: 0.50 },
    lymphoid:       { op: isSel ? 0.25 : 0.12, factor: 0.50 },
    nervous:        { op: isSel ? 0.23 : 0.11, factor: 0.50 },
    skin:           { op: isSel ? 0.10 : 0.03, factor: 1.00 },
    visceral:       { op: isSel ? 0.44 : 0.29, factor: 0.50 },
  };
  const xp = xrayPalette[cat] || xrayPalette.visceral;
  const xrayStatusOpacity = ((isSel ? 0.42 : 0.24) * xp.factor);
  if (stNow && stNow !== "none") {
    mats.forEach(mat => setMat(mat, STATUS_HEX[stNow] ?? STATUS_HEX.none, xrayStatusOpacity, false));
  } else {
    mats.forEach(mat => {
      if (!mat) return;
      if (mat.color) mat.color.setHex(STATUS_HEX.none);
      mat.opacity = Math.max(0.02, xp.op * xp.factor);
      mat.transparent = true;
      mat.depthWrite = false;
      if (mat.emissive) mat.emissive.setHex(isSel ? 0x004466 : 0x001a33);
      mat.needsUpdate = true;
    });
  }
  return;
}

// ── Normal mode ────────────────────────────────────────────────────
mats.forEach(mat => {
  if (!mat) return;

  const od3  = clinicalEntry;
  const st   = od3?.status || "none";
  const disp = (od3?._nlpUpgrade && !od3?._nlp) ? od3._nlpUpgrade : st;

  const normalOpacity = {
    skeletal:       { active: isSel ? 0.48 : 0.34, none: isSel ? 0.22 : 0.12, depthWrite: true  },
    joints:         { active: isSel ? 0.44 : 0.28, none: isSel ? 0.20 : 0.11, depthWrite: false },
    muscular:       { active: isSel ? 0.11 : 0.045,none: isSel ? 0.07 : 0.03, depthWrite: false },
    cardiovascular: { active: isSel ? 0.43 : 0.27, none: isSel ? 0.18 : 0.10, depthWrite: false },
    lymphoid:       { active: isSel ? 0.41 : 0.24, none: isSel ? 0.18 : 0.10, depthWrite: false },
    nervous:        { active: isSel ? 0.44 : 0.30, none: isSel ? 0.19 : 0.11, depthWrite: false },
    skin:           { active: isSel ? 0.22 : 0.09, none: isSel ? 0.14 : 0.06, depthWrite: false },
    visceral:       { active: isSel ? 0.44 : 0.34, none: isSel ? 0.20 : 0.13, depthWrite: false },
  };
  const np = normalOpacity[cat] || normalOpacity.visceral;
  const hex = STATUS_HEX[disp] ?? STATUS_HEX.none;
  const opacity = (disp === "none") ? np.none : np.active;
  setMat(mat, hex, opacity, np.depthWrite);
});
  });
};


  // Main scene setup — runs once on mount
  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;

    const fail = (title, reason, fix, code='') => {
      console.error('[BodyModel3D]', title, reason);
      setErrorInfo({ title, reason, fix, code });
      setLoadState('error');
    };

    // ── Step 1: THREE core ──
    addLog('Проверка THREE.js…');
    if (typeof THREE === 'undefined') {
      return fail(
        'THREE.js не загружен',
        'Глобальный объект THREE отсутствует. CDN-скрипт не был получен.',
        'Проверьте интернет-соединение и откройте DevTools → Network.',
        'typeof THREE === "undefined"'
      );
    }
    addLog('✓ THREE r' + THREE.REVISION, 'ok');

    // ── Step 2: WebGL support ──
    addLog('Проверка WebGL…');
    const testCanvas = document.createElement('canvas');
    const gl = testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl');
    if (!gl) {
      return fail(
        'WebGL не поддерживается',
        'Браузер не предоставил WebGL-контекст. Возможно, видеодрайвер или настройки браузера блокируют WebGL.',
        'Включите WebGL: chrome://flags/#enable-webgl  или обновите браузер/драйвер.',
        'canvas.getContext("webgl") === null'
      );
    }
    addLog('✓ WebGL доступен', 'ok');

    // ── Step 3: GLTFLoader ──
    addLog('Проверка GLTFLoader…');
    if (!THREE.GLTFLoader) {
      return fail(
        'THREE.GLTFLoader не загружен',
        'CDN-скрипт GLTFLoader.js не был получен или выполнен.',
        'Откройте DevTools → Network и убедитесь, что GLTFLoader.js загружен без ошибок.',
        'THREE.GLTFLoader === undefined'
      );
    }
    addLog('✓ GLTFLoader', 'ok');

    // ── Step 4: OrbitControls ──
    addLog('Проверка OrbitControls…');
    if (!THREE.OrbitControls) {
      return fail(
        'THREE.OrbitControls не загружен',
        'CDN-скрипт OrbitControls.js не был получен или выполнен.',
        'Откройте DevTools → Network и убедитесь, что OrbitControls.js загружен без ошибок.',
        'THREE.OrbitControls === undefined'
      );
    }
    addLog('✓ OrbitControls', 'ok');

    // ── Step 5: Protocol check ──
    const isFileProto = location.protocol === 'file:';
    if (isFileProto) {
      addLog('⚠ file:// протокол', 'warn');
    } else {
      addLog('✓ Протокол: ' + location.protocol, 'ok');
    }

    const W = mount.clientWidth  || 400;
    const H = mount.clientHeight || 600;

    // ── Step 6: Renderer ──
    addLog('Инициализация рендерера…');
    let renderer;
    try {
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(W, H);
      mount.appendChild(renderer.domElement);
      addLog('✓ WebGLRenderer создан', 'ok');
    } catch(e) {
      return fail('Ошибка создания WebGLRenderer', String(e), 'Возможно, браузер ограничивает число WebGL-контекстов. Перезагрузите страницу.', String(e));
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x04070f);
    const camera = new THREE.PerspectiveCamera(45, W / H, 0.001, 2000);
    camera.position.set(0, 0.5, 0.015);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dl1 = new THREE.DirectionalLight(0xffffff, 1.0); dl1.position.set(3, 8, 5);  scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0x93c5fd, 0.5); dl2.position.set(-5, 3,-4); scene.add(dl2);
    const dl3 = new THREE.DirectionalLight(0xfde68a, 0.25);dl3.position.set(0, -6, 3); scene.add(dl3);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = false;
    controls.dampingFactor  = 0;
    controls.rotateSpeed    = 0.7;
    controls.zoomSpeed      = 1.2;
    controls.panSpeed       = 0.8;
    controls.minDistance    = 0.1;
    controls.maxDistance    = 30;
    controls.enablePan      = true;
    controls.screenSpacePanning = true;
    // Blender-style navigation:
    // Middle mouse = orbit, Shift+Middle = pan, Scroll = zoom, Left = nothing
    controls.mouseButtons = {
      LEFT:   THREE.MOUSE.ROTATE,
      MIDDLE: THREE.MOUSE.DOLLY,
      RIGHT:  THREE.MOUSE.PAN,
    };
    controls.touches = {
      ONE: THREE.TOUCH.ROTATE,
      TWO: THREE.TOUCH.DOLLY_PAN,
    };
    // Shift+MMB = pan, MMB alone = dolly (zoom)
    renderer.domElement.addEventListener('pointerdown', e => {
      if (e.button === 1) { // MMB
        controls.mouseButtons.MIDDLE = e.shiftKey ? THREE.MOUSE.PAN : THREE.MOUSE.DOLLY;
      }
    });
    controls.update();

    sceneRef.current = { renderer, camera, controls, scene };

    // ── Step 7: Load all .glb layers from /3d ──
    addLog('Проверка и загрузка файлов слоёв…');

    const loadLayer = (layer) => new Promise((resolve, reject) => {
      getOrLoadModel(
        layer.path,
        gltf => resolve({ layer, gltf }),
        null,
        err => reject({ layer, err })
      );
    });

    Promise.all(TARGET_GROUPS.map(loadLayer))
      .then(items => {
        try {
          const overallBox = new THREE.Box3();
          let hasBounds = false;
          let meshCount = 0;
          const meshToGroup = new Map();
          const groups = [];
          const groupNodes = new Map();

          const cloneMat = (m) => {
            const c = (m && m.clone) ? m.clone() : new THREE.MeshStandardMaterial({ color: 0xffffff });
            c.transparent = false;
            c.opacity = 1.0;
            c.depthWrite = true;
            c.needsUpdate = true;
            return c;
          };

          items.forEach(({ layer, gltf }) => {
            const model = gltf.scene.clone(true);
            model.name = layer.name;
            scene.add(model);
            groupNodes.set(layer.name, model);

            const box = new THREE.Box3().setFromObject(model);
            if (!box.isEmpty()) {
              if (!hasBounds) { overallBox.copy(box); hasBounds = true; }
              else overallBox.union(box);
            }

            const meshObjs = [];
            model.traverse(child => {
              if (!child.isMesh) return;
              const cat = layer.category || getCat(child.name);
              child.material = Array.isArray(child.material)
                ? child.material.map(cloneMat)
                : cloneMat(child.material);
              meshObjs.push(child);
              meshToGroup.set(child, layer.name);
              meshesRef.current[`${layer.name}::${child.uuid}`] = { mesh: child, cat, _lastSig: '' };
              meshCount++;
            });

            groups.push({ name: layer.name, displayName: layer.ru, meshes: meshObjs, path: layer.path });
          });

          if (hasBounds) {
            const center = new THREE.Vector3();
            const size = new THREE.Vector3();
            overallBox.getCenter(center);
            overallBox.getSize(size);
            scene.position.sub(center);

            const maxDim = Math.max(size.x, size.y, size.z) || 2;
            const targetDist = maxDim * 1.2;
            const isZUp = size.z > size.x * 1.3 && size.z > size.y * 1.3;

            if (isZUp) camera.position.set(0, -targetDist, 0);
            else camera.position.set(0, 0, targetDist);

            camera.near = targetDist * 0.001;
            camera.far = targetDist * 100;
            camera.updateProjectionMatrix();
            controls.target.set(0, 0, 0);
            controls.minDistance = targetDist * 0.1;
            controls.maxDistance = targetDist * 10;
            controls.update();
            sceneRef.current.initCamPos = camera.position.clone();
            sceneRef.current.initTarget = new THREE.Vector3(0, 0, 0);
            sceneRef.current.isZUp = isZUp;
          }

          sceneRef.current.controls = controls;
          sceneRef.current.camera = camera;
          groupNodesRef.current = groupNodes;
          meshToGroupRef.current = meshToGroup;
          groupsRef.current = groups;
          const { onGroupList: ogl } = propsRef.current;
          if (ogl) ogl(groups);

          addLog(`✓ Слоёв: ${items.length}`, 'ok');
          addLog(`✓ Мешей: ${meshCount}`, 'ok');
          loadedRef.current = true;
          applyRef.current();
          setLoadPct(100);
          setLoadState('ok');
        } catch(e) {
          fail('Ошибка обработки слоёв GLB', String(e), 'Проверьте содержимое файлов в папке 3d.', String(e));
        }
      })
      .catch(({ layer, err }) => {
        console.error('GLB load error:', layer?.path, err);
        const msg = String(err?.message || err || '');
        const badPath = layer?.path || '3d/*.glb';
        let title, reason, fix, code;

        if (isFileProto) {
          title  = 'Блокировка file:// протокола';
          reason = 'Браузер запрещает XMLHttpRequest через file://. Это политика безопасности браузера, а не проблема кода.';
          fix    = 'Запустите локальный сервер:\n  python -m http.server 8080\nЗатем: http://localhost:8080';
          code   = 'location.protocol === "file:"';
        } else if (msg.includes('404') || msg.includes('Not Found')) {
          title  = 'Файл слоя не найден (404)';
          reason = `Файл "${badPath}" не найден по пути: ${location.href.replace(/[^/]*$/, '')}${badPath}`;
          fix    = 'Проверьте, что все .glb файлы лежат в папке 3d рядом с index.html.';
          code   = msg;
        } else if (msg.includes('CORS') || msg.includes('cross-origin') || msg.includes('access')) {
          title  = 'CORS-ошибка';
          reason = 'Сервер не разрешает кросс-доменный доступ к файлам слоёв.';
          fix    = 'Запускайте проект локально через сервер, а не прямым открытием файла.';
          code   = msg;
        } else if (msg.includes('NetworkError') || msg.includes('Failed to fetch')) {
          title  = 'Сетевая ошибка';
          reason = 'Запрос к одному из файлов слоёв был прерван или отклонён.';
          fix    = 'Проверьте, запущен ли сервер и существуют ли все файлы в папке 3d.';
          code   = msg;
        } else {
          title  = 'Ошибка загрузки слоя GLB';
          reason = msg || 'Неизвестная ошибка загрузчика';
          fix    = 'Проверьте DevTools → Console и корректность файлов в папке 3d.';
          code   = msg;
        }
        fail(title, reason, fix, code);
      });

    /* ── Raycaster / click ── */
    const raycaster = new THREE.Raycaster();
    const mouseVec  = new THREE.Vector2();
    let downXY = { x: 0, y: 0 };
    const onMouseDown = e => { downXY = { x: e.clientX, y: e.clientY }; };
    const onMouseUp   = e => {
      if (Math.abs(e.clientX - downXY.x) > 6 || Math.abs(e.clientY - downXY.y) > 6) return;
      const rect = renderer.domElement.getBoundingClientRect();
      mouseVec.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      mouseVec.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouseVec, camera);
      // Only test visible meshes — significantly faster on large models
      const visMeshes = Object.values(meshesRef.current).filter(e => e.mesh.visible).map(e => e.mesh);
      const hits = raycaster.intersectObjects(visMeshes, false);
      const { oc: oc2, sel: sel2 } = propsRef.current;
      if (!hits.length) { oc2 && oc2(null); return; }
      const name = hits[0].object.name;
      const hasMesh = !!Object.values(meshesRef.current).find(e => e?.mesh?.name === name);
      if (name && hasMesh) oc2 && oc2(name === sel2 ? null : name);
    };
    renderer.domElement.addEventListener('mousedown', onMouseDown);
    renderer.domElement.addEventListener('mouseup',   onMouseUp);

    let rafId;
    const animate = () => { rafId = requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); };
    animate();

    const ro = new ResizeObserver(() => {
      const nw = mount.clientWidth || 1; const nh = mount.clientHeight || 1;
      camera.aspect = nw / nh; camera.updateProjectionMatrix(); renderer.setSize(nw, nh);
    });
    ro.observe(mount);

    return () => {
      cancelAnimationFrame(rafId);
      ro.disconnect();
      renderer.domElement.removeEventListener('mousedown', onMouseDown);
      renderer.domElement.removeEventListener('mouseup',   onMouseUp);
      // Dispose cloned geometries and materials (original cache not touched)
      Object.values(meshesRef.current).forEach(({ mesh }) => {
        try {
          mesh.geometry.dispose();
          const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
          mats.forEach(m => m && m.dispose());
        } catch(_) {}
      });
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      meshesRef.current = {}; loadedRef.current = false; sceneRef.current = null;
    };
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Apply material/visibility updates whenever any prop changes
  useEffect(() => {
    if (loadedRef.current) applyRef.current();
  });

  return (
    <div style={{width:"100%",height:"100%",position:"relative",background:C.bg,overflow:"hidden"}}>
      <div ref={mountRef} style={{width:"100%",height:"100%"}}/>

      {/* ── Loading overlay ── */}
      {loadState === 'loading' && (
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",gap:16,
          background:"rgba(4,7,15,0.82)",backdropFilter:"blur(3px)",pointerEvents:"none"}}>
          <div style={{position:"relative",width:48,height:48}}>
            <div style={{position:"absolute",inset:0,border:"2px solid rgba(59,130,246,0.15)",borderRadius:"50%"}}/>
            <div style={{position:"absolute",inset:0,border:"2px solid transparent",borderTopColor:C.blue,borderRadius:"50%",animation:"spin 1.1s linear infinite"}}/>
            <div style={{position:"absolute",inset:10,border:"1.5px solid transparent",borderTopColor:"rgba(34,211,238,0.4)",borderRadius:"50%",animation:"spin 0.7s linear infinite reverse"}}/>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,color:C.blue2,fontWeight:600,letterSpacing:"0.04em",marginBottom:8}}>Загрузка 3D-модели</div>
            {loadPct > 0 && (
              <div style={{marginBottom:8}}>
                <div style={{fontSize:11,color:C.text,fontFamily:C.mono,marginBottom:4}}>{loadPct}%</div>
                <div style={{width:140,height:3,background:"rgba(59,130,246,0.12)",borderRadius:2,margin:"0 auto"}}>
                  <div style={{height:"100%",width:`${loadPct}%`,background:C.blue,borderRadius:2,transition:"width 0.4s"}}/>
                </div>
              </div>
            )}

          </div>
        </div>
      )}

      {/* ── Error overlay ── */}
      {loadState === 'error' && errorInfo && (
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",padding:20,
          background:"rgba(4,7,15,0.93)",backdropFilter:"blur(4px)",overflowY:"auto"}}>
          <div style={{width:"100%",maxWidth:340}}>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{fontSize:22,flexShrink:0}}>🔴</div>
              <div>
                <div style={{fontSize:13,color:C.red2,fontWeight:700,lineHeight:1.3}}>{errorInfo.title}</div>
                <div style={{fontSize:9,color:C.muted,marginTop:2,fontFamily:C.mono}}>3D Model Error</div>
              </div>
            </div>

            {/* Reason */}
            <div style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",
              borderRadius:8,padding:"10px 12px",marginBottom:10}}>
              <div style={{fontSize:9,color:"rgba(239,68,68,0.7)",fontWeight:700,letterSpacing:"0.06em",
                textTransform:"uppercase",marginBottom:5}}>Причина</div>
              <div style={{fontSize:10,color:"rgba(220,200,200,0.85)",lineHeight:1.6}}>{errorInfo.reason}</div>
            </div>

            {/* Fix */}
            <div style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.18)",
              borderRadius:8,padding:"10px 12px",marginBottom:10}}>
              <div style={{fontSize:9,color:"rgba(16,185,129,0.7)",fontWeight:700,letterSpacing:"0.06em",
                textTransform:"uppercase",marginBottom:5}}>Решение</div>
              <div style={{fontSize:10,color:"rgba(190,230,210,0.85)",lineHeight:1.7,whiteSpace:"pre-line"}}>{errorInfo.fix}</div>
            </div>

            {/* Error code */}
            {errorInfo.code && (
              <div style={{background:"rgba(0,0,0,0.4)",borderRadius:6,padding:"7px 10px",marginBottom:10}}>
                <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.06em",
                  textTransform:"uppercase",marginBottom:3}}>Код / Сообщение</div>
                <div style={{fontSize:9,fontFamily:C.mono,color:"rgba(249,115,22,0.8)",
                  wordBreak:"break-all",lineHeight:1.6}}>{errorInfo.code}</div>
              </div>
            )}

            {/* Diagnostics log */}
            {diagLog.length > 0 && (
              <div style={{background:"rgba(0,0,0,0.35)",borderRadius:6,padding:"7px 10px"}}>
                <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:"0.06em",
                  textTransform:"uppercase",marginBottom:5}}>Лог диагностики</div>
                {diagLog.map((l,i) => (
                  <div key={i} style={{fontSize:9,fontFamily:C.mono,lineHeight:1.7,
                    color: l.type==='ok'?C.green2 : l.type==='warn'?C.orange2 : C.muted}}>
                    {l.msg}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Navigation controls ── */}
      {loadState === 'ok' && (
        <NavControls3D sceneRef={sceneRef}/>
      )}
    </div>
  );
}

/* ─── 3D NAV CONTROLS (icon-only, collapsible) ──────────────── */
function NavControls3D({ sceneRef }) {
  const [visible, setVisible] = React.useState(true);
  const btnBase = {
    width:28,height:28,borderRadius:6,
    border:"1px solid rgba(148,180,220,0.16)",
    background:"rgba(8,14,26,0.85)",
    cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
    backdropFilter:"blur(4px)",transition:"all 0.15s",
    color:"rgba(120,145,180,0.7)",flexShrink:0,
  };
  const goView = view => {
    const s = sceneRef.current; if (!s) return;
    const d = s.initCamPos.length();
    const t = s.initTarget || new THREE.Vector3();
    const zu = s.isZUp;
    let pos;
    if (view==="front") pos = zu ? new THREE.Vector3(0,-d,t.z) : new THREE.Vector3(0,t.y,d);
    else if (view==="back") pos = zu ? new THREE.Vector3(0,d,t.z) : new THREE.Vector3(0,t.y,-d);
    else pos = zu ? new THREE.Vector3(d,0,t.z) : new THREE.Vector3(d,t.y,0);
    s.camera.position.copy(pos); s.controls.target.copy(t); s.controls.update();
  };
  return (
    <>
      {/* Toggle show/hide — always visible, top-right corner */}
      <div style={{position:"absolute",top:8,right:8,display:"flex",flexDirection:"column",gap:3,zIndex:10}}>
        <button title={visible?"Скрыть элементы управления":"Показать элементы управления"}
          onClick={()=>setVisible(v=>!v)}
          style={{...btnBase,color:visible?"#03C2FC":"rgba(120,145,180,0.4)",border:`1px solid ${visible?"rgba(3,194,252,0.35)":"rgba(148,180,220,0.12)"}`}}>
          {/* eye icon */}
          <svg width="14" height="10" viewBox="0 0 20 14" fill="none">
            <path d="M1,7 Q10,0 19,7 Q10,14 1,7Z" stroke="currentColor" strokeWidth="1.8" fill="none"/>
            <circle cx="10" cy="7" r="3" stroke="currentColor" strokeWidth="1.6" fill={visible?"currentColor":"none"}/>
          </svg>
        </button>

        {visible && <>
          {/* Reset */}
          <button title="Сбросить вид"

            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 7A5 5 0 1 0 7 2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><polyline points="2,2 2,7 7,7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>
          </button>

          {/* Zoom - */}

            style={btnBase}>

          </button>
          {/* Separator */}
          <div style={{height:1,background:"rgba(148,180,220,0.1)",margin:"1px 4px"}}/>
          {/* Front */}
          <button title="Спереди" onClick={()=>goView("front")} style={btnBase}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" strokeWidth="1.3"/><circle cx="7" cy="7" r="2" stroke="currentColor" strokeWidth="1.2"/></svg>
          </button>
          {/* Back */}
          <button title="Сзади" onClick={()=>goView("back")} style={btnBase}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" strokeWidth="1.3"/><rect x="4" y="4" width="6" height="6" rx="1" stroke="currentColor" strokeWidth="1.2"/></svg>
          </button>
          {/* Side */}
          <button title="Сбоку" onClick={()=>goView("side")} style={btnBase}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" strokeWidth="1.3"/><line x1="7" y1="1" x2="7" y2="13" stroke="currentColor" strokeWidth="1.2"/></svg>

      </div>

}

═══════════════════════════════════════════════ */
function ScanCard({ status, label }) {
  const annotationColor = status==="sick"?"rgba(239,68,68,0.9)":status==="warning"?"rgba(249,115,22,0.9)":"rgba(16,185,129,0.5)";
  const scanColor = status==="sick"?"rgba(239,68,68,0.18)":status==="warning"?"rgba(249,115,22,0.15)":"rgba(16,185,129,0.12)";
  return (
    <div style={{background:"#020508",borderRadius:10,aspectRatio:"4/3",position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",border:`1px solid ${C.border}`}}>
      {/* background grid */}
      <div style={{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(0deg,rgba(0,180,100,0.015) 0px,rgba(0,180,100,0.015) 1px,transparent 1px,transparent 8%),repeating-linear-gradient(90deg,rgba(0,180,100,0.01) 0px,rgba(0,180,100,0.01) 1px,transparent 1px,transparent 8%)"}}/>
      {/* scan lines */}
      {[...Array(12)].map((_,i)=><div key={i} style={{position:"absolute",top:`${5+i*8}%`,left:"4%",right:"4%",height:1,background:`rgba(0,200,120,${0.015+Math.abs(Math.sin(i*0.8))*0.02})`}}/>)}
      {/* annotation */}
      {status==="sick"&&<div style={{position:"absolute",width:22,height:15,borderRadius:3,background:scanColor,border:`1.5px dashed ${annotationColor}`,top:"33%",left:"41%",boxShadow:`0 0 16px ${annotationColor}55`}}/>}
      {status==="warning"&&<div style={{position:"absolute",width:16,height:11,borderRadius:3,background:scanColor,border:`1.5px dashed ${annotationColor}`,top:"37%",left:"44%"}}/>}
      {status==="healthy"&&<div style={{position:"absolute",width:14,height:10,borderRadius:3,border:`1px solid rgba(16,185,129,0.4)`,top:"36%",left:"44%"}}/>}
      <span style={{position:"absolute",bottom:5,right:8,color:"rgba(0,200,120,0.28)",fontSize:8,fontFamily:C.mono,letterSpacing:"0.08em"}}>{label}</span>
    </div>
  );
}

          <div style={{fontSize:11,marginTop:4}}>Исследования появятся после добавления врачом</div>

      ) : (
        <div style={{padding:"13px 16px"}}>
          {/* meta grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:13}}>
            {[["Исследование",data.study_type||"—"],["Дата",data.study_date||"—"]].map(([k,v])=>(

  );
}

function GroupPanel({ groups, groupVis, onToggle, onClose, excludeRef }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const handler = e => {
      if (ref.current && ref.current.contains(e.target)) return;
      if (excludeRef && excludeRef.current && excludeRef.current.contains(e.target)) return;
      onClose();
    };
    const id = setTimeout(() => document.addEventListener("mousedown", handler), 0);
    return () => { clearTimeout(id); document.removeEventListener("mousedown", handler); };
  }, []);

  const allOn  = LAYER_POPUP_ITEMS.every(l => groupVis[l.name] !== false);
  const allOff = LAYER_POPUP_ITEMS.every(l => groupVis[l.name] === false);

  return (
    <div style={{position:"absolute",inset:0,zIndex:120,display:"flex",alignItems:"flex-start",justifyContent:"flex-start",pointerEvents:"none"}}>
      <div ref={ref} style={{
        pointerEvents:"all", margin:"8px 8px 0",
        background:"rgba(6,10,20,0.97)",
        border:"1px solid rgba(3,194,252,0.22)", borderRadius:16,
        boxShadow:"0 16px 56px rgba(0,0,0,0.75), 0 0 0 1px rgba(3,194,252,0.06)",
        backdropFilter:"blur(12px)", width:268, overflow:"hidden",
        animation:"fadeUp 0.18s cubic-bezier(0.16,1,0.3,1) both",

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 8px",borderBottom:"1px solid rgba(3,194,252,0.1)"}}>
          <span style={{fontSize:10,fontWeight:700,color:"#03C2FC",letterSpacing:"0.07em",textTransform:"uppercase"}}>Слои модели</span>
          <div style={{display:"flex",gap:5}}>
            <button onClick={()=>{const v={};LAYER_POPUP_ITEMS.forEach(l=>{v[l.name]=true;});onToggle("__set__",v);}}
              style={{fontSize:8,padding:"2px 7px",background:allOn?"rgba(3,194,252,0.18)":"rgba(3,194,252,0.06)",border:`1px solid ${allOn?"rgba(3,194,252,0.45)":"rgba(3,194,252,0.18)"}`,borderRadius:5,color:"#03C2FC",cursor:"pointer",fontWeight:700}}>Все</button>
            <button onClick={()=>{const v={};LAYER_POPUP_ITEMS.forEach(l=>{v[l.name]=false;});onToggle("__set__",v);}}
              style={{fontSize:8,padding:"2px 7px",background:allOff?"rgba(148,180,220,0.1)":"rgba(148,180,220,0.03)",border:`1px solid ${allOff?"rgba(148,180,220,0.35)":"rgba(148,180,220,0.12)"}`,borderRadius:5,color:"rgba(180,200,230,0.6)",cursor:"pointer",fontWeight:700}}>Скрыть</button>
            <button onClick={onClose} style={{width:20,height:20,background:"transparent",border:"1px solid rgba(148,180,220,0.16)",borderRadius:5,cursor:"pointer",color:"rgba(180,200,230,0.45)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
          </div>
        </div>
        <div style={{padding:"8px 10px 10px",display:"flex",flexDirection:"column",gap:4}}>
          {LAYER_POPUP_ITEMS.map(item => {
            const on = groupVis[item.name] !== false;
            const loaded = groups.some(g => g.name === item.name);
            return (
              <button key={item.name} onClick={()=>onToggle(item.name)} style={{
                display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:9,
                border:`1.5px solid ${on?"rgba(3,194,252,0.38)":"rgba(148,180,220,0.1)"}`,

function _OLD_GroupPanel({ groups, groupVis, onToggle }) {
  const [panelH, setPanelH] = React.useState(220);
  const dragRef = React.useRef(false);
  const startY = React.useRef(0);
  const startH = React.useRef(0);

  React.useEffect(() => {
    const onMove = e => {
      if (!dragRef.current) return;
      // dragging up = panel grows (inverted: startY was top of drag, moving mouse up = negative delta = bigger panel)
      const delta = startY.current - e.clientY;
      setPanelH(Math.min(500, Math.max(80, startH.current + delta)));
    };
    const onUp = () => { dragRef.current = false; document.body.style.cursor = ""; document.body.style.userSelect = ""; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const startDrag = e => {
    e.preventDefault();
    dragRef.current = true;
    startY.current = e.clientY;
    startH.current = panelH;
    document.body.style.cursor = "ns-resize";
    document.body.style.userSelect = "none";
  };

  const rows = TARGET_GROUPS.map(tg => {
    const loaded = groups.find(g => g.name === tg.name);
    return { name: tg.name, displayName: tg.ru, icon: tg.icon||"📁", count: loaded ? loaded.meshes.length : null };
  });

  // Only show rows that are either loaded or have defaultOn
  const visibleRows = rows.filter(r => {
    const tg = TARGET_GROUPS.find(t => t.name === r.name);
    const loaded = groups.find(g => g.name === r.name);
    return loaded || (tg && tg.defaultOn);
  }).concat(rows.filter(r => {
    const loaded = groups.find(g => g.name === r.name);
    const tg = TARGET_GROUPS.find(t => t.name === r.name);
    return loaded && !(tg && tg.defaultOn);
  }).filter(r => !rows.filter(x => {
    const tg = TARGET_GROUPS.find(t => t.name === x.name);
    return tg && tg.defaultOn;
  }).find(x => x.name === r.name)));

  // Simpler: just show all groups that exist in model, plus always show defaultOn groups
  const finalRows = TARGET_GROUPS.map(tg => {
    const loaded = groups.find(g => g.name === tg.name);
    return { name: tg.name, displayName: tg.ru, icon: tg.icon||"📁", count: loaded ? loaded.meshes.length : null, found: !!loaded };
  });

  const foundCount = finalRows.filter(r => r.found).length;

  return (
    <div style={{flexShrink:0,display:"flex",flexDirection:"column",background:"rgba(2,4,11,0.97)",borderTop:"1px solid rgba(3,194,252,0.15)"}}>
      {/* Drag handle — grab to resize vertically */}
      <div onMouseDown={startDrag} style={{
        height:6,cursor:"ns-resize",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
        background:"rgba(3,194,252,0.03)",
        borderBottom:"1px solid rgba(3,194,252,0.07)",
      }}>
        <div style={{width:32,height:3,borderRadius:2,background:"rgba(3,194,252,0.3)"}}/>
      </div>
      {/* Header */}
      <div style={{padding:"5px 10px 3px",display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
        <span style={{fontSize:9,fontWeight:700,color:"#03C2FC",textTransform:"uppercase",letterSpacing:"0.06em"}}>Слои</span>
        <span style={{fontSize:8,color:"rgba(180,200,230,0.3)"}}>({foundCount} загружено)</span>
        <div style={{flex:1}}/>
        <button onClick={()=>{const v={};TARGET_GROUPS.forEach(g=>{v[g.name]=true;});onToggle("__set__",v);}}
          style={{fontSize:8,padding:"1px 5px",background:"rgba(3,194,252,0.08)",border:"1px solid rgba(3,194,252,0.22)",borderRadius:4,color:"#03C2FC",cursor:"pointer"}}>Все</button>
        <button onClick={()=>{const v={};TARGET_GROUPS.forEach(g=>{v[g.name]=false;});onToggle("__set__",v);}}
          style={{fontSize:8,padding:"1px 5px",background:"rgba(148,180,220,0.04)",border:"1px solid rgba(148,180,220,0.15)",borderRadius:4,color:"rgba(180,200,230,0.5)",cursor:"pointer"}}>Скрыть</button>
      </div>
      {/* Rows */}
      <div style={{overflowY:"auto",height:panelH,padding:"2px 6px 6px"}}>
        {finalRows.map(row => {
          const on = groupVis[row.name] === true;
          return (
            <div key={row.name} onClick={()=>onToggle(row.name)} style={{
              display:"flex",alignItems:"center",gap:6,padding:"3px 5px",borderRadius:5,
              cursor:"pointer",transition:"background 0.12s",
              opacity: row.found ? 1 : 0.38,
            }}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(3,194,252,0.07)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              {/* Eye toggle */}
              <div style={{width:16,height:16,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:10,color:on?"#03C2FC":"rgba(100,120,150,0.4)",transition:"color 0.15s"}}>
                {on ? "◉" : "○"}
              </div>
              {/* Icon */}
              <span style={{fontSize:11,flexShrink:0}}>{row.icon}</span>
              {/* Name */}
              <span style={{flex:1,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                color:on?"rgba(210,235,255,0.9)":"rgba(100,120,150,0.45)",transition:"color 0.15s"}}>
                {row.displayName}
              </span>
              {/* Mesh count */}
              {row.count !== null
                ? <span style={{fontSize:8,color:"rgba(148,163,184,0.35)",fontFamily:"IBM Plex Mono,monospace",flexShrink:0}}>{row.count}</span>
                : <span style={{fontSize:7,color:"rgba(100,120,150,0.3)",flexShrink:0}}>—</span>
              }
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ModelPanel({ pid, gender, isDoctor, isMobile, onOrganSelect, selOrgan, hideLegend, externalLayerBtnRef,
  externalToolbar, externalGroups, externalOnGroupList,
  externalGroupVis, externalToggleGroup,
  externalShowGroupPanel, externalSetShowGroupPanel,
  externalXrayMode, externalSetXrayMode,
  externalShowTimeline, externalSetShowTimeline,
}) {
  useDB();
  const [organ, setOrgan] = useState(null);
  const [layers, setLayers] = useState({ skeletal:true, muscular:true, cardiovascular:true, visceral:true, nervous:true, skin:true, joints:true, lymphoid:true });
  const [_groups, _setGroups] = useState([]);
  const [_groupVis, _setGroupVis] = useState(() => {
    const initial = {};
    TARGET_GROUPS.forEach(g => { initial[g.name] = g.defaultOn !== false; });
    return initial;
  });
  const [_showGroupPanel, _setShowGroupPanel] = useState(false);
  const [_xrayMode, _setXrayMode] = useState(true);

  // Use external state when provided, otherwise internal
  const groups         = externalToolbar ? (externalGroups ?? _groups)                : _groups;
  const groupVis       = externalToolbar ? (externalGroupVis ?? _groupVis)            : _groupVis;
  const showGroupPanel = externalToolbar ? (externalShowGroupPanel ?? _showGroupPanel) : _showGroupPanel;
  const xrayMode       = externalToolbar ? (externalXrayMode ?? _xrayMode)            : _xrayMode;
  const setGroups      = externalToolbar ? (externalOnGroupList ?? _setGroups)        : _setGroups;
  const toggleGroup    = externalToolbar ? (externalToggleGroup  ?? (()=>{}))         : (n,b) => {
    if (n==="__set__"&&b){_setGroupVis(b);return;} _setGroupVis(p=>({...p,[n]:!p[n]}));
  };
  const setShowGroupPanel = externalToolbar ? (externalSetShowGroupPanel ?? _setShowGroupPanel) : _setShowGroupPanel;
  const setXrayMode       = externalToolbar ? (externalSetXrayMode ?? _setXrayMode)            : _setXrayMode;

  const handleGroupList = (grps) => {
    setGroups(grps);
    if (grps.length > 0 && !externalToolbar) {
      _setGroupVis(prev => {
        const next = {};
        TARGET_GROUPS.forEach(g => { next[g.name] = prev[g.name] !== undefined ? prev[g.name] : true; });
        return next;
      });
    }
  };
  // showLayers removed — layers now always visible as icon strip
  const [_showTimeline, _setShowTimeline] = useState(false);
  const [timeIdx, setTimeIdx] = useState(0);
  const showTimeline    = externalToolbar ? (externalShowTimeline ?? _showTimeline)    : _showTimeline;
  const setShowTimeline = externalToolbar ? (externalSetShowTimeline ?? _setShowTimeline) : _setShowTimeline;
  const activeOrgan = selOrgan !== undefined ? selOrgan : organ;
  const handleOrganClick = id => {
    const next = id === activeOrgan ? null : id;
    if (onOrganSelect) onOrganSelect(next);
    else setOrgan(next);
  };

  const odRows = dbQuery("SELECT * FROM organ_data WHERE patient_id=? AND organ_id NOT IN ('__record__','__ai__')", [pid]);
  const aiRow = dbGetOne("SELECT * FROM organ_data WHERE patient_id=? AND organ_id='__ai__'", [pid]);
  let aiData = {};
  try { aiData = JSON.parse(aiRow?.findings || "{}"); } catch {}
  const aiOrganMap = canonicalizeOrganMap(aiData.organMap || {});

  // Build timeline entries grouped by study_date
  const timelineEntries = useMemo(()=>{
    const byDate = {};
    odRows.forEach(r=>{
      const d = r.study_date||"Неизвестно";
      if(!byDate[d]) byDate[d]={date:d,organs:[]};
      byDate[d].organs.push(r);
    });
    return Object.values(byDate)
      .sort((a,b)=>a.date.localeCompare(b.date))
      .map(entry=>({
        ...entry,
        shortDate: entry.date.split(".").slice(0,2).join(".")||entry.date.slice(-5),
        worstStatus: entry.organs.some(o=>o.status==="sick")?"sick":
                     entry.organs.some(o=>o.status==="warning")?"warning":
                     entry.organs.some(o=>o.status==="healthy")?"healthy":"none",
      }));
  }, [odRows.map(r=>r.organ_id+r.status+r.study_date).join(',')]);

  const safeIdx = Math.min(timeIdx, Math.max(0, timelineEntries.length-1));

  // Auto-jump to latest entry when new study is added
  const prevLen = useRef(0);
  useEffect(()=>{
    if(timelineEntries.length > prevLen.current) {
      setTimeIdx(timelineEntries.length - 1);
    }
    prevLen.current = timelineEntries.length;
  }, [timelineEntries.length]);

  // NLP: analyse all text fields from current snapshot and merge into od
  // DB explicit status always wins over NLP; NLP only fills "none" or upgrades severity
  const PRIORITY = { sick:2, warning:1, healthy:0, none:-1 };

  const nlpOrganMap = useMemo(()=>{
    // Collect all text: findings + notes from the current source rows
    const source = (showTimeline && timelineEntries.length)
      ? timelineEntries[safeIdx]?.organs || odRows
      : odRows;
    const allText = (Array.isArray(source)?source:odRows)
      .map(r=>[r.findings||"", r.notes||""].join(" ")).join(" ");
    return mergeAnalysisToOrgans(analyzeWithKeywords(allText));
  }, [
    odRows.map(r=>r.findings+r.notes).join('|'),
    showTimeline, safeIdx, timelineEntries.length
  ]);

  // Merge: DB status takes priority; NLP fills gaps or upgrades where DB has "none"
  const od = useMemo(()=>{
    const source = (showTimeline && timelineEntries.length)
      ? timelineEntries[safeIdx]?.organs || odRows
      : odRows;
    const m = {};
    (Array.isArray(source)?source:odRows).forEach(r=>{ m[r.organ_id]={...r}; });

    const applyAssistantMap = (assistantMap, flagName) => {
      Object.entries(assistantMap || {}).forEach(([oid, nextStatus])=>{
        const existing = m[oid];
        const dbPriority = existing ? (PRIORITY[existing.status] ?? -1) : -1;
        const nextPriority = PRIORITY[nextStatus] ?? -1;
        if (!existing) {
          m[oid] = { organ_id: oid, status: nextStatus, [flagName]: true };
        } else if (nextPriority > dbPriority) {
          m[oid] = { ...existing, _nlpUpgrade: nextStatus, [flagName]: true };
        }
      });
    };

    applyAssistantMap(aiOrganMap, "_ai");
    applyAssistantMap(nlpOrganMap, "_nlp");
    return m;
  }, [
    odRows.map(r=>r.organ_id+r.status+r.study_date).join(','),
    showTimeline, timeIdx, timelineEntries.length,
    JSON.stringify(nlpOrganMap), JSON.stringify(aiOrganMap)
  ]);

  const toggleLayer = id => setLayers(l=>({...l,[id]:!l[id]}));

  const visibleOd = od;

  // Model fills most of the window; timeline takes what it needs
  const modelHeight = isMobile ? "75vw" : "100%";

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>

      {/* ── Toolbar: only shown when not using external toolbar ── */}
      {!externalToolbar && (
      <div style={{flexShrink:0,background:C.bg4,borderBottom:`1px solid ${C.border}`,padding:"4px 8px",display:"flex",alignItems:"center",gap:6}}>
        {/* Groups/Layers button */}
        <button onClick={()=>setShowGroupPanel(v=>!v)} title="Слои (коллекции)" style={{
          height:24,borderRadius:6,flexShrink:0,padding:"0 9px",gap:5,
          border:`1.5px solid ${showGroupPanel?"rgba(3,194,252,0.55)":C.border}`,
          background:showGroupPanel?"rgba(3,194,252,0.13)":C.surf,
          color:showGroupPanel?"#03C2FC":C.muted,
          cursor:"pointer",display:"flex",alignItems:"center",
          transition:"all 0.18s",fontSize:9,fontWeight:600,whiteSpace:"nowrap",
        }}>
